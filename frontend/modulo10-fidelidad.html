<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sport Hub OS — Fidelidad y Rewards</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root[data-theme="dark"]{
  --bg:#05060e;--s1:#090b16;--s2:#0d1020;--s3:#111525;
  --bd:#171e30;--bd2:#1e2840;--bd3:#283450;
  --tx:#dde3f5;--tx2:#7a8db2;--tx3:#5a739a;
  --ac:#5b7fff;--ok:#2ecc71;--warn:#f0a020;--err:#e05050;
  --gold:#f0c040;--purple:#8b5cf6;--teal:#06b6d4;--pink:#ec4899;
  --sh:0 8px 40px #00000099;--sh2:0 2px 12px #00000055
}
:root[data-theme="light"]{
  --bg:#eef1f9;--s1:#fff;--s2:#f5f7fd;--s3:#edf0f8;
  --bd:#dde3f0;--bd2:#c8d0e8;--bd3:#b0bed8;
  --tx:#0d1530;--tx2:#5a6a90;--tx3:#8a9ab8;
  --ac:#3d63f0;--ok:#16a34a;--warn:#d97706;--err:#dc2626;
  --gold:#ca8a04;--purple:#7c3aed;--teal:#0891b2;--pink:#db2777;
  --sh:0 4px 20px #0000001a;--sh2:0 2px 8px #00000012
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px}
.top{display:flex;align-items:center;gap:12px;padding:10px 24px;background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;box-shadow:var(--sh2)}
.lb{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--warn));display:flex;align-items:center;justify-content:center;font-size:14px}
.ln{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.ttog{width:40px;height:22px;border-radius:11px;background:var(--bd2);cursor:pointer;position:relative;margin-left:auto;flex-shrink:0}
.ttog::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--gold);transition:transform .2s}
[data-theme="light"] .ttog::after{transform:translateX(18px)}
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bd);padding:0 24px;overflow-x:auto}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--tx2);border-bottom:2px solid transparent;cursor:pointer;transition:all .14s;white-space:nowrap}
.tab.on{color:var(--tx);border-bottom-color:var(--gold)}
.main{padding:22px 26px;max-width:1400px;margin:0 auto}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px}
.kpi::before{content:'';display:block;height:3px;border-radius:2px;margin-bottom:10px}
.kv{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1}
.kl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}

/* NIVELES */
.niveles-row{display:flex;gap:0;margin-bottom:20px;background:var(--s1);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.nivel-block{flex:1;padding:16px;border-right:1px solid var(--bd);text-align:center;transition:background .13s;cursor:pointer;position:relative}
.nivel-block:last-child{border-right:none}
.nivel-block:hover{background:var(--s2)}
.nivel-icon{font-size:28px;margin-bottom:6px}
.nivel-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:800}
.nivel-pts{font-size:11px;color:var(--tx3);margin-top:2px}
.nivel-bar{height:3px;border-radius:2px;margin-top:8px}
.nivel-count{font-size:18px;font-weight:800;font-family:'Syne',sans-serif;margin-top:4px}

/* JUGADORES RANKING */
.fid-row{display:grid;align-items:center;padding:10px 16px;border-bottom:1px solid var(--bd)44;transition:background .12s;cursor:pointer}
.fid-row:hover{background:var(--s2)}
.pts-pill{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;border-radius:8px;padding:3px 10px}
.pts-bar-wrap{background:var(--bd);border-radius:3px;height:4px;overflow:hidden;margin-top:4px}
.pts-bar{height:100%;border-radius:3px;transition:width .5s}

/* REWARDS GRID */
.rewards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.reward-card{background:var(--s1);border:2px solid var(--bd);border-radius:14px;padding:16px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.reward-card:hover{border-color:var(--bd2);transform:translateY(-2px)}
.reward-card.agotado{opacity:.5}
.reward-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.reward-icon{font-size:32px;margin-bottom:8px}
.reward-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px}
.reward-desc{font-size:11px;color:var(--tx2);line-height:1.5;margin-bottom:10px}
.reward-pts{font-family:'DM Mono',monospace;font-size:20px;font-weight:800}
.reward-stock{font-size:10px;color:var(--tx3);margin-top:3px}

/* HISTORIAL */
.hist-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--bd)44;font-size:12px}
.hist-row:hover{background:var(--s2)}
.hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* CARD */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;margin-bottom:14px;overflow:hidden}
.card-head{padding:11px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;font-family:'Syne',sans-serif}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:all .14s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{opacity:.85}
.btn-gold{background:var(--gold);color:#0d1020}
.btn-ghost{background:var(--s2);border:1px solid var(--bd2);color:var(--tx2)}
.btn-ghost:hover{color:var(--tx);border-color:var(--bd3)}
.btn-ok{background:var(--ok)18;color:var(--ok);border:1px solid var(--ok)44}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 12px;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd);text-align:left}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--bd)55;vertical-align:middle}
.tbl tr:hover td{background:var(--s2)}
.finp,.fsel{width:100%;padding:9px 12px;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;margin-bottom:10px;transition:border-color .15s}
.finp:focus,.fsel:focus{border-color:var(--gold)}
.flbl{font-size:11px;color:var(--tx2);margin-bottom:4px;display:block;font-weight:500}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.overlay{position:fixed;inset:0;background:#00000099;display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:16px;padding:24px;width:100%;max-width:520px;box-shadow:var(--sh);max-height:92vh;overflow-y:auto;animation:su .18s}
@keyframes su{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--tx2);margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.toast{position:fixed;bottom:18px;right:18px;background:var(--s1);border:1px solid var(--bd2);border-radius:10px;padding:10px 16px;font-size:12px;color:var(--tx);z-index:300;box-shadow:var(--sh);display:flex;align-items:center;gap:8px;animation:ts .2s}
@keyframes ts{from{transform:translateX(110%)}to{transform:none}}
</style>
</head>

function getNivel(pts) {
  return NIVELES.slice().reverse().find(n=>pts>=n.min) || NIVELES[0]

function getNivelSiguiente(pts) {
  return NIVELES.find(n=>n.min>pts) || null

function switchTab(t) {
  activeTab = t
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('on'))
  document.getElementById('tab-'+t)?.classList.add('on')
  renderMain()

    </div>
    <div class="kpi" style="border-top:3px solid var(--ac)">
      <div style="font-size:11px;color:var(--tx2)">Líder del ranking</div>
      <div class="kv" style="font-size:15px;margin-top:3px;color:var(--ac)">${topJug.nombre}</div>
      <div class="kl">${fmtPts(topJug.pts)}</div>
    </div>
    <div class="kpi" style="border-top:3px solid var(--warn)">
      <div style="font-size:11px;color:var(--tx2)">Participación activa</div>
      <div class="kv" style="color:var(--warn)">${JUGADORES.filter(j=>j.ptsMes>0).length}/${JUGADORES.length}</div>
      <div class="kl">sumaron pts este mes</div>
    </div>
  </div>`

  const content = document.getElementById('main')
  switch(activeTab) {
    case 'ranking':  content.innerHTML = kpiHtml + renderRanking();  break
    case 'rewards':  content.innerHTML = kpiHtml + renderRewards();  break
    case 'historial':content.innerHTML = kpiHtml + renderHistorial();break
    case 'reglas':   content.innerHTML = kpiHtml + renderReglas();   break
  }
}

// ══════════════════════════════════════════════════════════
//  RANKING DE PUNTOS
// ══════════════════════════════════════════════════════════
function renderRanking() {
  const sorted = [...JUGADORES].sort((a,b)=>b.pts-a.pts)
  const maxPts = sorted[0].pts

  // Barra de niveles
  let html = '<div class="niveles-row">'
  NIVELES.forEach(n => {
    const count = JUGADORES.filter(j=>getNivel(j.pts).id===n.id).length
    html += `<div class="nivel-block" onclick="filterNivel('${n.id}')">
      <div class="nivel-icon">${n.icon}</div>
      <div class="nivel-name" style="color:${n.color}">${n.nombre}</div>
      <div class="nivel-pts" style="color:var(--tx3)">${n.min.toLocaleString()}+ pts</div>
      <div class="nivel-bar" style="background:${n.color}"></div>
      <div class="nivel-count" style="color:${n.color}">${count}</div>
    </div>`
  })
  html += '</div>'

  // Tabla ranking
  html += '<div class="card"><div class="card-head">'
  html += '<span class="card-title">🏅 Ranking de puntos</span>'
  html += '<div style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" onclick="toast(\'Exportando ranking...\')">↓ Exportar</button>'
  html += '<button class="btn btn-gold btn-sm" onclick="openAjusteManual()">+ Sumar puntos</button></div></div>'

  sorted.forEach((j, i) => {
    const nivel     = getNivel(j.pts)
    const nivelNext = getNivelSiguiente(j.pts)
    const pct       = nivelNext ? Math.round((j.pts-nivel.min)/(nivelNext.min-nivel.min)*100) : 100
    const pctBar    = Math.round(j.pts/maxPts*100)
    const ini       = j.nombre.split(' ').map(n=>n[0]).slice(0,2).join('')
    const posColors = ['var(--gold)','#a8b8c8','#cd7f32']
    const posColor  = i<3 ? posColors[i] : 'var(--tx3)'
    const gColor    = j.genero==='M' ? 'var(--ac)' : 'var(--err)'

    html += `<div class="fid-row" style="grid-template-columns:44px 44px 1fr 120px auto auto auto;gap:10px" onclick="openJugadorFid(${j.id})">
      <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;text-align:center;color:${posColor}">
        ${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}
      </div>
      <div style="width:36px;height:36px;border-radius:50%;background:${nivel.color}22;color:${nivel.color};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">${ini}</div>
      <div>
        <div style="font-weight:600;color:var(--tx)">${j.nombre} <span style="font-size:10px;color:${gColor}">${j.genero==='M'?'♂':'♀'}</span></div>
        <div style="font-size:10px;color:var(--tx3)">${j.deportes.join(' · ')} · Racha: ${j.racha} semanas</div>
        <div class="pts-bar-wrap" style="margin-top:5px;width:140px">
          <div class="pts-bar" style="width:${pctBar}%;background:${nivel.color}"></div>
        </div>
      </div>
      <div>
        <span class="badge" style="background:${nivel.color}22;color:${nivel.color}">${nivel.icon} ${nivel.nombre}</span>
        <div style="font-size:10px;color:var(--tx3);margin-top:3px">
          ${nivelNext?pct+'% → '+nivelNext.nombre:'Nivel máximo ✓'}
        </div>
      </div>
      <div style="text-align:right;color:var(--ok);font-size:11px;font-weight:600">
        +${j.ptsMes.toLocaleString()}<br>
        <span style="font-size:9px;color:var(--tx3)">este mes</span>
      </div>
      <div>
        <span class="pts-pill" style="background:${nivel.color}22;color:${nivel.color}">${j.pts.toLocaleString()}</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openJugadorFid(${j.id})">Ver perfil</button>
    </div>`
  })

  html += '</div>'
  return html
}

          {r:REWARDS.find(x=>x.id===5), canjes:28},

          <td style="font-family:'DM Mono',monospace;font-weight:600;color:${r.color}">${r.pts.toLocaleString()}</td>
          <td style="font-weight:600;color:var(--ok)">${canjes} canjes</td>
        </tr>`:'').join('')}
      </tbody>

  return html

// ══════════════════════════════════════════════════════════
//  MODALES
// ══════════════════════════════════════════════════════════
function openJugadorFid(id) {
  const j = JUGADORES.find(x=>x.id===id)
  if (!j) return
  const nivel     = getNivel(j.pts)
  const nivelNext = getNivelSiguiente(j.pts)
  const pctNivel  = nivelNext ? Math.round((j.pts-nivel.min)/(nivelNext.min-nivel.min)*100) : 100
  const ptsNext   = nivelNext ? (nivelNext.min - j.pts) : 0
  const ini       = j.nombre.split(' ').map(n=>n[0]).slice(0,2).join('')

  showModal(`
    <div style="text-align:center;margin-bottom:16px">
      <div style="width:56px;height:56px;border-radius:50%;background:${nivel.color}22;color:${nivel.color};display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;font-family:'Syne',sans-serif;margin:0 auto 10px">${ini}</div>
      <div class="modal-title">${j.nombre}</div>
      <span class="badge" style="background:${nivel.color}22;color:${nivel.color};font-size:12px;padding:4px 12px">${nivel.icon} ${nivel.nombre}</span>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
      ${[
        {l:'Puntos totales', v:j.pts.toLocaleString(), c:'var(--gold)'},
        {l:'Este mes',       v:'+'+j.ptsMes,           c:'var(--ok)'},
        {l:'Canjes',         v:j.canjes,               c:'var(--ac)'},
        {l:'Racha',          v:j.racha+' sem.',        c:'var(--purple)'},
        {l:'Deportes',       v:j.deportes.length,      c:'var(--teal)'},
        {l:'Nivel',          v:nivel.nombre,           c:nivel.color},
      ].map(s=>`<div style="background:var(--s2);border-radius:8px;padding:8px;text-align:center">
        <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:${s.c}">${s.v}</div>
        <div style="font-size:9px;color:var(--tx3);margin-top:2px">${s.l}</div>
      </div>`).join('')}
    </div>

    ${nivelNext?`
    <div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--tx2);margin-bottom:5px">
        <span>${nivel.icon} ${nivel.nombre}</span>
        <span style="color:var(--gold);font-weight:600">Le faltan ${ptsNext.toLocaleString()} pts para ${nivelNext.nombre} ${getNivel(nivelNext.min).icon}</span>
      </div>
      <div style="background:var(--bd);border-radius:4px;height:8px;overflow:hidden">
        <div style="width:${pctNivel}%;height:100%;background:${nivel.color};border-radius:4px;transition:width .5s"></div>
      </div>
      <div style="font-size:10px;color:var(--tx3);margin-top:3px;text-align:right">${pctNivel}% del camino a ${nivelNext.nombre}</div>
    </div>`:'<div style="text-align:center;padding:8px;margin-bottom:14px;background:var(--gold)0a;border:1px solid var(--gold)22;border-radius:8px;font-size:12px;color:var(--gold)">👑 Nivel máximo alcanzado</div>'}

    <div style="margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">Beneficios activos</div>
      ${nivel.beneficios.map(b=>`<div style="display:flex;gap:7px;font-size:11px;padding:5px 0;border-bottom:1px solid var(--bd)44">
        <span style="color:${nivel.color};font-weight:700">✓</span><span style="color:var(--tx2)">${b}</span>
      </div>`).join('')}
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal();openAjusteManual(${j.id})">+ Ajustar puntos</button>
      <button class="btn btn-gold" onclick="closeModal();openCanjearPara(${j.id})">Canjear reward →</button>
    </div>
  `)
}

function openRewardDetail(id) {
  const r = REWARDS.find(x=>x.id===id)
  if (!r) return
  showModal(`
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:48px;margin-bottom:8px">${r.icon}</div>
      <div class="modal-title" style="color:${r.color}">${r.nombre}</div>
      <div style="font-size:22px;font-weight:800;font-family:'DM Mono',monospace;color:${r.color};margin-top:5px">${r.pts.toLocaleString()} pts</div>
    </div>
    <div style="font-size:13px;color:var(--tx2);margin-bottom:14px;line-height:1.6;text-align:center">${r.desc}</div>
    <div style="background:var(--s2);border-radius:9px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--tx3);text-align:center">
      ${r.stock!==null?r.stock+' unidades disponibles':'Sin límite de stock'} · Categoría: ${r.cat}
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-gold" onclick="closeModal();openCanjear(${r.id})" ${r.agotado?'disabled':''}>Canjear este reward →</button>
    </div>
  `)
}

function openCanjear(rewardId) {
  const r = REWARDS.find(x=>x.id===rewardId)
  if (!r) return
  const sorted = [...JUGADORES].filter(j=>j.pts>=r.pts).sort((a,b)=>b.pts-a.pts)
  showModal(`
    <div class="modal-title">🎁 Canjear reward</div>
    <div class="modal-sub">${r.icon} ${r.nombre} — ${r.pts.toLocaleString()} pts</div>
    <label class="flbl">Seleccioná el jugador</label>
    <select class="fsel" id="cj-jugador">
      ${sorted.length
        ? sorted.map(j=>{
            const n = getNivel(j.pts)
            return `<option value="${j.id}">${j.nombre} — ${j.pts.toLocaleString()} pts (${n.nombre})</option>`
          }).join('')
        : '<option disabled>Ningún jugador tiene suficientes puntos</option>'}
    </select>
    ${sorted.length===0?'<div style="color:var(--err);font-size:12px;margin-bottom:10px">Ningún jugador alcanza el mínimo de '+r.pts.toLocaleString()+' pts para este reward.</div>':''}
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-gold" onclick="confirmarCanje(${rewardId})" ${sorted.length===0?'disabled':''}>Confirmar canje</button>
    </div>
  `)
}

function openCanjearPara(jugId) {
  const j = JUGADORES.find(x=>x.id===jugId)
  if (!j) return
  const disponibles = REWARDS.filter(r=>r.pts<=j.pts&&!r.agotado)
  showModal(`
    <div class="modal-title">🎁 Canjear reward para ${j.nombre}</div>
    <div class="modal-sub">${j.pts.toLocaleString()} puntos disponibles</div>
    <div style="display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto">
      ${disponibles.map(r=>`
        <div style="display:flex;align-items:center;gap:12px;padding:9px 12px;background:var(--s2);border-radius:9px;cursor:pointer;transition:background .12s;border:1px solid var(--bd)" onclick="confirmarCanjeDirecto(${jugId},${r.id})" onmouseover="this.style.background='var(--s3)'" onmouseout="this.style.background='var(--s2)'">
          <span style="font-size:20px">${r.icon}</span>
          <div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--tx)">${r.nombre}</div>
          <div style="font-size:10px;color:var(--tx3)">${r.desc.slice(0,50)}...</div></div>
          <span style="font-family:'DM Mono',monospace;font-weight:700;color:${r.color}">${r.pts.toLocaleString()}</span>
        </div>`).join('')}
      ${disponibles.length===0?'<div style="text-align:center;padding:20px;color:var(--tx3);font-size:12px">No hay rewards disponibles para el saldo actual</div>':''}
    </div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div>
  `)
}

function confirmarCanje(rewardId) {
  const jugId = parseInt(document.getElementById('cj-jugador')?.value)
  confirmarCanjeDirecto(jugId, rewardId)
}

function confirmarCanjeDirecto(jugId, rewardId) {
  const j = JUGADORES.find(x=>x.id===jugId)
  const r = REWARDS.find(x=>x.id===rewardId)
  if (!j||!r) return
  if (j.pts < r.pts) { toast('Puntos insuficientes','warn'); return }
  j.pts -= r.pts
  j.canjes++
  if (r.stock!==null) r.stock--
  if (r.stock===0) r.agotado=true
  MOVIMIENTOS.unshift({id:MOVIMIENTOS.length+1, jug:j.id, tipo:'canje', accion:'Canje: '+r.nombre, pts:-r.pts, fecha:'Hoy'})
  closeModal(); renderMain()
  toast('✓ Canje confirmado — '+r.nombre+' para '+j.nombre+' (−'+r.pts.toLocaleString()+' pts)')
}

function openAjusteManual(jugId) {
  showModal(`
    <div class="modal-title">✏ Ajuste manual de puntos</div>
    <div class="modal-sub">Para correcciones, bonos especiales o eventos fuera del sistema.</div>
    <label class="flbl">Jugador</label>
    <select class="fsel" id="am-jug">
      ${JUGADORES.map(j=>`<option value="${j.id}" ${jugId===j.id?'selected':''}>${j.nombre} — ${j.pts.toLocaleString()} pts</option>`).join('')}
    </select>
    <div class="frow">
      <div>
        <label class="flbl">Tipo</label>
        <select class="fsel" id="am-tipo">
          <option value="1">Sumar puntos (+)</option>
          <option value="-1">Restar puntos (−)</option>
        </select>
      </div>
      <div>
        <label class="flbl">Cantidad de puntos</label>
        <input type="number" class="finp" id="am-pts" placeholder="Ej: 200" min="1" max="99999">
      </div>
    </div>
    <label class="flbl">Motivo</label>
    <input class="finp" id="am-motivo" placeholder="Ej: Bono por participación en evento especial">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-gold" onclick="saveAjuste()">Confirmar ajuste</button>
    </div>
  `)
}

function saveAjuste() {
  const jugId  = parseInt(document.getElementById('am-jug')?.value)
  const signo  = parseInt(document.getElementById('am-tipo')?.value)||1
  const pts    = parseInt(document.getElementById('am-pts')?.value)||0
  const motivo = document.getElementById('am-motivo')?.value.trim()||'Ajuste manual'
  if (!pts) { toast('Ingresá la cantidad de puntos','warn'); return }
  const j = JUGADORES.find(x=>x.id===jugId)
  if (!j) return
  j.pts = Math.max(0, j.pts + signo*pts)
  if (signo>0) j.ptsMes += pts
  MOVIMIENTOS.unshift({id:MOVIMIENTOS.length+1, jug:j.id, tipo:signo>0?'suma':'penalidad', accion:motivo, pts:signo*pts, fecha:'Hoy'})
  closeModal(); renderMain()
  toast('✓ '+j.nombre+': '+(signo>0?'+':'')+signo*pts+' pts · '+motivo)
}

// ══════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════
function showModal(html){ document.getElementById('modal-body').innerHTML=html; document.getElementById('modal').style.display='flex' }
function closeModal(){ document.getElementById('modal').style.display='none' }
function filterNivel(nid){ toast('Filtrando por nivel '+nid) }
function toast(msg,type='success'){
  const cols={success:'var(--ok)',warn:'var(--warn)',error:'var(--err)'}
  const t=document.createElement('div');t.className='toast'
  t.innerHTML='<span style="color:'+(cols[type]||cols.success)+'">●</span> '+msg
  document.body.appendChild(t);setTimeout(()=>t.remove(),2600)
}
function toggleTheme(){
  const h=document.documentElement
  h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark')
  localStorage.setItem('shos-theme',h.getAttribute('data-theme'))
}
const st=localStorage.getItem('shos-theme');if(st)document.documentElement.setAttribute('data-theme',st)
renderMain()
</script>
</body>
