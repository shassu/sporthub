<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sport Hub OS — Jugadores & CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root[data-theme="dark"]{
  --bg:#06080f;--s1:#0c0f1a;--s2:#111520;--s3:#161b2a;
  --bd:#1c2235;--bd2:#252d45;--bd3:#303a58;
  --tx:#dde3f4;--tx2:#8494b8;--tx3:#4a5878;
  --ac:#5b7fff;--ac2:#3d60f0;--ac3:#7b9aff;
  --ok:#2ecc71;--warn:#f0a020;--err:#e05050;--info:#38bdf8;
  --sh:0 8px 40px #00000099;--sh2:0 2px 12px #00000066;
  --tag-active-bg:#1a2d50;--tag-active-col:#7b9aff;
  --tag-warn-bg:#2a1e05;--tag-warn-col:#f0a020;
  --tag-err-bg:#2a1010;--tag-err-col:#e05050;
  --tag-ok-bg:#0d2a1a;--tag-ok-col:#2ecc71;
  --tag-muted-bg:#1c2235;--tag-muted-col:#4a5878;
}
:root[data-theme="light"]{
  --bg:#f0f3fb;--s1:#ffffff;--s2:#f5f8ff;--s3:#edf0f9;
  --bd:#e0e5f0;--bd2:#c8d0e8;--bd3:#b0bcd8;
  --tx:#0d1530;--tx2:#5a6a90;--tx3:#9aaac8;
  --ac:#3d60f0;--ac2:#2550d8;--ac3:#5b7fff;
  --ok:#16a34a;--warn:#d97706;--err:#dc2626;--info:#0284c7;
  --sh:0 4px 20px #0000001a;--sh2:0 2px 8px #00000012;
  --tag-active-bg:#e8eeff;--tag-active-col:#3d60f0;
  --tag-warn-bg:#fef9e7;--tag-warn-col:#d97706;
  --tag-err-bg:#fef2f2;--tag-err-col:#dc2626;
  --tag-ok-bg:#f0fdf4;--tag-ok-col:#16a34a;
  --tag-muted-bg:#f0f3fb;--tag-muted-col:#9aaac8;
}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px;transition:background .25s,color .25s}

/* ── TOPBAR ── */
.top{display:flex;align-items:center;gap:12px;padding:11px 24px;background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;box-shadow:var(--sh2)}
.logo{display:flex;align-items:center;gap:9px}
.lb{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#5b7fff,#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;font-family:'Syne',sans-serif;flex-shrink:0}
.ln{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--tx)}
.ls{font-size:10px;color:var(--tx3)}
.top-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.ttog{width:40px;height:22px;border-radius:11px;background:var(--bd2);border:1px solid var(--bd2);cursor:pointer;position:relative;flex-shrink:0}
.ttog::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--ac);transition:transform .2s}
[data-theme="light"] .ttog::after{transform:translateX(18px)}

/* ── LAYOUT PRINCIPAL ── */
.layout{display:flex;height:calc(100vh - 49px);overflow:hidden}

/* ── PANEL IZQ: LISTA ── */
.panel-list{width:320px;flex-shrink:0;border-right:1px solid var(--bd);display:flex;flex-direction:column;background:var(--s1)}

.search-wrap{padding:12px 14px;border-bottom:1px solid var(--bd)}
.search-box{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--bd2);border-radius:10px;padding:8px 12px;transition:border-color .15s}
.search-box:focus-within{border-color:var(--ac)}
.search-box input{background:none;border:none;outline:none;color:var(--tx);font-size:13px;font-family:'DM Sans',sans-serif;flex:1}
.search-box input::placeholder{color:var(--tx3)}
.search-icon{color:var(--tx3);font-size:14px}

.filter-row{display:flex;gap:5px;padding:8px 14px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--bd)}
.ftag{padding:4px 11px;border-radius:16px;font-size:11px;cursor:pointer;border:1px solid var(--bd2);background:var(--s2);color:var(--tx2);white-space:nowrap;transition:all .14s;font-weight:500}
.ftag:hover{border-color:var(--ac);color:var(--tx)}
.ftag.on{background:var(--tag-active-bg);border-color:var(--ac);color:var(--tag-active-col)}

.player-list{flex:1;overflow-y:auto}
.player-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--bd)55;cursor:pointer;transition:background .12s;position:relative}
.player-item:hover{background:var(--s2)}
.player-item.active{background:var(--s3);border-left:3px solid var(--ac)}
.player-item.active{padding-left:11px}
.p-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;font-family:'Syne',sans-serif;flex-shrink:0;color:#fff}
.p-name{font-size:13px;font-weight:500;color:var(--tx)}
.p-meta{font-size:11px;color:var(--tx2);margin-top:1px}
.p-right{margin-left:auto;text-align:right;flex-shrink:0}
.p-spent{font-size:12px;font-weight:600;color:var(--tx);font-family:'DM Mono',monospace}
.p-status{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;border-radius:10px;padding:2px 7px;margin-top:2px}
.status-active{background:var(--tag-ok-bg);color:var(--tag-ok-col)}
.status-inactive{background:var(--tag-warn-bg);color:var(--tag-warn-col)}
.status-new{background:var(--tag-active-bg);color:var(--tag-active-col)}
.status-debt{background:var(--tag-err-bg);color:var(--tag-err-col)}

/* ── PANEL DER: FICHA ── */
.panel-detail{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--tx3)}
.empty-icon{font-size:40px;opacity:.4}

/* ── FICHA HEADER ── */
.detail-hero{padding:24px 28px 0;background:var(--s1);border-bottom:1px solid var(--bd)}
.hero-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:18px}
.big-av{width:64px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;font-family:'Syne',sans-serif;color:#fff;flex-shrink:0}
.hero-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--tx);margin-bottom:4px}
.hero-meta{font-size:12px;color:var(--tx2);display:flex;gap:12px;flex-wrap:wrap}
.hero-meta span{display:flex;align-items:center;gap:4px}
.hero-actions{margin-left:auto;display:flex;gap:7px;flex-shrink:0}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--bd)}
.kpi{padding:12px 16px;border-right:1px solid var(--bd);text-align:center}
.kpi:last-child{border-right:none}
.kv{font-size:20px;font-weight:700;font-family:'Syne',sans-serif;line-height:1}
.kl{font-size:10px;color:var(--tx3);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}

/* ── TABS ── */
.tabs{display:flex;padding:0 28px;background:var(--s1);border-bottom:1px solid var(--bd)}
.tab{padding:10px 16px;cursor:pointer;font-size:12px;font-weight:500;color:var(--tx2);border-bottom:2px solid transparent;transition:all .14s;white-space:nowrap}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--tx);border-bottom-color:var(--ac)}

/* ── CONTENIDO TABS ── */
.tab-content{padding:20px 28px;flex:1}
.section-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}

/* ── HISTORIAL ── */
.bk-list{display:flex;flex-direction:column;gap:6px}
.bk-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;transition:border-color .14s}
.bk-item:hover{border-color:var(--bd2)}
.bk-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.bk-info{flex:1;min-width:0}
.bk-name{font-size:12px;font-weight:500;color:var(--tx)}
.bk-date{font-size:11px;color:var(--tx2);margin-top:1px}
.bk-right{text-align:right;flex-shrink:0}
.bk-price{font-size:12px;font-weight:600;font-family:'DM Mono',monospace;color:var(--tx)}
.bk-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;margin-top:2px}

/* ── CONSUMO ── */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-lbl{font-size:11px;color:var(--tx2);width:120px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--bd);border-radius:4px;height:18px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:600;transition:width .5s ease}
.bar-val{font-size:11px;color:var(--tx2);width:60px;text-align:right;flex-shrink:0;font-family:'DM Mono',monospace}

/* ── MENSAJES ── */
.msg-form{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:16px}
.msg-templates{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.msg-tpl{padding:5px 11px;border-radius:16px;font-size:11px;cursor:pointer;border:1px solid var(--bd2);background:var(--s2);color:var(--tx2);transition:all .14s;white-space:nowrap}
.msg-tpl:hover{border-color:var(--ac);color:var(--tx)}
.msg-tpl.on{background:var(--tag-active-bg);border-color:var(--ac);color:var(--tag-active-col)}
.msg-textarea{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:10px 12px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;resize:vertical;min-height:80px;outline:none;transition:border-color .15s;margin-bottom:10px}
.msg-textarea:focus{border-color:var(--ac)}
.msg-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.msg-channel{display:flex;gap:5px}
.ch-btn{padding:5px 11px;border-radius:7px;font-size:11px;cursor:pointer;border:1px solid var(--bd2);background:var(--s2);color:var(--tx2);transition:all .14s;font-weight:500;font-family:'DM Sans',sans-serif}
.ch-btn.on{border-color:var(--ac);color:var(--ac);background:var(--tag-active-bg)}

/* ── LOG DE MENSAJES ── */
.msg-log{display:flex;flex-direction:column;gap:6px}
.msg-log-item{display:flex;gap:10px;padding:9px 13px;background:var(--s1);border:1px solid var(--bd);border-radius:9px;font-size:12px}
.msg-log-icon{flex-shrink:0;font-size:14px}
.msg-log-body{flex:1;min-width:0}
.msg-log-text{color:var(--tx);margin-bottom:2px;line-height:1.45}
.msg-log-meta{font-size:10px;color:var(--tx3)}
.msg-log-status{flex-shrink:0;font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px}

/* ── NOTAS ── */
.note-item{background:var(--s1);border:1px solid var(--bd);border-radius:9px;padding:11px 14px;margin-bottom:7px}
.note-text{font-size:12px;color:var(--tx);line-height:1.5;margin-bottom:5px}
.note-meta{font-size:10px;color:var(--tx3)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:#00000088;display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;animation:fi .15s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:16px;padding:24px;width:100%;max-width:440px;box-shadow:var(--sh);animation:su .18s}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--tx2);margin-bottom:18px}
.flbl{font-size:11px;color:var(--tx2);margin-bottom:4px;display:block}
.finp,.fsel{width:100%;padding:9px 12px;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;margin-bottom:10px;transition:border-color .15s}
.finp:focus,.fsel:focus{border-color:var(--ac)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fcheck{display:flex;align-items:center;gap:7px;margin-bottom:10px;font-size:12px;cursor:pointer}
.fcheck input{accent-color:var(--ac);width:14px;height:14px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* ── SPORT CHIPS ── */
.sport-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.sport-chip{padding:4px 11px;border-radius:16px;font-size:11px;cursor:pointer;border:1px solid var(--bd2);background:var(--s2);color:var(--tx2);transition:all .14s}
.sport-chip.on{border-color:var(--ac);color:var(--ac);background:var(--tag-active-bg)}

/* ── SELECTOR DE DEPORTES + CATEGORÍAS ── */
.sport-selector{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.sport-row{background:var(--s2);border:1px solid var(--bd2);border-radius:10px;overflow:hidden;transition:border-color .15s}
.sport-row.selected{border-color:var(--ac)}
.sport-row-header{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;user-select:none}
.sport-row-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--bd3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .14s;font-size:11px}
.sport-row.selected .sport-row-check{background:var(--ac);border-color:var(--ac);color:#fff}
.sport-row-name{font-size:13px;font-weight:500;color:var(--tx);flex:1}
.sport-row-badge{font-size:10px;color:var(--ac);font-weight:600;background:var(--tag-active-bg);padding:1px 7px;border-radius:10px}
.cat-panel{padding:0 12px 10px;border-top:1px solid var(--bd);display:none}
.sport-row.selected .cat-panel{display:block}
.cat-label{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin:8px 0 6px}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px}
.cat-opt{padding:6px 10px;border-radius:7px;border:1px solid var(--bd2);background:var(--s1);cursor:pointer;font-size:11px;color:var(--tx2);transition:all .13s;display:flex;flex-direction:column;gap:2px}
.cat-opt:hover{border-color:var(--ac);color:var(--tx)}
.cat-opt.on{background:var(--tag-active-bg);border-color:var(--ac);color:var(--tag-active-col)}
.cat-opt-name{font-weight:600}
.cat-opt-desc{font-size:10px;opacity:.7}
/* ── MAPA ── */
.map-container{position:relative;background:var(--s2);border-radius:10px;overflow:hidden;border:1px solid var(--bd)}
.map-svg{width:100%;display:block}
.map-pin{cursor:pointer;transition:transform .15s}
.map-pin:hover{transform:scale(1.3)}
.map-pin circle{transition:r .15s}
.map-tooltip{position:absolute;background:var(--s1);border:1px solid var(--bd2);border-radius:8px;padding:8px 12px;font-size:11px;pointer-events:none;box-shadow:var(--sh2);z-index:10;min-width:130px;display:none}
.map-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.map-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2)}
.map-leg-dot{width:10px;height:10px;border-radius:50%}
.heat-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.heat-lbl{font-size:11px;color:var(--tx2);width:100px;flex-shrink:0}
.heat-track{flex:1;background:var(--bd);border-radius:4px;height:20px;overflow:hidden}
.heat-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:600;color:#fff}

/* ── MENSAJES MASIVOS ── */
.mass-msg-box{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:14px}
.mass-seg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px}
.seg-card{padding:9px 12px;border-radius:8px;border:1px solid var(--bd2);background:var(--s2);cursor:pointer;transition:all .14s}
.seg-card:hover{border-color:var(--ac)}
.seg-card.on{border-color:var(--ac);background:var(--tag-active-bg)}
.seg-card-title{font-size:12px;font-weight:600;color:var(--tx)}
.seg-card-count{font-size:10px;color:var(--tx3);margin-top:2px}
.seg-card.on .seg-card-title{color:var(--tag-active-col)}
.audience-preview{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px}
.audience-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.aud-chip{padding:2px 9px;border-radius:10px;font-size:10px;font-weight:500;background:var(--tag-active-bg);color:var(--tag-active-col)}
.mass-send-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* ── BTNS ── */
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:all .14s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{opacity:.85}
.btn-primary{background:var(--ac);color:#fff}
.btn-ghost{background:var(--s2);border:1px solid var(--bd2);color:var(--tx2)}
.btn-ghost:hover{color:var(--tx);border-color:var(--bd3)}
.btn-ok{background:var(--tag-ok-bg);color:var(--tag-ok-col);border:1px solid var(--ok)44}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}

/* ── TOAST ── */
.toast{position:fixed;bottom:18px;right:18px;background:var(--s1);border:1px solid var(--bd2);border-radius:10px;padding:10px 16px;font-size:12px;color:var(--tx);z-index:300;box-shadow:var(--sh);display:flex;align-items:center;gap:8px;animation:si .2s}
@keyframes si{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="top">
  <div class="logo">
    <div class="lb">S</div>
    <div><div class="ln">Sport Hub OS</div><div class="ls">Jugadores & CRM — Pádel Norte Club</div></div>
  </div>
  <div class="top-right">
    <button class="btn btn-ghost" onclick="showView('mapa')">🗺 Mapa de jugadores</button>
    <button class="btn btn-ghost" onclick="showView('masivo')">📢 Mensaje masivo</button>
    <button class="btn btn-primary" onclick="openNewPlayer()">+ Nuevo jugador</button>
    <div class="ttog" onclick="toggleTheme()" title="Cambiar tema"></div>
  </div>
</header>

<div class="layout">

  <!-- ── PANEL LISTA ── -->
  <div class="panel-list">

    <div class="search-wrap">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="Buscar por nombre, teléfono o deporte..." oninput="filterPlayers()">
      </div>
    </div>

    <div class="filter-row" id="filter-row"></div>
    <div class="player-list" id="player-list"></div>
  </div>

  <!-- ── PANEL DETALLE ── -->
  <div class="panel-detail" id="panel-detail">
    <div class="empty-state">
      <div class="empty-icon">👤</div>
      <div style="font-size:14px;font-weight:500">Seleccioná un jugador</div>
      <div style="font-size:12px">para ver su ficha completa</div>
    </div>
  </div>

  <!-- ── PANEL MAPA ── -->
  <div class="panel-detail" id="panel-mapa" style="display:none;padding:24px">
    <div id="mapa-content"></div>
  </div>

  <!-- ── PANEL MASIVO ── -->
  <div class="panel-detail" id="panel-masivo" style="display:none;padding:24px">
    <div id="masivo-content"></div>
  </div>
</div>

<!-- MODAL NUEVO JUGADOR -->
<div class="overlay" id="modal-new" style="display:none" onclick="closeModal(event,'modal-new')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Nuevo jugador</div>
    <div class="modal-sub">Pre-inscripción al club</div>
    <div class="frow">
      <div><label class="flbl">Nombre</label><input type="text" class="finp" id="np-name" placeholder="Nombre completo"></div>
      <div><label class="flbl">Teléfono</label><input type="text" class="finp" id="np-phone" placeholder="11-xxxx-xxxx"></div>
    </div>
    <label class="flbl">Email (opcional)</label>

function renderFilters() {
  const filters = [
    { id:'all',      label:`Todos (${players.length})` },
    { id:'active',   label:`Activos (${players.filter(p=>p.status==='active').length})` },
    { id:'inactive', label:`Inactivos (${players.filter(p=>p.status==='inactive').length})` },
    { id:'new',      label:`Nuevos (${players.filter(p=>p.status==='new').length})` },
    { id:'debt',     label:`Con deuda (${players.filter(p=>p.debt>0).length})` },
    { id:'noconsent',label:`Sin consentimiento (${players.filter(p=>!p.consent).length})` },
  ]
  document.getElementById('filter-row').innerHTML = filters.map(f=>
    `<div class="ftag ${filterStatus===f.id?'on':''}" onclick="setFilter('${f.id}')">${f.label}</div>`
  ).join('')
}

function setFilter(s) {
  filterStatus = s
  filterPlayers()
  renderFilters()
}

function filterPlayers() {
  const q = document.getElementById('search').value.toLowerCase()
  filtered = players.filter(p => {
    const matchQ = !q || p.name.toLowerCase().includes(q) || p.phone.includes(q) || p.sports.join('').toLowerCase().includes(q) || p.zone.toLowerCase().includes(q)
    const matchF = filterStatus === 'all'       ? true :
                   filterStatus === 'debt'       ? p.debt > 0 :
                   filterStatus === 'noconsent'  ? !p.consent :
                   p.status === filterStatus
    return matchQ && matchF
  })
  renderList()
}

function renderList() {
  const list = document.getElementById('player-list')
  if (!filtered.length) {
    list.innerHTML = '<div style="padding:24px;text-align:center;color:var(--tx3);font-size:12px">Sin resultados</div>'
    return
  }
  list.innerHTML = filtered.map(p => {
    const color = COLORS[p.id % COLORS.length]
    const initials = p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()
    const status = p.debt > 0 ? 'debt' : p.status
    return `<div class="player-item ${activeId===p.id?'active':''}" onclick="selectPlayer(${p.id})">
      <div class="p-av" style="background:${color}">${initials}</div>
      <div style="flex:1;min-width:0">
        <div class="p-name">${p.name}</div>
        <div class="p-meta">${p.sports.join(' · ')} · ${p.zone}</div>
      </div>
      <div class="p-right">
        <div class="p-spent">${fmt(p.totalSpent)}</div>
        <div class="p-status ${STATUS_CLASS[status]}">${STATUS_LABELS[status]||p.status}</div>
      </div>
    </div>`
  }).join('')
}

              <div class="ch-btn ${msgChannel==='whatsapp'?'on':''}" onclick="setChannel('whatsapp')">💬 WhatsApp</div>
              <div class="ch-btn ${msgChannel==='email'?'on':''}" onclick="setChannel('email')">✉ Email</div>
            </div>
            <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="sendMsg(${p.id})">Enviar mensaje</button>
          </div>
        </div>

        <div class="section-title">Historial de comunicaciones</div>
        <div class="msg-log">
          ${p.messages.length ? p.messages.map(m=>`<div class="msg-log-item">
            <div class="msg-log-icon">${m.type==='whatsapp'?'💬':'✉'}</div>
            <div class="msg-log-body">
              <div class="msg-log-text">${m.text}</div>
              <div class="msg-log-meta">${m.date} · ${m.type==='whatsapp'?'WhatsApp':'Email'}</div>
            </div>
            <div class="msg-log-status" style="background:var(--tag-ok-bg);color:var(--tag-ok-col)">Enviado</div>
          </div>`).join('') : '<div style="color:var(--tx3);font-size:12px">Sin mensajes enviados aún</div>'}
        </div>
      `
      break

    case 'notas':
      el.innerHTML = `
        <div class="section-title">
          Notas internas
          <button class="btn btn-ghost btn-sm" onclick="addNote(${p.id})">+ Agregar</button>
        </div>
        ${p.notes.map((n,i)=>`<div class="note-item">
          <div class="note-text">${n}</div>
          <div class="note-meta">Staff · Nota interna · <span style="cursor:pointer;color:var(--err)" onclick="deleteNote(${p.id},${i})">eliminar</span></div>
        </div>`).join('')}
        ${!p.notes.length?'<div style="color:var(--tx3);font-size:12px">Sin notas todavía</div>':''}

        <div class="section-title" style="margin-top:20px">Datos del perfil</div>
        <div style="background:var(--s1);border:1px solid var(--bd);border-radius:10px;overflow:hidden">
          ${[
            ['Nivel', p.level],
            ['Deportes', (p.sportsDetail || p.sports).join(' · ')],
            ['Zona', `<span style="cursor:pointer;color:var(--ac)" onclick="openMaps('${p.zone}')">${p.zone} 📍</span>`],
            ['Desde', p.since],
            ['Consentimiento', p.consent ? '✓ Otorgado' : '✗ No otorgado'],
            ['Última visita', p.lastVisit],
          ].map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--bd);font-size:12px">
            <span style="color:var(--tx2)">${k}</span>
            <span style="font-weight:500;color:var(--tx)">${v}</span>
          </div>`).join('')}
        </div>
      `
      break
  }
}

function sendMsg(pid) {
  const el  = document.getElementById('msg-text')
  const txt = el?.value?.trim()
  if (!txt) { toast('⚠ Escribí un mensaje','warn'); return }
  const p = players.find(x=>x.id===pid)
  if (!p) return
  p.messages.unshift({ type:msgChannel, text:txt, date:new Date().toLocaleDateString('es-AR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}), status:'sent' })
  selectedTemplate = null
  toast(`✓ Mensaje enviado por ${msgChannel==='whatsapp'?'WhatsApp':'email'}`)
  renderTab()
}

function sendDebtMsg(pid) {
  const p = players.find(x=>x.id===pid)
  if (!p) return
  const txt = `${p.name.split(' ')[0]}, te recordamos que tenés una reserva pendiente de pago de ${fmt(p.debt)}. ¿Podés pasarte a regularizar?`
  p.messages.unshift({ type:'whatsapp', text:txt, date:new Date().toLocaleDateString('es-AR'), status:'sent' })
  toast('✓ Aviso de deuda enviado')
  renderTab()
}

let selectedSports = {}  // { sportId: catId | null }

function renderSportSelector() {
  const el = document.getElementById('sport-selector')
  if (!el) return
  el.innerHTML = Object.entries(SPORT_CATS).map(([sid, sport]) => {
    const isSelected = !!selectedSports[sid]
    const selCat = selectedSports[sid]
    const catName = selCat ? sport.categories.find(c=>c.id===selCat)?.name : null
    return `<div class="sport-row ${isSelected?'selected':''}" id="srow-${sid}">
      <div class="sport-row-header" onclick="toggleSportRow('${sid}')">
        <div class="sport-row-check">${isSelected?'✓':''}</div>
        <span style="font-size:16px">${sport.icon}</span>
        <span class="sport-row-name">${sport.name}</span>
        ${catName?`<span class="sport-row-badge">${catName}</span>`:''}
      </div>
      ${isSelected ? `<div class="cat-panel">
        <div class="cat-label">${sport.desc} — elegí tu categoría</div>
        <div class="cat-grid">
          ${sport.categories.map(cat=>`
            <div class="cat-opt ${selCat===cat.id?'on':''}" onclick="selectCat('${sid}','${cat.id}',event)">
              <span class="cat-opt-name">${cat.name}</span>
              <span class="cat-opt-desc">${cat.desc}</span>
            </div>`).join('')}
        </div>
      </div>` : ''}
    </div>`
  }).join('')
}

function toggleSportRow(sid) {
  if (selectedSports[sid] !== undefined) {
    delete selectedSports[sid]
  } else {
    selectedSports[sid] = null  // seleccionado pero sin categoría aún
  }
  renderSportSelector()
}

function selectCat(sid, catId, e) {
  e.stopPropagation()
  selectedSports[sid] = selectedSports[sid] === catId ? null : catId
  renderSportSelector()
}

function getSelectedSportsSummary() {
  return Object.entries(selectedSports).map(([sid, catId]) => {
    const sport = SPORT_CATS[sid]
    const cat   = catId ? sport.categories.find(c=>c.id===catId) : null
    return { sport: sport.name, icon: sport.icon, cat: cat?.name || 'Sin categoría', catId }
  })
}

// Bounding box Buenos Aires metropolitana
const MAP_BOUNDS = { latMin:-34.85, latMax:-34.43, lngMin:-58.75, lngMax:-58.18 }

function latToY(lat, h) {
  return ((MAP_BOUNDS.latMax - lat) / (MAP_BOUNDS.latMax - MAP_BOUNDS.latMin)) * h
}
function lngToX(lng, w) {
  return ((lng - MAP_BOUNDS.lngMin) / (MAP_BOUNDS.lngMax - MAP_BOUNDS.lngMin)) * w
}

// Agrupar jugadores por zona
function getZoneGroups() {
  const groups = {}
  players.forEach(p => {
    const zone = p.zone || 'Sin zona'
    if (!groups[zone]) groups[zone] = { zone, lat: p.lat, lng: p.lng, players: [] }
    groups[zone].players.push(p)
  })
  return Object.values(groups)
}

const SPORT_COLORS_MAP = {
  'Pádel':   '#5b7fff', 'Fútbol':'#22c55e', 'Tenis':'#f59e0b',
  'Crossfit':'#ef4444', 'Yoga':  '#06b6d4', 'Básquet':'#f97316',
  'Vóley':   '#a855f7', 'Pickleball':'#38bdf8',
}

function renderMapView() {
  const el = document.getElementById('mapa-content')
  const W = 700, H = 440

  // Leer filtros activos
  const filterSport = window._mapFilterSport || null
  const filterCat   = window._mapFilterCat   || null

  // Deportes únicos disponibles en la base
  const allSports = [...new Set(players.flatMap(p =>
    p.sports.map(s => s.replace(/^.\s/, ''))
  ))].filter(Boolean)

  // Categorías disponibles para el deporte seleccionado
  const sportKey = filterSport
    ? Object.keys(SPORT_CATS).find(k => SPORT_CATS[k].name === filterSport)
    : null
  const availCats = sportKey ? SPORT_CATS[sportKey].categories : []

  // Filtrar jugadores según selección
  let visiblePlayers = players
  if (filterSport) {
    visiblePlayers = visiblePlayers.filter(p =>
      p.sports.some(s => s.replace(/^.\s/, '') === filterSport)
    )
  }
  if (filterCat && sportKey) {
    visiblePlayers = visiblePlayers.filter(p => {
      const cats = p.sportsCats || {}
      return cats[sportKey] === filterCat
    })
  }

  // Agrupar por zona con jugadores filtrados
  const groups = {}
  visiblePlayers.forEach(p => {
    const zone = p.zone || 'Sin zona'
    if (!groups[zone]) groups[zone] = { zone, lat: p.lat, lng: p.lng, players: [] }
    groups[zone].players.push(p)
  })
  const filteredGroups = Object.values(groups).filter(g => g.lat && g.lng)
  const maxCount = Math.max(...filteredGroups.map(g => g.players.length), 1)

  // Construir pins
  const pins = filteredGroups.map(g => {
    const x     = lngToX(g.lng, W)
    const y     = latToY(g.lat, H)
    const r     = 8 + Math.round((g.players.length / maxCount) * 16)
    const sport = filterSport || g.players[0]?.sports[0]?.replace(/^.\s/, '') || 'Pádel'
    const color = SPORT_COLORS_MAP[sport] || '#5b7fff'
    const hasDebt     = g.players.some(p => p.debt > 0)
    const hasInactive = g.players.some(p => p.status === 'inactive')
    const pinColor    = hasDebt ? '#e05050' : hasInactive ? '#f0a020' : color
    return { x, y, r, color: pinColor, zone: g.zone, count: g.players.length, players: g.players, sport }
  })

  const sortedZones = [...filteredGroups].sort((a,b) => b.players.length - a.players.length)

  // Etiqueta del filtro activo
  const filterLabel = filterSport

  el.innerHTML = `
    <!-- HEADER -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div>
        <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--tx)">Mapa de jugadores</div>
        <div style="font-size:12px;color:var(--tx2);margin-top:2px">
          <span style="color:var(--ac);font-weight:500">${visiblePlayers.length}</span> de ${players.length} jugadores
          · <span style="color:var(--tx3)">${filterLabel}</span>
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="showView('lista')">← Volver</button>
        <button class="btn btn-primary btn-sm" onclick="showView('masivo')">📢 Enviar mensaje</button>
      </div>
    </div>

    <!-- FILTROS -->
    <div style="background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:14px">

      <!-- DEPORTE -->
      <div style="font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px">Filtrar por deporte</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:${availCats.length ? '12px' : '0'}">
        <div class="ftag ${!filterSport?'on':''}" onclick="setMapFilter(null,null)"
          style="display:flex;align-items:center;gap:4px">
          Todos <span style="font-size:10px;font-weight:600;opacity:.7">(${players.length})</span>
        </div>
        ${allSports.map(sport => {
          const cnt   = players.filter(p => p.sports.some(s=>s.replace(/^.\s/,'')===sport)).length
          const color = SPORT_COLORS_MAP[sport] || '#5b7fff'
          const isOn  = filterSport === sport
          return `<div class="ftag ${isOn?'on':''}" onclick="setMapFilter('${sport}',null)"
            style="${isOn?`border-color:${color};background:${color}18;color:${color}`:''}
                   display:flex;align-items:center;gap:4px">
            ${sport}
            <span style="font-size:10px;font-weight:600;opacity:.7">(${cnt})</span>
          </div>`
        }).join('')}
      </div>

      <!-- CATEGORÍA (solo si hay deporte seleccionado) -->
      ${availCats.length ? `
        <div style="font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px">
          Filtrar por categoría — ${filterSport}
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <div class="ftag ${!filterCat?'on':''}" onclick="setMapFilter('${filterSport}',null)">
            Todas las categorías
          </div>
          ${availCats.map(cat => {
            const cnt = players.filter(p => {
              const sk = Object.keys(SPORT_CATS).find(k=>SPORT_CATS[k].name===filterSport)
              return sk && (p.sportsCats||{})[sk] === cat.id
            }).length
            if (!cnt) return ''
            const isOn = filterCat === cat.id
            const sportColor = SPORT_COLORS_MAP[filterSport] || '#5b7fff'
            return `<div class="ftag ${isOn?'on':''}" onclick="setMapFilter('${filterSport}','${cat.id}')"
              style="${isOn?`border-color:${sportColor};background:${sportColor}18;color:${sportColor}`:''}
                     display:flex;align-items:center;gap:4px">
              ${cat.name}
              <span style="font-size:10px;font-weight:600;opacity:.7">(${cnt})</span>
            </div>`
          }).join('')}
        </div>
      ` : ''}
    </div>

    <!-- CUERPO: mapa + sidebar -->
    <div style="display:grid;grid-template-columns:1fr 240px;gap:14px">

      <!-- MAPA SVG -->
      <div class="map-container" style="position:relative">
        <svg class="map-svg" viewBox="0 0 ${W} ${H}" style="background:var(--s2)">
          <defs>
            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
              <path d="M 40 0 L 0 0 0 40" fill="none" stroke="var(--bd)" stroke-width="0.5"/>
            </pattern>
          </defs>
          <rect width="${W}" height="${H}" fill="url(#grid)" opacity="0.4"/>
          <text x="10" y="16" font-size="10" fill="var(--tx3)" font-family="DM Sans,sans-serif">Buenos Aires — Gran Buenos Aires</text>

          <!-- Labels de referencia -->
          ${[
            {n:'Palermo',     x:310, y:138},
            {n:'Belgrano',    x:265, y:98 },
            {n:'Almagro',     x:338, y:172},
            {n:'Lanús',       x:362, y:332},
            {n:'V. Crespo',   x:290, y:163},
            {n:'San Isidro',  x:200, y:62 },
            {n:'Quilmes',     x:445, y:355},
            {n:'Morón',       x:148, y:268},
          ].map(z=>`<text x="${z.x}" y="${z.y}" font-size="8" fill="var(--tx3)"
            font-family="DM Sans,sans-serif" text-anchor="middle" opacity="0.6">${z.n}</text>`).join('')}

          <!-- Pins -->
          ${!pins.length
            ? `<text x="${W/2}" y="${H/2}" font-size="13" fill="var(--tx3)" text-anchor="middle" font-family="DM Sans,sans-serif">Sin jugadores para este filtro</text>`
            : pins.map((p,i) => `
              <g class="map-pin" onclick="mapPinClick(${i})" id="pin-${i}">
                <circle cx="${p.x}" cy="${p.y}" r="${p.r+4}" fill="${p.color}" opacity="0.12"/>
                <circle cx="${p.x}" cy="${p.y}" r="${p.r}" fill="${p.color}" opacity="0.88"/>
                <text x="${p.x}" y="${p.y}" font-size="${p.count>9?9:11}" fill="#fff"
                  font-family="DM Sans,sans-serif" font-weight="700"
                  text-anchor="middle" dominant-baseline="central">${p.count}</text>
              </g>`).join('')
          }
        </svg>
        <div class="map-tooltip" id="map-tooltip"></div>
      </div>

      <!-- SIDEBAR -->
      <div style="display:flex;flex-direction:column;gap:12px;overflow-y:auto;max-height:${H}px">

        <!-- Ranking zonas filtradas -->
        <div>

            ${filterLabel} — por zona
          </div>
          ${sortedZones.length
            ? sortedZones.slice(0,8).map(g => {
                const sport = filterSport || g.players[0]?.sports[0]?.replace(/^.\s/,'') || 'Pádel'
                const color = SPORT_COLORS_MAP[sport] || '#5b7fff'
                const pct   = Math.round(g.players.length / Math.max(visiblePlayers.length,1) * 100)
                return `<div class="heat-bar">
                  <span class="heat-lbl" style="cursor:pointer;color:var(--ac)" onclick="filterByZone('${g.zone}')" title="Ver jugadores">${g.zone}</span>

        ${filterSport && availCats.length ? `

            <div style="font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px">Por categoría</div>
            ${availCats.map(cat => {
              const sk  = Object.keys(SPORT_CATS).find(k=>SPORT_CATS[k].name===filterSport)
              const cnt = visiblePlayers.filter(p=>(p.sportsCats||{})[sk]===cat.id).length
              if (!cnt) return ''
              const pct   = Math.round(cnt / Math.max(visiblePlayers.length,1) * 100)
              const color = SPORT_COLORS_MAP[filterSport] || '#5b7fff'
              const isActive = filterCat === cat.id
              return `<div class="heat-bar" style="cursor:pointer" onclick="setMapFilter('${filterSport}','${cat.id}')">
                <span class="heat-lbl" style="color:${isActive?color:'var(--tx2)'}">
                  ${isActive?'▶ ':''}${cat.name}
                </span>
                <div class="heat-track">
                  <div class="heat-fill" style="width:${Math.max(pct*3,10)}%;background:${isActive?color:color+'88'}">${cnt}</div>
                </div>
              </div>`
            }).join('')}
          </div>
        ` : ''}

        <!-- Lista de jugadores visibles -->
        <div>
          <div style="font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px">
            Jugadores (${visiblePlayers.length})
          </div>
          ${visiblePlayers.slice(0,10).map(p => {
            const color = COLORS[p.id % COLORS.length]
            const initials = p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()
            const sk = sportKey
            const catId = sk ? (p.sportsCats||{})[sk] : null
            const catName = catId ? SPORT_CATS[sk]?.categories.find(c=>c.id===catId)?.name : null
            return `<div style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--bd);cursor:pointer"

            </div>`
          }).join('')}
          ${visiblePlayers.length > 10 ? `<div style="font-size:10px;color:var(--tx3);text-align:center;padding-top:6px">+${visiblePlayers.length-10} más</div>` : ''}
        </div>

      </div>
    </div>

    <!-- Leyenda -->
    <div class="map-legend" style="margin-top:10px">
      ${filterSport
        ? `<div class="map-leg-item"><div class="map-leg-dot" style="background:${SPORT_COLORS_MAP[filterSport]||'#5b7fff'}"></div>${filterSport}</div>`
        : Object.entries(SPORT_COLORS_MAP).slice(0,5).map(([s,c])=>`<div class="map-leg-item"><div class="map-leg-dot" style="background:${c}"></div>${s}</div>`).join('')
      }
      <div class="map-leg-item"><div class="map-leg-dot" style="background:#e05050"></div>Con deuda</div>
      <div class="map-leg-item"><div class="map-leg-dot" style="background:#f0a020"></div>Inactivo</div>
      <div style="font-size:10px;color:var(--tx3);margin-left:auto">Círculo = cantidad en la zona · click para ver detalle</div>
    </div>
  `

  // Pin tooltips
  window._mapPins = pins
  window.mapPinClick = function(i) {
    const p  = window._mapPins[i]
    const tt = document.getElementById('map-tooltip')
    const svgEl   = el.querySelector('svg')
    const svgRect = svgEl.getBoundingClientRect()
    const cRect   = el.querySelector('.map-container').getBoundingClientRect()
    const scale   = svgRect.width / W
    const tx = p.x * scale + svgRect.left - cRect.left
    const ty = p.y * scale + svgRect.top  - cRect.top

    const sportKey2 = filterSport ? Object.keys(SPORT_CATS).find(k=>SPORT_CATS[k].name===filterSport) : null

    tt.style.display = 'block'
    tt.style.left    = Math.min(tx+10, cRect.width-160) + 'px'
    tt.style.top     = Math.max(ty-80, 4) + 'px'
    tt.innerHTML = `
      <strong style="color:var(--tx);font-size:12px">${p.zone}</strong>
      <div style="color:var(--ac);font-size:11px;margin-bottom:5px">${p.count} jugador${p.count>1?'es':''}</div>
      ${p.players.map(pl => {
        const catId   = sportKey2 ? (pl.sportsCats||{})[sportKey2] : null
        const catName = catId ? SPORT_CATS[sportKey2]?.categories.find(c=>c.id===catId)?.name : null
        return `<div style="display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--tx2);padding:1px 0">
          <span>${pl.name}</span>
          ${catName ? `<span style="color:var(--ac);font-size:9px">${catName}</span>` : ''}
        </div>`
      }).join('')}
      <div style="margin-top:5px;display:flex;gap:4px">
        <button class="btn btn-sm" style="background:var(--ac);color:#fff;font-size:10px;padding:3px 8px"
          onclick="filterByZone('${p.zone}')">Ver lista</button>
        <button class="btn btn-sm btn-ghost" style="font-size:10px;padding:3px 8px"
          onclick="window.open('https://maps.google.com/?q=${encodeURIComponent(p.zone+', Buenos Aires')}','_blank')">Maps</button>
      </div>`
    setTimeout(()=>{ document.addEventListener('click', ()=>tt.style.display='none', {once:true}) }, 100)
  }
}

function setMapFilter(sport, cat) {
  window._mapFilterSport = sport
  window._mapFilterCat   = cat
  renderMapView()
}

function filterByZone(zone) {
  showView('lista')
  document.getElementById('search').value = zone
  filterPlayers()
}

let massChannel  = 'whatsapp'

    </div>

              <div class="seg-card ${massSegments.has(s.id)?'on':''}" onclick="toggleSegment('${s.id}')">

            <div style="display:flex;align-items:center;justify-content:space-between">
              <div style="font-size:12px;font-weight:600;color:var(--tx)">
                Destinatarios: <span style="color:var(--ac)">${audience.length} jugadores</span>
              </div>
              ${!audience.length ? '<div style="font-size:11px;color:var(--warn)">Elegí al menos un segmento</div>' : ''}
            </div>
            ${audience.length ? `<div class="audience-chips">${audience.slice(0,8).map(p=>`<span class="aud-chip">${p.name.split(' ')[0]}</span>`).join('')}${audience.length>8?`<span class="aud-chip" style="background:var(--s3);color:var(--tx3)">+${audience.length-8} más</span>`:''}</div>` : ''}

            ${[

              {id:'torneo', label:'Torneo',           text:'¡Hay un nuevo torneo! Cupos limitados. ¿Te sumás?'},
              {id:'novedad',label:'Novedad',          text:'Novedad en el complejo: ¡sumamos nuevos horarios y espacios para vos!'},

      if (prev) prev.textContent = ta.value || 'El mensaje aparecerá acá...'
    })
  }
}

function toggleSegment(id) {
  if (massSegments.has(id)) massSegments.delete(id)
  else massSegments.add(id)
  renderMasivoView()
}

function setMassChannel(ch) { massChannel = ch; renderMasivoView() }

function setMassTemplate(text) {
  renderMasivoView()
  setTimeout(() => {
    const ta = document.getElementById('mass-msg-text')
    if (ta) {
      ta.value = text
      const prev = document.getElementById('mass-preview-bubble')
      if (prev) prev.textContent = text
    }
  }, 30)
}

function getAudience() {
  if (!massSegments.size) return []
  let result = new Set()
  massSegments.forEach(seg => {
    if (seg === 'all')    players.forEach(p => result.add(p))
    else if (seg === 'active')   players.filter(p=>p.status==='active').forEach(p=>result.add(p))
    else if (seg === 'inactive') players.filter(p=>p.status==='inactive').forEach(p=>result.add(p))
    else if (seg === 'new')      players.filter(p=>p.status==='new').forEach(p=>result.add(p))
    else if (seg === 'debt')     players.filter(p=>p.debt>0).forEach(p=>result.add(p))
    else if (seg === 'consent')  players.filter(p=>p.consent).forEach(p=>result.add(p))
    else if (seg.startsWith('sport_')) {
      const sportId   = seg.replace('sport_','')
      const sportName = SPORT_CATS[sportId]?.name
      if (sportName) players.filter(p=>p.sports.some(s=>s.includes(sportName))).forEach(p=>result.add(p))
    }
  })
  // Solo jugadores con consentimiento para comerciales
  return [...result].filter(p => p.consent)
}

function sendMassMsg() {
  const audience = getAudience()
  const txt = document.getElementById('mass-msg-text')?.value?.trim()
  if (!txt) { toast('⚠ Escribí un mensaje','warn'); return }
  if (!audience.length) { toast('⚠ No hay destinatarios válidos','warn'); return }

  // Registrar en historial de cada jugador
  const date = new Date().toLocaleDateString('es-AR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})
  audience.forEach(p => {
    const player = players.find(x=>x.id===p.id)
    if (player) player.messages.unshift({ type: massChannel, text: txt, date, status:'sent' })
  })

  massSegments.clear()
  toast(`✓ Mensaje enviado a ${audience.length} jugadores por ${massChannel==='whatsapp'?'WhatsApp':'email'}`)
  renderMasivoView()
}

// ══════════════════════════════════════════════════════════

renderFilters()
renderList()
</script>
