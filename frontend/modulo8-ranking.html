<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root[data-theme="dark"]{
  --bg:#05060e;--s1:#090b16;--s2:#0d1020;--s3:#111525;
  --bd:#171e30;--bd2:#1e2840;--bd3:#283450;

  --ac:#5b7fff;--ok:#2ecc71;--warn:#f0a020;--err:#e05050;
  --gold:#f0c040;--purple:#8b5cf6;--teal:#06b6d4;
  --sh:0 8px 40px #00000099;--sh2:0 2px 12px #00000055
}
:root[data-theme="light"]{
  --bg:#eef1f9;--s1:#fff;--s2:#f5f7fd;--s3:#edf0f8;
  --bd:#dde3f0;--bd2:#c8d0e8;--bd3:#b0bed8;
  --tx:#0d1530;--tx2:#5a6a90;--tx3:#8a9ab8;
  --ac:#3d63f0;--ok:#16a34a;--warn:#d97706;--err:#dc2626;
  --gold:#ca8a04;--purple:#7c3aed;--teal:#0891b2;
  --sh:0 4px 20px #0000001a;--sh2:0 2px 8px #00000012
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px}

.top{display:flex;align-items:center;gap:12px;padding:10px 24px;background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;box-shadow:var(--sh2)}
.lb{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#f0c040,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff}
.ln{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.ttog{width:40px;height:22px;border-radius:11px;background:var(--bd2);cursor:pointer;position:relative;margin-left:auto;flex-shrink:0}
.ttog::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--gold);transition:transform .2s}
[data-theme="light"] .ttog::after{transform:translateX(18px)}

.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bd);padding:0 24px;overflow-x:auto}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--tx2);border-bottom:2px solid transparent;cursor:pointer;transition:all .14s;white-space:nowrap}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--tx);border-bottom-color:var(--gold)}

.main{padding:22px 26px;max-width:1400px;margin:0 auto}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kv{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1;margin-top:5px}
.kl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}

/* RANKING TABLE */
.rank-row{display:grid;align-items:center;padding:10px 16px;border-bottom:1px solid var(--bd)44;transition:background .12s;cursor:pointer}
.rank-row:hover{background:var(--s2)}
.rank-row:last-child{border-bottom:none}
.rank-num{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;width:36px;text-align:center;flex-shrink:0}
.rank-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.rank-name{font-size:13px;font-weight:600;color:var(--tx)}
.rank-meta{font-size:11px;color:var(--tx3);margin-top:1px}
.elo-pill{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;border-radius:8px;padding:3px 10px}
.trend-up{color:var(--ok);font-size:11px;font-weight:600}
.trend-dn{color:var(--err);font-size:11px;font-weight:600}
.trend-eq{color:var(--tx3);font-size:11px}

/* CATEGORÍAS TABS */
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.cat-tab{padding:5px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bd2);background:var(--s2);color:var(--tx2);transition:all .13s}
.cat-tab.on{background:var(--gold)18;border-color:var(--gold);color:var(--gold)}

/* MATCHMAKING */
.match-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:18px;margin-bottom:10px;transition:border-color .14s}
.match-card:hover{border-color:var(--bd2)}
.compatibility-bar{height:8px;border-radius:4px;background:var(--bd);overflow:hidden;margin-top:6px}
.compatibility-fill{height:100%;border-radius:4px;transition:width .4s}
.jugador-chip{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;cursor:pointer;transition:all .13s}
.jugador-chip:hover{border-color:var(--ac)}
.jugador-chip.sel{border-color:var(--gold);background:var(--gold)10}

.partido-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--bd)44;font-size:12px}
.partido-row:hover{background:var(--s2)}

.card-head{padding:11px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}

.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:all .14s;display:inline-flex;align-items:center;gap:5px}

.btn-ghost{background:var(--s2);border:1px solid var(--bd2);color:var(--tx2)}

.btn-ok{background:var(--ok)18;color:var(--ok);border:1px solid var(--ok)44}

.finp:focus,.fsel:focus{border-color:var(--gold)}
.flbl{font-size:11px;color:var(--tx2);margin-bottom:4px;display:block;font-weight:500}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.overlay{position:fixed;inset:0;background:#00000099;display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}

// K-factor dinámico: más fluctuación para jugadores nuevos
function kFactor(partidos) {
  if (partidos < 10)  return 40  // Provisorio
  if (partidos < 30)  return 30  // Establecido
  return 20                       // Veterano
}

// Probabilidad esperada de victoria (fórmula ELO estándar)
function eloExpected(ratingA, ratingB) {
  return 1 / (1 + Math.pow(10, (ratingB - ratingA) / 400))
}

// Calcular nuevo ELO después de un partido
function calcElo(ratingA, ratingB, resultadoA, partidosA) {
  const expected = eloExpected(ratingA, ratingB)
  const K = kFactor(partidosA)
  const delta = Math.round(K * (resultadoA - expected))
  return { nuevo: ratingA + delta, delta }
}

// Color / visual por rango ELO (independiente del nombre de categoría por deporte)
function eloCategoria(elo) {
  if (elo >= 1900) return { color: '#f0c040', bg: '#f0c04018' }  // 1ª pádel / élite
  if (elo >= 1750) return { color: '#e8e0ff', bg: '#e8e0ff18' }  // 2ª
  if (elo >= 1600) return { color: '#e2e8f0', bg: '#e2e8f018' }  // 3ª
  if (elo >= 1480) return { color: '#cd7f32', bg: '#cd7f3218' }  // 4ª
  if (elo >= 1360) return { color: '#5b7fff', bg: '#5b7fff18' }  // 5ª
  if (elo >= 1250) return { color: '#2ecc71', bg: '#2ecc7118' }  // 6ª
  if (elo >= 1140) return { color: '#06b6d4', bg: '#06b6d418' }  // 7ª
  if (elo >= 1040) return { color: '#f0a020', bg: '#f0a02018' }  // 8ª
  if (elo >= 950)  return { color: '#e05050', bg: '#e0505018' }  // 9ª
  return               { color: '#8b5cf6', bg: '#8b5cf618' }     // 10ª / iniciación
}

  {id:'mx1', jugadores:['Carlos M.', 'Sofía L.'],      elo:{Pádel:1740}, partidos:{Pádel:12}, victorias:{Pádel:9},  tendencia:{Pádel:8}},
  {id:'mx2', jugadores:['Rodrigo F.', 'Valentina R.'], elo:{Pádel:1665}, partidos:{Pádel:8},  victorias:{Pádel:5},  tendencia:{Pádel:5}},
  {id:'mx3', jugadores:['Lucas M.', 'Camila V.'],      elo:{Pádel:1500}, partidos:{Pádel:6},  victorias:{Pádel:3},  tendencia:{Pádel:0}},
  {id:'mx4', jugadores:['Facundo T.', 'Ana C.'],       elo:{Pádel:1480}, partidos:{Pádel:5},  victorias:{Pádel:2},  tendencia:{Pádel:-5}},
  {id:'mx5', jugadores:['Carlos Méndez', 'Laura V.'],  elo:{Tenis:1650}, partidos:{Tenis:10}, victorias:{Tenis:7},  tendencia:{Tenis:10}},
]

function eloCatFederativa(elo, deporte) {
  if (deporte === 'Pádel') {
    // Argentina: 10ª (principiante) → 1ª (élite)
    if (elo >= 1900) return '1ª'
    if (elo >= 1750) return '2ª'
    if (elo >= 1600) return '3ª'
    if (elo >= 1480) return '4ª'
    if (elo >= 1360) return '5ª'
    if (elo >= 1250) return '6ª'
    if (elo >= 1140) return '7ª'
    if (elo >= 1040) return '8ª'
    if (elo >= 950)  return '9ª'
    return '10ª'
  }
  if (deporte === 'Tenis') {
    if (elo >= 1800) return '1ª'
    if (elo >= 1650) return '2ª'
    if (elo >= 1480) return '3ª'
    if (elo >= 1300) return '4ª'
    if (elo >= 1100) return '5ª'
    return 'Recreativo'
  }
  if (deporte.startsWith('Fútbol')) {
    if (elo >= 1700) return '1ª División'
    if (elo >= 1500) return '2ª División'
    if (elo >= 1300) return 'Amateur'
    if (elo >= 1150) return 'Sub-20'
    return 'Sub-17'
  }
  return eloCategoria(elo).cat
}

let activeTab       = 'ranking'
let rankDeporte     = 'Pádel'
let rankGenero      = 'M'   // 'M' | 'F' | 'MX'
let rankCategoria   = 'todas'
let matchJugadorSel = null

const fmt = n => n?.toLocaleString() || '—'
const jug = id => JUGADORES.find(j=>j.id===id)

// Obtener iniciales seguras — funciona tanto para jugadores como para duplas mixtas
function getIni(j) {
  if (!j) return '?'
  if (j.nombre) return j.nombre.split(' ').map(n=>n[0]).slice(0,2).join('')
  if (j.jugadores && j.jugadores.length) return (j.jugadores[0]?.[0]||'') + (j.jugadores[1]?.[0]||'')
  return '?'
}

// Obtener nombre de display seguro
function getNombre(j) {
  if (!j) return '?'
  if (j.nombre) return j.nombre
  if (j.jugadores) return j.jugadores.join(' & ')
  return '?'
}

function switchTab(t) {
  activeTab = t
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('on'))
  document.getElementById('tab-'+t)?.classList.add('on')
  renderMain()
}

  const deportesActivos = DEPORTES_RANKING.length
  const topElo = Math.max(...JUGADORES.flatMap(j=>Object.values(j.elo)))
  const totalPartidos = PARTIDOS_HIST.length
  const promElo = Math.round(JUGADORES.flatMap(j=>Object.values(j.elo)).reduce((a,b)=>a+b,0) / JUGADORES.flatMap(j=>Object.values(j.elo)).length)

    </div>

    </div>
    <div class="kpi" style="border-top:3px solid var(--ok)">

      <div class="kv" style="color:var(--ok)">${totalPartidos}</div>
      <div class="kl">este mes</div>
    </div>

function renderRanking() {
  const catsDeporte = CATS_POR_DEPORTE[rankDeporte] || []

  // Filtrar por deporte, división y categoría
  const esMixto = rankGenero === 'MX'

  // Para mixto: usar DUPLAS_MIXTAS en lugar de JUGADORES
  let jugsFiltrados = []
  if (esMixto) {
    jugsFiltrados = DUPLAS_MIXTAS
      .filter(d => d.elo[rankDeporte] !== undefined)
      .filter(d => rankCategoria === 'todas' || eloCatFederativa(d.elo[rankDeporte]||0, rankDeporte) === rankCategoria)
      .sort((a,b) => (b.elo[rankDeporte]||0) - (a.elo[rankDeporte]||0))
  } else {
    jugsFiltrados = JUGADORES.filter(j => {
      if (!j.deportes.includes(rankDeporte)) return false
      if (j.genero !== rankGenero) return false
      if (rankCategoria !== 'todas') {
        const catJug = eloCatFederativa(j.elo[rankDeporte]||0, rankDeporte)
        if (catJug !== rankCategoria) return false
      }
      return true
    })
    jugsFiltrados.sort((a,b) => (b.elo[rankDeporte]||0) - (a.elo[rankDeporte]||0))
  }

  let html = ''

  // ── Fila 1: Selector de deporte ──
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center">'
  html += '<span style="font-size:11px;color:var(--tx3);font-weight:600;margin-right:4px">Deporte:</span>'
  DEPORTES_RANKING.forEach(d => {
    const sel = d === rankDeporte
    html += '<button class="btn btn-sm ' + (sel?'btn-gold':'btn-ghost') + '" '
    html += 'onclick="rankDeporte=\'' + d + '\';rankCategoria=\'todas\';renderMain()">' + d + '</button>'
  })
  html += '</div>'

  // ── Fila 2: Filtro de división (Masculino / Femenino / Mixto como categoría de pareja) ──
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center">'
  html += '<span style="font-size:11px;color:var(--tx3);font-weight:600;margin-right:4px">División:</span>'

  const divOpts = [
    {id:'M',  label:'♂ Masculino', color:'var(--ac)',    tip:'Ranking de jugadores hombres'},
    {id:'F',  label:'♀ Femenino',  color:'var(--err)',   tip:'Ranking de jugadoras mujeres'},
  ]
  // Solo mostrar Mixto para deportes de paleta
  if (DEPORTES_CON_MIXTO.includes(rankDeporte)) {
    divOpts.push({id:'MX', label:'⚧ Mixto (dupla)', color:'var(--purple)', tip:'Duplas conformadas por 1 hombre y 1 mujer'})
  }

  divOpts.forEach(g => {
    const sel = g.id === rankGenero
    html += '<button onclick="rankGenero=\'' + g.id + '\';rankCategoria=\'todas\';renderMain()" '
    html += 'class="btn btn-sm" title="' + g.tip + '" '
    html += 'style="border:1px solid ' + (sel?g.color:'var(--bd2)') + ';background:' + (sel?g.color+'18':'var(--s2)') + ';color:' + (sel?g.color:'var(--tx2)') + '">'
    html += g.label + '</button>'
  })
  html += '</div>'

  // ── Fila 3: Filtro de categoría (se actualiza según deporte) ──
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center">'
  html += '<span style="font-size:11px;color:var(--tx3);font-weight:600;margin-right:4px">Categoría:</span>'

  // Chip "Todas"
  const selTodas = rankCategoria === 'todas'
  html += '<button onclick="rankCategoria=\'todas\';renderMain()" class="btn btn-sm" '
  html += 'style="border:1px solid ' + (selTodas?'var(--gold)':'var(--bd2)') + ';background:' + (selTodas?'var(--gold)18':'var(--s2)') + ';color:' + (selTodas?'var(--gold)':'var(--tx2)') + '">Todas</button>'

  // Chips por categoría con conteo de jugadores
  catsDeporte.forEach(cat => {
    const count = rankGenero === 'MX'
      ? DUPLAS_MIXTAS.filter(d => d.elo[rankDeporte] !== undefined && eloCatFederativa(d.elo[rankDeporte]||0, rankDeporte) === cat).length
      : JUGADORES.filter(j =>
          j.deportes.includes(rankDeporte) &&
          j.genero === rankGenero &&
          eloCatFederativa(j.elo[rankDeporte]||0, rankDeporte) === cat
        ).length
    if (!count) return  // No mostrar categoría sin jugadores
    const sel = rankCategoria === cat
    html += '<button onclick="rankCategoria=\'' + cat + '\';renderMain()" class="btn btn-sm" '
    html += 'style="border:1px solid ' + (sel?'var(--gold)':'var(--bd2)') + ';background:' + (sel?'var(--gold)18':'var(--s2)') + ';color:' + (sel?'var(--gold)':'var(--tx2)') + '">'
    html += cat + ' <span style="font-size:9px;opacity:.7">(' + count + ')</span>'
    html += '</button>'
  })

  html += '<span style="margin-left:auto;font-size:11px;color:var(--tx3)">'
  if (rankGenero === 'MX') {
    html += jugsFiltrados.length + ' dupla' + (jugsFiltrados.length===1?'':'s') + ' mixta' + (jugsFiltrados.length===1?'':'s')
  } else {
    html += jugsFiltrados.length + ' jugador' + (jugsFiltrados.length===1?'':'es')
  }
  if (rankCategoria !== 'todas') html += ' · ' + rankCategoria
  html += '</span>'
  html += '</div>'

  // ── Tabla de ranking ──
  if (!jugsFiltrados.length) {
    html += '<div style="background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:30px;text-align:center;color:var(--tx3);font-size:13px">'
    html += '<div style="font-size:28px;margin-bottom:8px">🔍</div>'
    html += 'No hay jugadores con ese filtro. Probá con otra categoría o género.'
    html += '</div>'
    return html
  }

  html += '<div class="card">'
  html += '<div class="card-head">'
  html += '<span class="card-title">🏆 Ranking — ' + rankDeporte
  if (rankCategoria !== 'todas') html += ' · ' + rankCategoria
  if (rankGenero === 'M') html += ' · ♂ Masculino'
  else if (rankGenero === 'F') html += ' · ♀ Femenino'
  else if (rankGenero === 'MX') html += ' · ⚧ Duplas mixtas'
  html += '</span>'
  html += '<button class="btn btn-ghost btn-sm" onclick="toast(\'Exportando ranking...\')">↓ Exportar</button>'
  html += '</div>'

  jugsFiltrados.forEach((j, i) => {
    const elo     = j.elo[rankDeporte] || 0
    const cat     = eloCategoria(elo)
    const catFed  = eloCatFederativa(elo, rankDeporte)
    const partsD  = j.partidos[rankDeporte] || 0
    const victD   = j.victorias[rankDeporte] || 0
    const pct     = partsD ? Math.round(victD/partsD*100) : 0
    const tend    = j.tendencia[rankDeporte] || 0
    const ini     = getIni(j)
    const posColors = ['var(--gold)','#e2e8f0','#cd7f32']
    const posColor  = i < 3 ? posColors[i] : 'var(--tx3)'
    const gColor    = j.genero==='M' ? 'var(--ac)' : 'var(--err)'
    const gIcon     = j.genero==='M' ? '♂' : '♀'

    html += '<div class="rank-row" style="grid-template-columns:44px 44px 1fr auto auto auto auto;gap:10px" onclick="openJugadorPerfil(' + j.id + ')">'
    html += '<div class="rank-num" style="color:' + posColor + '">' + (i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1) + '</div>'
    html += '<div class="rank-avatar" style="background:' + cat.bg + ';color:' + cat.color + '">' + ini + '</div>'
    html += '<div>'
    html += '<div class="rank-name">' + j.nombre + ' <span style="font-size:10px;color:' + gColor + '">' + gIcon + '</span></div>'
    html += '<div class="rank-meta">' + partsD + ' partidos · ' + pct + '% victorias · ' + catFed + '</div>'
    html += '</div>'
    html += '<div style="text-align:center"><span class="badge" style="background:' + cat.bg + ';color:' + cat.color + '">' + catFed + '</span></div>'
    html += '<div style="text-align:right"><span class="' + (tend>0?'trend-up':tend<0?'trend-dn':'trend-eq') + '">' + (tend>0?'▲':tend<0?'▼':'—') + ' ' + (Math.abs(tend)||'') + '</span></div>'
    html += '<div><span class="elo-pill" style="background:' + cat.bg + ';color:' + cat.color + '">' + elo + '</span></div>'
    html += '<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();matchJugadorSel=' + j.id + ';switchTab(\'matchmaking\')">⚡ Match</button>'
    html += '</div>'
  })

  html += '</div>'

  // ── Leyenda de categorías del deporte activo ──
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center">'
  html += '<span style="font-size:10px;color:var(--tx3);font-weight:600">Categorías:</span>'
  const COLORES_CAT = ['#f0c040','#e8e0ff','#e2e8f0','#cd7f32','#5b7fff','#2ecc71','#06b6d4','#f0a020','#e05050','#8b5cf6']
  catsDeporte.forEach((c, ci) => {
    const count = rankGenero === 'MX'
      ? DUPLAS_MIXTAS.filter(d => d.elo[rankDeporte] !== undefined && eloCatFederativa(d.elo[rankDeporte]||0, rankDeporte) === c).length
      : JUGADORES.filter(j =>
          j.deportes.includes(rankDeporte) &&
          j.genero === rankGenero &&
          eloCatFederativa(j.elo[rankDeporte]||0, rankDeporte) === c
        ).length
    if (!count) return
    html += '<div style="display:flex;align-items:center;gap:4px;font-size:10px">'
    html += '<div style="width:8px;height:8px;border-radius:50%;background:' + (COLORES_CAT[ci]||'var(--ac)') + '"></div>'
    html += '<span style="color:var(--tx3)">' + c + ' (' + count + ')</span>'
    html += '</div>'
  })
  html += '</div>'

  return html
}

  let html = `<div style="display:grid;grid-template-columns:300px 1fr;gap:14px">`

  html += '<div>'
  html += '<div class="card" style="margin:0">'

function renderRivalesSugeridos(jugSel) {
  let html = ''

  // Para cada deporte del jugador seleccionado
  jugSel.deportes.forEach(deporte => {
    const eloSel = jugSel.elo[deporte] || 0
    const catSel = eloCategoria(eloSel)

    // Encontrar rivales potenciales: mismo deporte, diferente jugador, ELO cercano
    const rivales = JUGADORES
      .filter(j => j.id !== jugSel.id && j.deportes.includes(deporte) && j.activo)
      .map(j => {
        const eloRival   = j.elo[deporte] || 0
        const difElo     = Math.abs(eloSel - eloRival)
        const compatPct  = Math.max(0, Math.round(100 - difElo/8))
        // Probabilidad de victoria del jugador seleccionado
        const probVic    = Math.round(eloExpected(eloSel, eloRival) * 100)
        return { ...j, eloRival, difElo, compatPct, probVic, deporte }
      })
      .sort((a,b) => a.difElo - b.difElo)
      .slice(0, 6)

    html += `<div class="card" style="margin-bottom:14px">`
    html += `<div class="card-head">
      <span class="card-title">⚡ Rivales sugeridos — ${deporte}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:30px;height:30px;border-radius:50%;background:${catSel.bg};color:${catSel.color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">
          ${getIni(jugSel)}
        </div>
        <div>
          <div style="font-size:12px;font-weight:600">${jugSel.nombre}</div>
          <div style="font-size:10px;color:var(--tx3)">${eloSel} ELO · ${catSel.cat}</div>
        </div>
      </div>
    </div>`

    rivales.forEach(r => {
      const catR   = eloCategoria(r.eloRival)
      const ini    = getIni(r)
      const gColor = r.genero==='M' ? 'var(--ac)' : 'var(--err)'
      const compatColor = r.compatPct >= 85 ? 'var(--ok)' : r.compatPct >= 60 ? 'var(--warn)' : 'var(--err)'

      html += `<div class="match-card" onclick="openDesafio(${jugSel.id},${r.id},'${deporte}')">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:40px;height:40px;border-radius:50%;background:${catR.bg};color:${catR.color};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0">${ini}</div>
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:7px">
              <span style="font-size:13px;font-weight:600;color:var(--tx)">${r.nombre}</span>
              <span style="font-size:10px;color:${gColor}">${r.genero==='M'?'♂':'♀'}</span>
              <span class="badge" style="background:${catR.bg};color:${catR.color}">${catR.cat}</span>
            </div>
            <div style="font-size:11px;color:var(--tx3);margin-top:2px">${r.eloRival} ELO · diferencia ${r.difElo} pts · Prob. victoria: <strong style="color:${r.probVic>55?'var(--ok)':r.probVic>45?'var(--warn)':'var(--err)'}">${r.probVic}%</strong></div>
            <div class="compatibility-bar">
              <div class="compatibility-fill" style="width:${r.compatPct}%;background:${compatColor}"></div>
            </div>
            <div style="font-size:10px;color:${compatColor};margin-top:2px">Compatibilidad: ${r.compatPct}%</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <button class="btn btn-gold btn-sm" onclick="event.stopPropagation();openDesafio(${jugSel.id},${r.id},'${deporte}')">
              Desafiar →
            </button>
          </div>
        </div>
      </div>`
    })

    html += '</div>'
  })

  return html
}

function renderHistorial() {
  let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'

  // Últimos partidos
  html += '<div class="card" style="margin:0"><div class="card-head"><span class="card-title">📋 Últimos partidos</span></div>'
  PARTIDOS_HIST.forEach(p => {
    const j1   = jug(p.j1), j2 = jug(p.j2)
    const win  = p.ganador === p.j1 ? j1 : j2
    const lose = p.ganador === p.j1 ? j2 : j1
    const delta = p.ganador === p.j1 ? p.eloDelta : p.eloRival
    html += `<div class="partido-row">
      <div style="font-size:10px;color:var(--tx3);flex-shrink:0;min-width:80px">${p.fecha}</div>
      <div style="flex:1">
        <span style="font-weight:600;color:var(--ok)">${win?.nombre}</span>
        <span style="color:var(--tx3)"> vs </span>
        <span style="color:var(--tx2)">${lose?.nombre}</span>
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--tx2);flex-shrink:0">${p.res}</div>
      <div style="flex-shrink:0;min-width:60px;text-align:right;font-size:11px;font-weight:600;color:var(--gold)">${p.d}</div>
    </div>`
  })
  html += '</div>'

  // Mini gráfico evolución ELO top jugadores
  html += '<div class="card" style="margin:0"><div class="card-head"><span class="card-title">📈 Evolución ELO — Top jugadores</span>'
  html += `<select class="finp" id="hist-deporte" onchange="renderMain()" style="width:auto;margin:0;padding:4px 8px;font-size:11px">
    ${DEPORTES_RANKING.map(d=>`<option>${d}</option>`).join('')}
  </select>`
  html += '</div><div class="card-body">'

  const TOP_COLORS = ['var(--gold)','var(--purple)','var(--ac)','var(--ok)','var(--teal)']
  const topJugs = JUGADORES.filter(j=>j.deportes.includes('Pádel')).sort((a,b)=>(b.elo['Pádel']||0)-(a.elo['Pádel']||0)).slice(0,5)

  const maxElo = Math.max(...topJugs.flatMap(j=>j.histElo['Pádel']||[]))
  const minElo = Math.min(...topJugs.flatMap(j=>j.histElo['Pádel']||[])) - 20
  const rng    = maxElo - minElo
  const W = 300, H = 140, PAD = 16

  html += `<svg width="100%" viewBox="0 0 ${W+PAD*2} ${H+PAD*2}" style="overflow:visible">`
  // Líneas de guía
  ;[0,0.25,0.5,0.75,1].forEach(t => {
    const y = PAD + H*(1-t)
    const elo = Math.round(minElo + rng*t)
    html += `<line x1="${PAD}" y1="${y}" x2="${PAD+W}" y2="${y}" stroke="var(--bd)" stroke-width="0.5" stroke-dasharray="3 3"/>`
    html += `<text x="${PAD-4}" y="${y+3}" font-size="8" fill="var(--tx3)" text-anchor="end" font-family="DM Mono">${elo}</text>`
  })

  topJugs.forEach((j, ji) => {
    const hist = j.histElo['Pádel'] || []
    if (!hist.length) return
    const pts = hist.map((e,i) => {
      const x = PAD + (i/(hist.length-1))*W
      const y = PAD + H*(1-(e-minElo)/rng)
      return `${x},${y}`
    })
    const color = TOP_COLORS[ji]
    html += `<polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>`
    // Punto final
    const [lx,ly] = pts[pts.length-1].split(',')
    html += `<circle cx="${lx}" cy="${ly}" r="3" fill="${color}"/>`
    // Label
    html += `<text x="${parseFloat(lx)+5}" y="${parseFloat(ly)+4}" font-size="9" fill="${color}" font-family="DM Sans" font-weight="600">${getNombre(j).split(' ')[0]}</text>`
  })
  html += '</svg>'

  // Leyenda
  html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px">'
  topJugs.forEach((j,ji) => {
    html += `<div style="display:flex;align-items:center;gap:4px;font-size:10px">
      <div style="width:12px;height:3px;border-radius:2px;background:${TOP_COLORS[ji]}"></div>
      <span style="color:var(--tx3)">${j.nombre}</span>
    </div>`
  })
  html += '</div>'
  html += '</div></div>'

  html += '</div>'

  // Tabla de movimientos recientes
  html += '<div class="card" style="margin-top:14px"><div class="card-head"><span class="card-title">🔄 Movimientos de ELO recientes</span></div>'
  html += '<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr>'
  ;['Jugador','Deporte','Resultado','ELO antes','Delta','ELO nuevo','Rival','Fecha'].forEach(h => {
    html += `<th style="padding:8px 12px;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd);text-align:left">${h}</th>`
  })
  html += '</tr></thead><tbody>'

  PARTIDOS_HIST.slice(0,8).forEach(p => {
    const ganJ  = jug(p.ganador)
    const perJ  = jug(p.ganador===p.j1?p.j2:p.j1)
    const eloAnte = (ganJ?.elo[p.d]||0) - p.eloDelta
    ;[
      {j:ganJ,  delta:p.eloDelta,  rival:perJ,  res:'✓'},
      {j:perJ,  delta:p.eloRival,  rival:ganJ,  res:'✗'},
    ].forEach(row => {
      if (!row.j) return
      html += `<tr style="border-bottom:1px solid var(--bd)44">
        <td style="padding:8px 12px;font-weight:600">${row.j.nombre}</td>
        <td style="padding:8px 12px;color:var(--tx3)">${p.d}</td>
        <td style="padding:8px 12px;font-size:14px">${row.res}</td>
        <td style="padding:8px 12px;font-family:'DM Mono',monospace">${(row.j.elo[p.d]||0) - row.delta}</td>
        <td style="padding:8px 12px;font-family:'DM Mono',monospace;font-weight:700;color:${row.delta>0?'var(--ok)':'var(--err)'}">${row.delta>0?'+':''}${row.delta}</td>
        <td style="padding:8px 12px;font-family:'DM Mono',monospace;font-weight:700;color:var(--gold)">${row.j.elo[p.d]||0}</td>
        <td style="padding:8px 12px;color:var(--tx2)">${row.rival?.nombre||'—'}</td>
        <td style="padding:8px 12px;color:var(--tx3)">${p.fecha}</td>
      </tr>`
    })
  })
  html += '</tbody></table></div>'

  return html
}

function guardarResultadoElo(j1Id, j2Id, deporte) {
  const j1  = JUGADORES.find(j=>j.id===j1Id)
  const j2  = JUGADORES.find(j=>j.id===j2Id)
  if (!j1||!j2) return
  const r1 = parseInt(document.getElementById('res1')?.value)||0
  const r2 = parseInt(document.getElementById('res2')?.value)||0
  if (r1===r2) { toast('El resultado no puede ser empate','warn'); return }

  const ganador   = r1>r2 ? j1 : j2
  const perdedor  = r1>r2 ? j2 : j1
  const resultGan = 1, resultPer = 0

  const {nuevo:nuevoGan, delta:dGan} = calcElo(ganador.elo[deporte]||1200, perdedor.elo[deporte]||1200, resultGan, ganador.partidos[deporte]||0)
  const {nuevo:nuevoPer, delta:dPer} = calcElo(perdedor.elo[deporte]||1200, ganador.elo[deporte]||1200, resultPer, perdedor.partidos[deporte]||0)

  // Actualizar ELOs
  ganador.elo[deporte]  = nuevoGan
  perdedor.elo[deporte] = nuevoPer
  ganador.partidos[deporte]  = (ganador.partidos[deporte]||0) + 1
  ganador.victorias[deporte] = (ganador.victorias[deporte]||0) + 1
  perdedor.partidos[deporte] = (perdedor.partidos[deporte]||0) + 1

  // Actualizar historial de ELO
  if (!ganador.histElo[deporte]) ganador.histElo[deporte] = []
  if (!perdedor.histElo[deporte]) perdedor.histElo[deporte] = []
  ganador.histElo[deporte].push(nuevoGan)
  perdedor.histElo[deporte].push(nuevoPer)
  ganador.tendencia[deporte]  = dGan
  perdedor.tendencia[deporte] = dPer

  // Agregar al historial
  PARTIDOS_HIST.unshift({
    id: PARTIDOS_HIST.length+1,
    fecha: new Date().toLocaleDateString('es-AR',{day:'numeric',month:'short',year:'numeric'}),
    j1:j1Id, j2:j2Id, d:deporte,
    res: r1+'-'+r2,
    ganador: ganador.id,
    eloDelta: dGan, eloRival: dPer,
  })

  closeModal()
  renderMain()
  toast(`✓ ELO actualizado — ${ganador.nombre} ${nuevoGan} (${dGan>0?'+':''}${dGan}) · ${perdedor.nombre} ${nuevoPer} (${dPer})`)
}

  const jugId  = parseInt(document.getElementById('adj-jug')?.value)
  const dep    = document.getElementById('adj-dep')?.value
  const nuevoElo = parseInt(document.getElementById('adj-elo')?.value)
  if (!nuevoElo || nuevoElo < 100) { toast('Ingresá un ELO válido','warn'); return }
  const j = JUGADORES.find(x=>x.id===jugId)
  if (!j) return
  j.elo[dep] = nuevoElo
  if (!j.histElo[dep]) j.histElo[dep] = []
  j.histElo[dep].push(nuevoElo)
  closeModal(); renderMain()
  toast(`✓ ELO de ${j.nombre} ajustado a ${nuevoElo} en ${dep}`)
}

// ══════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════
function showModal(html) {
  document.getElementById('modal-body').innerHTML = html
  document.getElementById('modal').style.display  = 'flex'
}
function closeModal() { document.getElementById('modal').style.display='none' }

function toast(msg,type='success') {
  const cols={success:'var(--ok)',warn:'var(--warn)',error:'var(--err)'}
  const t=document.createElement('div');t.className='toast'
  t.innerHTML='<span style="color:'+(cols[type]||cols.success)+'">●</span> '+msg
  document.body.appendChild(t);setTimeout(()=>t.remove(),2800)
}
function toggleTheme() {
  const h=document.documentElement
  h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark')
  localStorage.setItem('shos-theme',h.getAttribute('data-theme'))
}
const st=localStorage.getItem('shos-theme')
if(st) document.documentElement.setAttribute('data-theme',st)

renderMain()
</script>
