<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sport Hub OS — Torneos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root[data-theme="dark"]{
  --bg:#05060e;--s1:#090b16;--s2:#0d1020;--s3:#111525;
  --bd:#171e30;--bd2:#1e2840;--bd3:#283450;
  --tx:#dde3f5;--tx2:#7a8db2;--tx3:#5a739a;
  --ac:#5b7fff;--ok:#2ecc71;--warn:#f0a020;--err:#e05050;
  --gold:#f0c040;--purple:#8b5cf6;
  --sh:0 8px 40px #00000099;--sh2:0 2px 12px #00000055;
}
:root[data-theme="light"]{
  --bg:#eef1f9;--s1:#fff;--s2:#f5f7fd;--s3:#edf0f8;
  --bd:#dde3f0;--bd2:#c8d0e8;--bd3:#b0bed8;
  --tx:#0d1530;--tx2:#5a6a90;--tx3:#9aaac8;
  --ac:#3d63f0;--ok:#16a34a;--warn:#d97706;--err:#dc2626;
  --gold:#ca8a04;--purple:#7c3aed;
  --sh:0 4px 20px #0000001a;--sh2:0 2px 8px #00000012;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px}

.top{display:flex;align-items:center;gap:12px;padding:10px 24px;background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;box-shadow:var(--sh2)}
.lb{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#f0c040,#f97316);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;font-family:'Syne',sans-serif}
.ln{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.ttog{width:40px;height:22px;border-radius:11px;background:var(--bd2);cursor:pointer;position:relative;margin-left:auto;flex-shrink:0}
.ttog::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--gold);transition:transform .2s}
[data-theme="light"] .ttog::after{transform:translateX(18px)}

.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bd);padding:0 24px;overflow-x:auto}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--tx2);border-bottom:2px solid transparent;cursor:pointer;transition:all .14s;white-space:nowrap}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--tx);border-bottom-color:var(--gold)}

.main{padding:22px 26px;max-width:1400px;margin:0 auto}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kv{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1;margin-top:5px}
.kl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}

/* TORNEOS GRID */
.torneos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:20px}
.torneo-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s}
.torneo-card:hover{border-color:var(--bd2);transform:translateY(-2px)}
.tc-header{padding:16px;border-bottom:1px solid var(--bd)}
.tc-sport{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.tc-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:3px}
.tc-meta{font-size:11px;color:var(--tx2)}
.tc-status{display:inline-flex;align-items:center;font-size:10px;font-weight:700;border-radius:20px;padding:3px 10px;margin-top:6px}
.tc-stats{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--bd)}
.tcs{padding:10px 12px;text-align:center;border-right:1px solid var(--bd)}
.tcs:last-child{border-right:none}
.tcs-val{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.tcs-lbl{font-size:9px;color:var(--tx3);text-transform:uppercase;margin-top:2px}

/* BRACKET */
.bracket-wrap{overflow-x:auto;padding-bottom:10px}
.bracket{display:flex;gap:0;align-items:stretch;min-width:fit-content}
.bracket-round{display:flex;flex-direction:column;justify-content:space-around;min-width:180px;padding:0 8px;border-right:1px solid var(--bd)55}
.bracket-round:last-child{border-right:none}
.round-title{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;text-align:center;padding:6px 0 10px}
.match-slot{margin:4px 0;position:relative}
.match-card{background:var(--s2);border:1px solid var(--bd);border-radius:8px;overflow:hidden;transition:border-color .14s}
.match-card:hover{border-color:var(--bd2)}
.match-card.clickable{cursor:pointer}
.match-team{display:flex;align-items:center;gap:7px;padding:7px 10px;border-bottom:1px solid var(--bd)55;font-size:12px;transition:background .12s}
.match-team:last-child{border-bottom:none}
.match-team.winner{background:var(--ok)0c;font-weight:600;color:var(--ok)}
.match-team.loser{opacity:.5}
.match-seed{font-size:9px;color:var(--tx3);width:14px;text-align:center;flex-shrink:0}
.match-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.match-score{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;flex-shrink:0;min-width:18px;text-align:center}
.match-bye{padding:14px 10px;font-size:11px;color:var(--tx3);text-align:center;font-style:italic}
.bracket-connector{position:absolute;right:-8px;top:50%;width:8px;height:1px;background:var(--bd2)}

/* TABLA POSICIONES */
.pos-table{width:100%;border-collapse:collapse;font-size:12px}
.pos-table th{padding:8px 12px;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd);text-align:left}
.pos-table th.r{text-align:right}
.pos-table td{padding:9px 12px;border-bottom:1px solid var(--bd)44;vertical-align:middle}
.pos-table tr:hover td{background:var(--s2)}
.pos-table tr:last-child td{border-bottom:none}
.pos-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;font-family:'Syne',sans-serif}

/* INSCRIPTOS */
.inscripto-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--bd)44;font-size:12px;transition:background .12s}
.inscripto-row:hover{background:var(--s2)}
.inscripto-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}

/* CARD / BTN */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;margin-bottom:14px;overflow:hidden}
.card-head{padding:11px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;font-family:'Syne',sans-serif}
.card-body{padding:14px 16px}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:all .14s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{opacity:.85}
.btn-primary{background:var(--ac);color:#fff}
.btn-gold{background:var(--gold);color:#0d1020}
.btn-ghost{background:var(--s2);border:1px solid var(--bd2);color:var(--tx2)}
.btn-ghost:hover{color:var(--tx);border-color:var(--bd3)}
.btn-ok{background:var(--ok)18;color:var(--ok);border:1px solid var(--ok)44}
.btn-err{background:var(--err)18;color:var(--err);border:1px solid var(--err)44}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 12px;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap}
.tbl th.r{text-align:right}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--bd)55;vertical-align:middle}
.tbl tr:hover td{background:var(--s2)}
.tbl tr:last-child td{border-bottom:none}

/* FORM */
.overlay{position:fixed;inset:0;background:#00000099;display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:16px;padding:24px;width:100%;max-width:540px;box-shadow:var(--sh);max-height:92vh;overflow-y:auto;animation:su .18s}
@keyframes su{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--tx2);margin-bottom:16px}
.flbl{font-size:11px;color:var(--tx2);margin-bottom:4px;display:block;font-weight:500}
.finp,.fsel{width:100%;padding:9px 12px;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;margin-bottom:10px;transition:border-color .15s}
.finp:focus,.fsel:focus{border-color:var(--gold)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.tog{width:34px;height:19px;border-radius:10px;background:var(--bd2);cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.tog.on{background:var(--ok)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:transform .2s}
.tog.on::after{transform:translateX(15px)}
.toast{position:fixed;bottom:18px;right:18px;background:var(--s1);border:1px solid var(--bd2);border-radius:10px;padding:10px 16px;font-size:12px;color:var(--tx);z-index:300;box-shadow:var(--sh);display:flex;align-items:center;gap:8px;animation:ts .2s}
@keyframes ts{from{transform:translateX(110%)}to{transform:translateX(0)}}
</style>
</head>
<body>

<header class="top">
  <div class="lb">🏆</div>
  <div>
    <div class="ln">Sport Hub OS — Torneos y Fixture</div>
    <div style="font-size:10px;color:var(--tx3)">Sport Hub Norte</div>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <button class="btn btn-ghost btn-sm" onclick="switchTab('lista')">Ver todos</button>
    <button class="btn btn-gold" onclick="openNuevoTorneo()">+ Nuevo torneo</button>
    <div class="ttog" onclick="toggleTheme()"></div>
  </div>
</header>

<div class="tabs">
  <div class="tab on" id="tab-lista"       onclick="switchTab('lista')">🏆 Torneos</div>
  <div class="tab"    id="tab-fixture"     onclick="switchTab('fixture')">📊 Fixture</div>
  <div class="tab"    id="tab-posiciones"  onclick="switchTab('posiciones')">📋 Posiciones</div>
  <div class="tab"    id="tab-inscriptos"  onclick="switchTab('inscriptos')">👤 Inscriptos</div>
  <div class="tab"    id="tab-resultados"  onclick="switchTab('resultados')">⚽ Cargar resultados</div>
</div>

<div class="main" id="main"></div>

<div class="overlay" id="modal" style="display:none" onclick="if(event.target.id==='modal')closeModal()">
  <div class="modal" onclick="event.stopPropagation()" id="modal-body"></div>
</div>

<script>
const fmt = n => n>=1000?'$'+(n/1000).toFixed(0)+'k':'$'+n.toLocaleString()

// ══════════════════════════════════════════════════════════
//  DATOS
// ══════════════════════════════════════════════════════════
// ── Base global de jugadores del club (deporte, categoría, género) ──────────
// En producción esto viene de la DB — jugadores que alguna vez participaron
const JUGADORES_CLUB = [
  // Pádel
  {id:1,  nombre:'Carlos M.',    deportes:['Pádel'],            categorias:['3ª','4ª'],     genero:'M', activo:true,  phone:'11-4521-3344'},
  {id:2,  nombre:'Rodrigo F.',   deportes:['Pádel'],            categorias:['3ª','4ª'],     genero:'M', activo:true,  phone:'11-3322-6677'},
  {id:3,  nombre:'Facundo T.',   deportes:['Pádel','Fútbol 5'], categorias:['4ª','Amateur'],genero:'M', activo:true,  phone:'11-9988-4455'},
  {id:4,  nombre:'Agustín P.',   deportes:['Pádel','Fútbol 5'], categorias:['4ª','Amateur'],genero:'M', activo:true,  phone:'11-7744-8899'},

  {id:7,  nombre:'Emilio R.',    deportes:['Pádel'],            categorias:['5ª'],          genero:'M', activo:true,  phone:'11-7788-9900'},
  {id:8,  nombre:'Nicolás F.',   deportes:['Pádel'],            categorias:['5ª'],          genero:'M', activo:true,  phone:'11-8899-0011'},
  {id:9,  nombre:'Diego H.',     deportes:['Pádel','Fútbol 5'], categorias:['4ª','Amateur'],genero:'M', activo:false, phone:'11-3344-5566'},
  {id:10, nombre:'Matías R.',    deportes:['Pádel','Fútbol 5'], categorias:['5ª','Amateur'],genero:'M', activo:true,  phone:'11-2233-4455'},
  // Mujeres pádel
  {id:11, nombre:'Sofía L.',     deportes:['Pádel'],            categorias:['3ª','4ª'],     genero:'F', activo:true,  phone:'11-8899-1122'},
  {id:12, nombre:'Valentina R.', deportes:['Pádel'],            categorias:['4ª'],          genero:'F', activo:true,  phone:'11-4455-7788'},
  {id:13, nombre:'Ana C.',       deportes:['Pádel','Yoga'],     categorias:['4ª'],          genero:'F', activo:true,  phone:'11-6677-8899'},
  {id:14, nombre:'Camila V.',    deportes:['Pádel','Yoga'],     categorias:['4ª','5ª'],     genero:'F', activo:true,  phone:'11-5544-9900'},
  {id:15, nombre:'Martina G.',   deportes:['Pádel'],            categorias:['5ª'],          genero:'F', activo:false, phone:'11-3322-0011'},
  {id:16, nombre:'Isabella D.',  deportes:['Pádel','Natación'], categorias:['5ª'],          genero:'F', activo:true,  phone:'11-2211-3344'},
  {id:17, nombre:'Laura V.',     deportes:['Pádel','Tenis'],    categorias:['3ª'],          genero:'F', activo:true,  phone:'11-5533-2211'},
  {id:18, nombre:'Florencia T.', deportes:['Pádel'],            categorias:['3ª','4ª'],     genero:'F', activo:true,  phone:'11-1122-4455'},
  // Fútbol 5
  {id:19, nombre:'Pablo R.',     deportes:['Fútbol 5'],         categorias:['Amateur'],     genero:'M', activo:true,  phone:'11-4466-7788'},
  {id:20, nombre:'Jorge F.',     deportes:['Fútbol 5'],         categorias:['Amateur'],     genero:'M', activo:true,  phone:'11-5577-8899'},
  {id:21, nombre:'Martín S.',    deportes:['Fútbol 5','Pádel'], categorias:['Amateur','5ª'],genero:'M', activo:true,  phone:'11-6688-9900'},
  // Tenis
  {id:22, nombre:'Carlos Méndez',deportes:['Tenis'],            categorias:['2ª'],          genero:'M', activo:true,  phone:'11-7799-0011'},
  {id:23, nombre:'Ana Torres',   deportes:['Tenis','Natación'], categorias:['3ª'],          genero:'F', activo:true,  phone:'11-8800-1122'},
]

// Categorías disponibles por deporte
const CATEGORIAS_POR_DEPORTE = {
  padel:  ['1ª','2ª','3ª','4ª','5ª','6ª','7ª','Recreativo','Iniciación'],
  futbol: ['1ª División','2ª División','Amateur','Sub-20','Sub-17','Mixto'],
  tenis:  ['1ª','2ª','3ª','4ª','Recreativo'],
  general:['Elite','Avanzado','Intermedio','Principiante','Recreativo'],
}

function getCategoriasPorSport(sport) {
  const s = sport.toLowerCase()
  if (s.includes('pádel') || s.includes('padel')) return CATEGORIAS_POR_DEPORTE.padel
  if (s.includes('fútbol') || s.includes('futbol')) return CATEGORIAS_POR_DEPORTE.futbol
  if (s.includes('tenis')) return CATEGORIAS_POR_DEPORTE.tenis
  return CATEGORIAS_POR_DEPORTE.general
}

// ── Panel de invitaciones — entrada principal ────────────────────────────────
function openPanelInvitaciones() {
  // Recopilar deportes y categorías disponibles
  const deportes = [...new Set(JUGADORES_CLUB.flatMap(j=>j.deportes))].sort()

  showModal(buildPanelInvModal(deportes))
  filtrarJugadoresInv()
}

function buildPanelInvModal(deportes) {
  return `
    <div class="modal-title">📨 Enviar invitaciones a torneo</div>
    <div class="modal-sub">Filtrá por deporte, categoría y género para encontrar exactamente a quién invitar.</div>

    <!-- Deporte -->
    <label class="flbl">Deporte</label>
    <div id="inv-deportes" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">
      <div onclick="setInvDeporte('todos')" id="invd-todos"
        style="padding:5px 14px;border-radius:8px;border:1px solid var(--gold);background:var(--gold)15;color:var(--gold);font-size:12px;font-weight:600;cursor:pointer">
        Todos los deportes
      </div>
      ${deportes.map(d=>`
        <div onclick="setInvDeporte('${d}')" id="invd-${d.replace(/\s/g,'_')}"
          style="padding:5px 14px;border-radius:8px;border:1px solid var(--bd2);background:var(--s2);color:var(--tx2);font-size:12px;font-weight:500;cursor:pointer;transition:all .13s">
          ${d}
        </div>`).join('')}
    </div>

    <!-- Categorías (se actualizan dinámicamente) -->
    <label class="flbl">Categoría <span style="color:var(--tx3)">(podés elegir varias)</span></label>
    <div id="inv-categorias" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">
      <div onclick="toggleInvCat('todas')" id="invc-todas"
        style="padding:4px 12px;border-radius:7px;border:1px solid var(--ac)33;background:var(--ac)12;color:var(--ac);font-size:11px;font-weight:600;cursor:pointer">
        ✓ Todas las categorías
      </div>
    </div>

    <!-- Género -->
    <label class="flbl">Género del torneo</label>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      ${[
        {id:'todos',   label:'Mixto',   icon:'⚧',  color:'var(--purple)'},
        {id:'M',       label:'Masculino',icon:'♂',  color:'var(--ac)'},
        {id:'F',       label:'Femenino', icon:'♀',  color:'var(--err)'},
      ].map(g=>`
        <div onclick="setInvGenero('${g.id}')" id="invg-${g.id}"
          style="flex:1;text-align:center;padding:8px 10px;border-radius:9px;border:1px solid ${g.id==='todos'?g.color+' ':'var(--bd2)'};
          background:${g.id==='todos'?g.color+'18':'var(--s2)'};
          color:${g.id==='todos'?g.color:'var(--tx2)'};cursor:pointer;transition:all .15s;font-size:12px;font-weight:500">
          <div style="font-size:16px">${g.icon}</div>${g.label}
        </div>`).join('')}
    </div>

    <!-- Solo activos -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div class="tog on" id="inv-solo-activos" onclick="this.classList.toggle('on');filtrarJugadoresInv()"></div>
      <div style="font-size:12px;color:var(--tx2)">Solo jugadores activos</div>
      <div style="margin-left:auto">
        <button class="btn btn-ghost btn-sm" onclick="selTodosInv(true)">✓ Todos</button>
        <button class="btn btn-ghost btn-sm" onclick="selTodosInv(false)">✗ Ninguno</button>
      </div>
    </div>

    <!-- Lista filtrada -->
    <div style="font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">
      Jugadores a invitar — <span id="inv-count" style="color:var(--gold)">0</span> seleccionados
    </div>
    <div id="inv-lista" style="display:flex;flex-wrap:wrap;gap:5px;max-height:160px;overflow-y:auto;
      border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:14px;background:var(--s2)">
    </div>

    <!-- Mensaje -->
    <label class="flbl">Mensaje WhatsApp — personalizá antes de enviar</label>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">
      ${[

let _invDeporte   = 'todos'
let _invCats      = new Set(['todas'])
let _invGenero    = 'todos'
let _invSel       = new Set()  // ids seleccionados

function setInvDeporte(d) {
  _invDeporte = d
  // Actualizar chips de deporte
  document.querySelectorAll('[id^="invd-"]').forEach(el => {
    el.style.background  = 'var(--s2)'
    el.style.borderColor = 'var(--bd2)'
    el.style.color       = 'var(--tx2)'
  })
  const sel = document.getElementById('invd-' + (d==='todos'?'todos':d.replace(/\s/g,'_')))
  if (sel) { sel.style.background='var(--gold)15'; sel.style.borderColor='var(--gold)'; sel.style.color='var(--gold)' }

  // Actualizar categorías según el deporte
  const catsCont = document.getElementById('inv-categorias')
  if (catsCont) {
    const cats = d==='todos'
      ? [...new Set(JUGADORES_CLUB.flatMap(j=>j.categorias))].sort()
      : getCategoriasPorSport(d)
    _invCats = new Set(['todas'])
    catsCont.innerHTML = '<div onclick="toggleInvCat(\'todas\')" id="invc-todas" style="padding:4px 12px;border-radius:7px;border:1px solid var(--ac)33;background:var(--ac)12;color:var(--ac);font-size:11px;font-weight:600;cursor:pointer">✓ Todas</div>' +
      cats.map(c => '<div onclick="toggleInvCat(\''+c+'\')" id="invc-'+c.replace(/\s/g,'_')+'" ' +
        'style="padding:4px 12px;border-radius:7px;border:1px solid var(--bd2);background:var(--s2);color:var(--tx2);font-size:11px;cursor:pointer;transition:all .13s">'+c+'</div>'
      ).join('')
  }
  filtrarJugadoresInv()
}

function toggleInvCat(cat) {
  if (cat === 'todas') {
    _invCats = new Set(['todas'])
    document.querySelectorAll('[id^="invc-"]').forEach(el => {
      const isTodas = el.id === 'invc-todas'
      el.style.background  = isTodas ? 'var(--ac)12' : 'var(--s2)'
      el.style.borderColor = isTodas ? 'var(--ac)33' : 'var(--bd2)'
      el.style.color       = isTodas ? 'var(--ac)' : 'var(--tx2)'
    })
  } else {
    _invCats.delete('todas')
    if (_invCats.has(cat)) {
      _invCats.delete(cat)
    } else {
      _invCats.add(cat)
    }
    if (_invCats.size === 0) _invCats.add('todas')
    // Actualizar UI de chips
    document.querySelectorAll('[id^="invc-"]').forEach(el => {
      const c = el.id.replace('invc-','').replace(/_/g,' ')
      const sel = _invCats.has(c) || (c==='todas' && _invCats.has('todas'))
      el.style.background  = sel ? 'var(--ac)12' : 'var(--s2)'
      el.style.borderColor = sel ? 'var(--ac)33' : 'var(--bd2)'
      el.style.color       = sel ? 'var(--ac)' : 'var(--tx2)'
      if (c==='todas') {
        el.style.background  = _invCats.has('todas') ? 'var(--ac)12' : 'var(--s2)'
        el.style.borderColor = _invCats.has('todas') ? 'var(--ac)33' : 'var(--bd2)'
        el.style.color       = _invCats.has('todas') ? 'var(--ac)' : 'var(--tx2)'
      }
    })
  }
  filtrarJugadoresInv()
}

function setInvGenero(g) {
  _invGenero = g
  ;['todos','M','F'].forEach(id => {
    const el = document.getElementById('invg-'+id)
    if (!el) return
    const gColors = {todos:'var(--purple)', M:'var(--ac)', F:'var(--err)'}
    const sel = id === g
    el.style.background  = sel ? gColors[id]+'18' : 'var(--s2)'
    el.style.borderColor = sel ? gColors[id] : 'var(--bd2)'
    el.style.color       = sel ? gColors[id] : 'var(--tx2)'
  })
  filtrarJugadoresInv()
}

function filtrarJugadoresInv() {
  const soloActivos = document.getElementById('inv-solo-activos')?.classList.contains('on') ?? true

  const filtrados = JUGADORES_CLUB.filter(j => {
    if (soloActivos && !j.activo) return false
    if (_invDeporte !== 'todos' && !j.deportes.includes(_invDeporte)) return false
    if (!_invCats.has('todas') && !j.categorias.some(c => _invCats.has(c))) return false
    if (_invGenero !== 'todos' && j.genero !== _invGenero) return false
    return true
  })

  // Actualizar _invSel con los filtrados (por defecto todos seleccionados)
  _invSel = new Set(filtrados.map(j=>j.id))

  renderInvLista(filtrados)
  updateInvCount()
  updateInvMsgDefault()
}

function renderInvLista(jugadores) {
  const lista = document.getElementById('inv-lista')
  if (!lista) return

  if (!jugadores.length) {
    lista.innerHTML = '<div style="font-size:12px;color:var(--tx3);text-align:center;width:100%;padding:10px">Sin jugadores con ese filtro</div>'
    return
  }

  lista.innerHTML = jugadores.map(j => {
    const gIcon = j.genero==='M' ? '♂' : '♀'
    const gColor = j.genero==='M' ? 'var(--ac)' : 'var(--err)'
    const sel = _invSel.has(j.id)
    return '<div id="invjug-'+j.id+'" onclick="toggleInvJug('+j.id+')" ' +
      'style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:7px;' +
      'border:1px solid '+(sel?'var(--ok)33':'var(--bd2)')+';' +
      'background:'+(sel?'var(--ok)10':'var(--s2)')+';' +
      'color:'+(sel?'var(--ok)':'var(--tx3)')+';' +
      'font-size:11px;font-weight:500;cursor:pointer;transition:all .13s;user-select:none">' +
      '<span style="color:'+gColor+';font-size:10px">'+gIcon+'</span>' +
      '<span>'+(sel?'✓ ':'')+j.nombre+'</span>' +
      '<span style="font-size:9px;color:var(--tx3);margin-left:2px">'+j.categorias[0]+'</span>' +
      '</div>'
  }).join('')
}

function toggleInvJug(id) {
  if (_invSel.has(id)) _invSel.delete(id)
  else _invSel.add(id)
  const j = JUGADORES_CLUB.find(x=>x.id===id)
  const el = document.getElementById('invjug-'+id)
  if (!el || !j) return
  const sel = _invSel.has(id)
  el.style.background  = sel ? 'var(--ok)10' : 'var(--s2)'
  el.style.borderColor = sel ? 'var(--ok)33' : 'var(--bd2)'
  el.style.color       = sel ? 'var(--ok)' : 'var(--tx3)'
  el.innerHTML = '<span style="color:'+(j.genero==='M'?'var(--ac)':'var(--err)')+';font-size:10px">'+(j.genero==='M'?'♂':'♀')+'</span>' +
    '<span>'+(sel?'✓ ':'')+j.nombre+'</span>' +
    '<span style="font-size:9px;color:var(--tx3);margin-left:2px">'+j.categorias[0]+'</span>'
  updateInvCount()
}

function selTodosInv(val) {
  const lista = document.getElementById('inv-lista')
  const chips = lista?.querySelectorAll('[id^="invjug-"]') || []
  chips.forEach(el => {
    const id = parseInt(el.id.replace('invjug-',''))
    if (val) _invSel.add(id)
    else _invSel.delete(id)
    const j = JUGADORES_CLUB.find(x=>x.id===id)
    el.style.background  = val ? 'var(--ok)10' : 'var(--s2)'
    el.style.borderColor = val ? 'var(--ok)33' : 'var(--bd2)'
    el.style.color       = val ? 'var(--ok)' : 'var(--tx3)'
    const gColor = j?.genero==='M' ? 'var(--ac)' : 'var(--err)'
    const gIcon  = j?.genero==='M' ? '♂' : '♀'
    el.innerHTML = '<span style="color:'+gColor+';font-size:10px">'+gIcon+'</span>' +
      '<span>'+(val?'✓ ':'')+(j?.nombre||'')+'</span>' +
      '<span style="font-size:9px;color:var(--tx3);margin-left:2px">'+(j?.categorias[0]||'')+'</span>'
  })
  updateInvCount()
}

function updateInvCount() {
  const el = document.getElementById('inv-count')
  if (el) el.textContent = _invSel.size
}

function updateInvMsgDefault() {
  const ta = document.getElementById('inv-mensaje2')
  if (!ta || ta.value) return
  const deporte = _invDeporte === 'todos' ? '{deporte}' : _invDeporte
  const genLabel = _invGenero==='M' ? 'masculino' : _invGenero==='F' ? 'femenino' : 'mixto'

    ' en Sport Hub Norte.\n\n📅 Fecha: por confirmar\n🏆 Categoría: {categoria}\n💰 Inscripción: a confirmar\n\n¿Participás? Respondé este mensaje para anotarte 🙌'
}

function setInvMsg2(msg) {
  const ta = document.getElementById('inv-mensaje2')
  if (ta) ta.value = msg
}

function invGetJugadoresSeleccionados() {
  return JUGADORES_CLUB.filter(j=>_invSel.has(j.id)).map(j=>j.nombre)
}

function invGetCatSeleccionada() {
  if (_invCats.has('todas')) return ''
  return [..._invCats].join(', ')
}

      <div class="kl">en todos los torneos</div>
    </div>
    <div class="kpi" style="border-top:3px solid var(--warn)">
      <div style="font-size:11px;color:var(--tx2)">Ingresos inscripciones</div>
      <div class="kv" style="color:var(--warn)">${fmt(ingresos)}</div>
      <div class="kl">todos los torneos</div>
    </div>
    <div class="kpi" style="border-top:3px solid var(--purple)">
      <div style="font-size:11px;color:var(--tx2)">Próxima final</div>
      <div class="kv" style="color:var(--purple);font-size:14px;margin-top:3px">28 Jun</div>
      <div class="kl">${proxFinal?.nombre||'—'}</div>
    </div>
  </div>`

  const content = document.getElementById('main')
  switch(activeTab) {
    case 'lista':       content.innerHTML = kpiHtml + renderLista();       break
    case 'fixture':     content.innerHTML = kpiHtml + renderFixture();     break
    case 'posiciones':  content.innerHTML = kpiHtml + renderPosiciones();  break
    case 'inscriptos':  content.innerHTML = kpiHtml + renderInscriptos();  break

}

function renderFixture() {
  const t = TORNEOS.find(x=>x.id===activeTorneoId)
  if (!t) return '<div style="padding:20px;color:var(--tx3)">Seleccioná un torneo</div>'

  let html = ''

  // Selector de torneo
  html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">'
  html += '<span style="font-size:12px;color:var(--tx2)">Torneo:</span>'
  TORNEOS.forEach(x => {
    const sel = x.id === activeTorneoId
    html += `<button class="btn btn-sm ${sel?'btn-gold':'btn-ghost'}" onclick="activeTorneoId=${x.id};renderMain()">${x.nombre}</button>`
  })
  html += '</div>'

  if (t.formato === 'eliminacion') {
    html += renderBracketEliminacion(t)
  } else if (t.formato === 'liga' || t.formato === 'grupos') {
    html += renderLigaCalendario(t)
  }

  return html
}

function renderBracketEliminacion(t) {
  const RONDAS = ['Cuartos de final', 'Semifinales', 'Final']
  const numRondas = Math.ceil(Math.log2(t.equipos.length))
  const rondasUsadas = [...new Set(t.partidos.map(p=>p.ronda))].sort()

  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div>
      <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800">${t.nombre}</div>
      <div style="font-size:12px;color:var(--tx2)">${t.sport} · Eliminación directa · ${t.equipos.length} equipos</div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-ghost btn-sm" onclick="openInscripcionEquipo(${t.id})">+ Inscribir equipo</button>
      <button class="btn btn-gold btn-sm" onclick="switchTab('resultados')">⚽ Cargar resultado</button>
    </div>
  </div>`

  html += '<div class="bracket-wrap"><div class="bracket">'

  rondasUsadas.forEach((ronda, ri) => {
    const partidos = t.partidos.filter(p=>p.ronda===ronda)
    const rondaNombre = RONDAS[ronda] || 'Ronda '+(ronda+1)
    const isLast = ri === rondasUsadas.length - 1

    html += `<div class="bracket-round" style="min-width:${isLast?200:180}px">`
    html += `<div class="round-title">${rondaNombre}</div>`

    partidos.forEach(p => {
      const eq1 = getTeam(t, p.eq1)
      const eq2 = getTeam(t, p.eq2)
      const w   = p.ganador

      html += `<div class="match-slot">`
      html += `<div class="match-card ${p.jugado?'':'clickable'}" onclick="${!p.jugado?'openCargarResultado('+t.id+','+p.id+')':''}">`

      // Equipo 1
      html += `<div class="match-team ${w===p.eq1?'winner':w&&w!==p.eq1?'loser':''}">`
      html += `<span class="match-seed">${eq1?.seed||'?'}</span>`
      html += `<span class="match-name">${eq1?.nombre||'?'}</span>`
      html += `<span class="match-score">${p.jugado?(p.res1??''):'—'}</span>`
      html += `</div>`

      // Equipo 2
      html += `<div class="match-team ${w===p.eq2?'winner':w&&w!==p.eq2?'loser':''}">`
      html += `<span class="match-seed">${eq2?.seed||'?'}</span>`
      html += `<span class="match-name">${eq2?.nombre||'TBD'}</span>`
      html += `<span class="match-score">${p.jugado?(p.res2??''):'—'}</span>`
      html += `</div>`

      html += `</div>` // match-card

      // Info del partido
      html += `<div style="font-size:9px;color:var(--tx3);text-align:center;padding:3px 0">${p.fecha} · ${p.cancha}</div>`
      html += `</div>` // match-slot
    })

    // Campeón si es la final ya jugada
    if (isLast) {
      const finalP = partidos[0]
      if (finalP?.ganador) {
        const campeon = getTeam(t, finalP.ganador)
        html += `<div style="margin-top:10px;padding:10px 12px;background:var(--gold)18;border:1px solid var(--gold)44;border-radius:10px;text-align:center">
          <div style="font-size:16px">🏆</div>
          <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--gold);margin-top:3px">${campeon?.nombre}</div>
          <div style="font-size:10px;color:var(--tx3)">Campeón</div>
        </div>`
      } else if (finalP && !finalP.jugado) {
        html += `<div style="margin-top:10px;padding:10px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;text-align:center">
          <div style="font-size:11px;color:var(--tx3)">Final pendiente</div>
          <div style="font-size:10px;color:var(--tx3);margin-top:2px">${finalP.fecha}</div>
          <button class="btn btn-gold btn-sm" style="margin-top:8px;width:100%;justify-content:center" onclick="openCargarResultado(${t.id},${finalP.id})">Cargar resultado</button>
        </div>`
      }
    }

    html += `</div>` // bracket-round
  })

  html += '</div></div>'
  return html
}

// Deportes donde el ranking es POR JUGADOR individual (no por equipo)
const SPORTS_INDIVIDUAL = ['Pádel', 'Tenis', 'Pádel dobles']

function esDeporteIndividual(sport) {
  return SPORTS_INDIVIDUAL.some(s => sport.toLowerCase().includes(s.toLowerCase()))
}

// Construye el ranking de jugadores individuales a partir de los partidos del torneo
function buildRankingIndividual(t) {
  const jugMap = {}  // nombre → stats

  const getOrCreate = (nombre) => {
    if (!jugMap[nombre]) jugMap[nombre] = {
      nombre, equipos:[], pts:0, pg:0, pp:0, sets_f:0, sets_c:0
    }
    return jugMap[nombre]
  }

  t.partidos.forEach(p => {
    if (!p.jugado) return
    const eq1 = t.equipos.find(e=>e.id===p.eq1)
    const eq2 = t.equipos.find(e=>e.id===p.eq2)
    if (!eq1 || !eq2) return
    const gano1 = p.ganador === p.eq1

    eq1.jugadores.forEach(j => {
      const jug = getOrCreate(j)
      if (!jug.equipos.includes(eq1.nombre)) jug.equipos.push(eq1.nombre)
      if (gano1) { jug.pts+=3; jug.pg++; jug.sets_f+=p.res1; jug.sets_c+=p.res2 }
      else       { jug.pp++;              jug.sets_f+=p.res1; jug.sets_c+=p.res2 }
    })
    eq2.jugadores.forEach(j => {
      const jug = getOrCreate(j)
      if (!jug.equipos.includes(eq2.nombre)) jug.equipos.push(eq2.nombre)
      if (!gano1) { jug.pts+=3; jug.pg++; jug.sets_f+=p.res2; jug.sets_c+=p.res1 }
      else        { jug.pp++;              jug.sets_f+=p.res2; jug.sets_c+=p.res1 }
    })
  })

  return Object.values(jugMap).sort((a,b)=>b.pts-a.pts||(b.sets_f-b.sets_c)-(a.sets_f-a.sets_c))
}

function renderPosiciones() {
  const t = TORNEOS.find(x=>x.id===activeTorneoId)
  if (!t || !t.equipos.length) return '<div style="padding:20px;color:var(--tx3)">Sin datos</div>'

  const individual = esDeporteIndividual(t.sport)

  let html = '<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center">'
  TORNEOS.forEach(x => {
    html += '<button class="btn btn-sm ' + (x.id===activeTorneoId?'btn-gold':'btn-ghost') + '" onclick="activeTorneoId='+x.id+';renderMain()">'+x.nombre+'</button>'
  })
  // Indicador del modo
  html += '<span style="margin-left:auto;font-size:11px;padding:3px 10px;border-radius:6px;background:' +
    (individual?'var(--ac)15':'var(--ok)15') + ';color:' + (individual?'var(--ac)':'var(--ok)') + ';font-weight:600">' +
    (individual?'👤 Ranking individual':'👥 Ranking por equipo') + '</span>'
  html += '</div>'

  if (individual) {
    html += renderPosicionesIndividual(t)
  } else {
    html += renderPosicionesEquipo(t)
  }

  return html
}

// ── RANKING INDIVIDUAL (pádel, tenis) ─────────────────────
function renderPosicionesIndividual(t) {
  const jugadores = buildRankingIndividual(t)

  if (!jugadores.length) {
    return '<div style="background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:30px;text-align:center;color:var(--tx3);font-size:13px">' +

    html += '<td class="r" style="color:var(--err)">' + jug.pp + '</td>'
    html += '<td class="r">' + jug.sets_f + '</td>'
    html += '<td class="r">' + jug.sets_c + '</td>'
    html += '<td class="r" style="font-weight:600;color:' + (dif>0?'var(--ok)':dif<0?'var(--err)':'var(--tx3)') + '">' + (dif>0?'+':'') + dif + '</td>'

    html += '</tr>'
  })

  html += '</tbody></table></div>'

  // Panel derecho — podio
  html += '<div>'
  html += '<div class="card" style="margin:0 0 12px">'
  html += '<div class="card-head"><span class="card-title">🏅 Podio actual</span></div>'
  html += '<div class="card-body" style="padding:14px">'

  const podio = jugadores.slice(0,3)
  const podioIcons = ['🥇','🥈','🥉']
  const podioColors = ['var(--gold)','var(--tx2)','#cd7f32']

  podio.forEach((jug,i) => {
    html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;' + (i<2?'border-bottom:1px solid var(--bd)55':'') + '">'
    html += '<div style="font-size:22px">' + podioIcons[i] + '</div>'
    html += '<div style="flex:1">'
    html += '<div style="font-weight:700;color:' + podioColors[i] + ';font-family:\'Syne\',sans-serif">' + jug.nombre + '</div>'
    html += '<div style="font-size:10px;color:var(--tx3);margin-top:1px">' + jug.pg + ' victorias · ' + jug.pts + ' pts</div>'
    html += '</div>'
    html += '</div>'
  })

  html += '</div></div>'

  // Nota explicativa
  html += '<div style="background:var(--ac)08;border:1px solid var(--ac)22;border-radius:10px;padding:12px 14px;font-size:11px;color:var(--tx2);line-height:1.6">'
  html += '<strong style="color:var(--ac)">Por qué ranking individual en pádel</strong><br>'
  html += 'En pádel los jugadores cambian de pareja entre torneos. El ranking refleja el rendimiento de cada persona, independientemente de con quién juegue. Los puntos se asignan a cada jugador de la dupla ganadora.'
  html += '</div>'

  // Bloque invitaciones

// ── RANKING POR EQUIPO (fútbol, básquet, voley) ────────────
function renderPosicionesEquipo(t) {
  const sorted = [...t.equipos].sort((a,b)=>b.pts-a.pts||(b.sets_f-b.sets_c)-(a.sets_f-a.sets_c))
  const posColors = ['var(--gold)','var(--tx2)','#cd7f32']
  const usesSets = t.sport.includes('Pádel') || t.sport.includes('Tenis')
  const gfLabel  = usesSets ? 'GF' : 'GF'
  const gcLabel  = usesSets ? 'GC' : 'GC'

  let html = '<div class="card" style="margin-bottom:14px">'
  html += '<div class="card-head"><span class="card-title">👥 Tabla de posiciones — ' + t.nombre + '</span></div>'
  html += '<table class="pos-table"><thead><tr>'
  html += '<th style="width:40px">#</th><th>Equipo</th>'
  html += '<th class="r">PJ</th><th class="r">PG</th><th class="r">PP</th>'
  html += '<th class="r">' + gfLabel + '</th><th class="r">' + gcLabel + '</th>'
  html += '<th class="r">Dif.</th><th class="r" style="color:var(--gold)">PTS</th>'
  html += '</tr></thead><tbody>'

  sorted.forEach((eq, i) => {
    const dif = eq.sets_f - eq.sets_c
    const posColor = i<3 ? posColors[i] : 'var(--tx3)'
    const zonaBg   = i===0?'var(--gold)0a':i<4?'var(--ok)05':''

    html += '<tr style="' + (zonaBg?'background:'+zonaBg:'') + '">'
    html += '<td><div class="pos-num" style="background:' + posColor + '22;color:' + posColor + '">' + (i+1) + '</div></td>'
    html += '<td>'
    html += '<div style="font-weight:600;color:var(--tx)">' + eq.nombre + '</div>'
    html += '<div style="font-size:10px;color:var(--tx3)">' + eq.jugadores.join(' · ') + '</div>'
    html += '</td>'
    html += '<td class="r" style="color:var(--tx2)">' + (eq.pg+eq.pp) + '</td>'
    html += '<td class="r" style="color:var(--ok);font-weight:600">' + eq.pg + '</td>'
    html += '<td class="r" style="color:var(--err)">' + eq.pp + '</td>'
    html += '<td class="r">' + eq.sets_f + '</td>'
    html += '<td class="r">' + eq.sets_c + '</td>'
    html += '<td class="r" style="font-weight:600;color:' + (dif>0?'var(--ok)':dif<0?'var(--err)':'var(--tx3)') + '">' + (dif>0?'+':'') + dif + '</td>'
    html += '<td class="r"><div style="font-family:\'Syne\',sans-serif;font-size:16px;font-weight:800;color:var(--gold)">' + eq.pts + '</div></td>'
    html += '</tr>'
  })

  html += '</tbody></table></div>'

  html += '<div style="display:flex;gap:14px;font-size:11px;color:var(--tx3);flex-wrap:wrap">'
  html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--gold)0a;border:1px solid var(--gold)33;margin-right:5px"></span>Líder</span>'
  html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--ok)05;border:1px solid var(--ok)22;margin-right:5px"></span>Zona de clasificación</span>'
  html += '</div>'

  return html
}

function renderResultados() {
  const t = TORNEOS.find(x=>x.id===activeTorneoId)

  const pendientes = t.partidos.filter(p=>!p.jugado)
  const jugados    = t.partidos.filter(p=>p.jugado)

  let html = '<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">'

    html += `<button class="btn btn-sm ${x.id===activeTorneoId?'btn-gold':'btn-ghost'}" onclick="activeTorneoId=${x.id};renderMain()">${x.nombre}</button>`
  })
  html += '</div>'

  if (pendientes.length) {
    html += `<div class="card" style="margin-bottom:14px">
      <div class="card-head"><span class="card-title" style="color:var(--warn)">⏳ Partidos pendientes (${pendientes.length})</span></div>
      <table class="tbl">
        <thead><tr><th>Partido</th><th>Cancha</th><th>Fecha</th><th></th></tr></thead>
        <tbody>
          ${pendientes.map(p=>{
            const eq1 = getTeam(t,p.eq1), eq2 = getTeam(t,p.eq2)
            return `<tr>
              <td>
                <div style="font-weight:600;color:var(--tx)">${eq1?.nombre} <span style="color:var(--tx3)">vs</span> ${eq2?.nombre||'TBD'}</div>
                <div style="font-size:10px;color:var(--tx3)">${['Cuartos','Semifinales','Final'][p.ronda]||'Ronda '+(p.ronda+1)}</div>
              </td>
              <td style="color:var(--tx2)">${p.cancha}</td>
              <td style="color:var(--tx2)">${p.fecha}</td>
              <td><button class="btn btn-gold btn-sm" onclick="openCargarResultado(${t.id},${p.id})">Cargar resultado</button></td>
            </tr>`
          }).join('')}
        </tbody>
      </table>
    </div>`
  }

  if (jugados.length) {
    html += `<div class="card">
      <div class="card-head"><span class="card-title">✅ Resultados cargados (${jugados.length})</span></div>
      <table class="tbl">
        <thead><tr><th>Partido</th><th>Resultado</th><th>Ganador</th><th>Cancha</th></tr></thead>
        <tbody>
          ${jugados.map(p=>{
            const eq1 = getTeam(t,p.eq1), eq2 = getTeam(t,p.eq2)
            const winner = getTeam(t,p.ganador)
            return `<tr>
              <td>
                <div style="font-weight:500">${eq1?.nombre} vs ${eq2?.nombre}</div>

              </td>
              <td style="color:var(--ok);font-weight:600">✓ ${winner?.nombre}</td>
              <td style="color:var(--tx3)">${p.cancha}</td>
            </tr>`
          }).join('')}
        </tbody>
      </table>
    </div>`
  }

  return html
}

        <input type="number" class="finp" id="cr-res2" value="0" min="0" max="99" style="text-align:center;font-size:22px;font-weight:700;font-family:'Syne',sans-serif;margin:0">

function saveResultado(torneoId, partidoId) {
  const t  = TORNEOS.find(x=>x.id===torneoId)
  const p  = t?.partidos.find(x=>x.id===partidoId)
  if (!t || !p) return

  const r1 = parseInt(document.getElementById('cr-res1')?.value)||0
  const r2 = parseInt(document.getElementById('cr-res2')?.value)||0
  if (r1 === r2) { toast('El resultado no puede ser empate en eliminación','warn'); return }

  p.res1    = r1
  p.res2    = r2
  p.ganador = r1 > r2 ? p.eq1 : p.eq2
  p.jugado  = true

  // Actualizar puntos en tabla
  const ganEq = t.equipos.find(e=>e.id===p.ganador)
  const perEq = t.equipos.find(e=>e.id===(p.ganador===p.eq1?p.eq2:p.eq1))
  if (ganEq) { ganEq.pts+=3; ganEq.pg++; ganEq.sets_f+=r1; ganEq.sets_c+=r2 }
  if (perEq) { perEq.pp++;   perEq.sets_f+=r2; perEq.sets_c+=r1 }

  // Auto-avanzar al ganador en la siguiente ronda si es eliminación
  const nextRoundMatch = t.partidos.find(x=>!x.jugado && x.ronda===p.ronda+1 && (x.eq1===0||x.eq2===0||x.eq1===null||x.eq2===null))
  if (nextRoundMatch) {
    if (!nextRoundMatch.eq1 || nextRoundMatch.eq1===0) nextRoundMatch.eq1=p.ganador
    else nextRoundMatch.eq2=p.ganador
  }

  const ganNom = t.equipos.find(e=>e.id===p.ganador)?.nombre
  closeModal()
  renderMain()
  toast('✓ Resultado cargado — Gana '+ganNom+' '+r1+'-'+r2)
}

  const fmts    = getFormatosPorSport(sport)
  const panel   = document.getElementById('formato-options')
  const panelP  = document.getElementById('panel-personalizado')
  if (!panel) return

  panel.innerHTML = fmts.map(f => {
    const sel = _selectedFormato === f.id
    return '<div onclick="selectFormato(\''+f.id+'\')" id="fopt-'+f.id+'" '+
      'style="display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:8px;'+
      'border:1px solid '+(sel?'var(--gold)':'var(--bd2)')+';'+
      'background:'+(sel?'var(--gold)0a':'var(--s2)')+';cursor:pointer;transition:all .13s">'+
      '<div style="width:14px;height:14px;border-radius:50%;border:2px solid '+(sel?'var(--gold)':'var(--bd2)')+
      ';background:'+(sel?'var(--gold)':'none')+';margin-top:1px;flex-shrink:0;transition:all .13s"></div>'+
      '<div style="flex:1">'+
      '<div style="font-size:12px;font-weight:600;color:'+(sel?'var(--gold)':'var(--tx)')+'">'+ f.label +'</div>'+
      '<div style="font-size:10px;color:var(--tx3);margin-top:1px">'+ f.desc +'</div>'+
      (f.individual!==null?'<div style="font-size:9px;margin-top:3px;color:'+(f.individual?'var(--ac)':'var(--ok)')+'">'+
      (f.individual?'👤 Ranking individual':'👥 Ranking por equipo')+'</div>':'')
      +'</div></div>'
  }).join('')

  // Mostrar/ocultar panel personalizado
  if (panelP) panelP.style.display = _selectedFormato==='personalizado' ? 'block' : 'none'
}

function selectFormato(id) {
  _selectedFormato = id
  updateFormatoOptions()
}

function saveNuevoTorneo(jugadoresInvitar) {
  const nombre = document.getElementById('nt-nombre')?.value.trim()
  if (!nombre) { toast('Ingresá el nombre','warn'); return }

  const formato = _selectedFormato
  let formatoPersonalizado = null

  if (formato === 'personalizado') {
    const fpNombre = document.getElementById('fp-nombre')?.value.trim()
    if (!fpNombre) { toast('Escribí un nombre para el formato personalizado','warn'); return }
    formatoPersonalizado = {
      nombre:   fpNombre,
      rondas:   parseInt(document.getElementById('fp-rondas')?.value)||3,
      avance:   document.getElementById('fp-avance')?.value,
      pts_v:    parseInt(document.getElementById('fp-pts-v')?.value)||3,
      pts_e:    parseInt(document.getElementById('fp-pts-e')?.value)||1,
      desempate:document.getElementById('fp-desempate')?.value,
      ranking:  document.getElementById('fp-ranking')?.value,
      notas:    document.getElementById('fp-notas')?.value,
    }
  }

  const nuevoTorneo = {
    id: TORNEOS.length+1, nombre,
    sport:              document.getElementById('nt-sport')?.value||'Pádel',
    formato,
    formatoPersonalizado,
    estado:             'inscripcion',
    inicio:             document.getElementById('nt-inicio')?.value||'',
    fin:                document.getElementById('nt-fin')?.value||'',
    inscripcion_precio: parseInt(document.getElementById('nt-precio')?.value)||0,
    premio:             document.getElementById('nt-premio')?.value||'',
    max_equipos:        parseInt(document.getElementById('nt-maxeq')?.value)||16,
    categoria:          document.getElementById('nt-cat')?.value||'Abierto',
    equipos:[], partidos:[],
  }
  TORNEOS.push(nuevoTorneo)

  let msg = '✓ Torneo "'+nombre+'" creado'

  // Enviar invitaciones si vienen del ranking
  if (jugadoresInvitar && jugadoresInvitar.length) {
    msg += ' · 📨 '+jugadoresInvitar.length+' invitaciones enviadas por WhatsApp'
  }

  closeModal()
  activeTorneoId = nuevoTorneo.id
  renderMain()
  toast(msg)
}

function saveInscripcionEquipo(torneoId, isPadel) {
  const t = TORNEOS.find(x=>x.id===torneoId)
  if (!t) return
  const nombre = document.getElementById('ie-nombre')?.value.trim()
  const jug1   = document.getElementById('ie-jug1')?.value.trim()
  if (!nombre || !jug1) { toast('Completá nombre y al menos un jugador','warn'); return }
  if (t.equipos.length >= t.max_equipos) { toast('El torneo está completo','warn'); return }

  const jug2 = isPadel ? (document.getElementById('ie-jug2')?.value.trim()||'') : ''
  const jugadores = [jug1, jug2].filter(Boolean)

  const newId = Math.max(0,...TORNEOS.flatMap(x=>x.equipos.map(e=>e.id)))+1
  t.equipos.push({
    id:newId, nombre, seed:t.equipos.length+1,
    jugadores, pts:0, pg:0, pp:0, sets_f:0, sets_c:0
  })
  if (t.estado==='inscripcion' && t.equipos.length>=t.max_equipos) t.estado='en_curso'

  closeModal(); renderMain()
  toast('✓ '+nombre+' inscripto en '+t.nombre)
}

function calcularNumPartidos(t) {
  const n = t.equipos.length
  if (t.formato==='liga' || t.formato==='liga_duplas' || t.formato==='liga_indiv' || t.formato==='round_robin') {
    return n*(n-1)/2
  }
  return n - 1  // eliminación
}

function ejecutarSorteo(torneoId) {
  const t = TORNEOS.find(x=>x.id===torneoId)
  if (!t) return

  const fechaIni  = document.getElementById('sg-fecha-ini')?.value || new Date().toISOString().slice(0,10)
  const horaIni   = document.getElementById('sg-hora-ini')?.value || '18:00'
  const durMin    = parseInt(document.getElementById('sg-duracion')?.value) || 60
  const pausaMin  = parseInt(document.getElementById('sg-pausa')?.value) || 15
  const sorteoTipo = window._sorteoTipo || 'aleatorio'

  // Canchas activas
  const canchasEls = document.querySelectorAll('[id^="cancha-chip-"]')
  const canchas = []
  canchasEls.forEach(el => {
    if (el.style.background.includes('ok') || el.style.color.includes('ok')) {
      canchas.push(el.textContent.slice(2).trim())
    }
  })
  if (!canchas.length) { toast('Seleccioná al menos una cancha','warn'); return }

  // ── Generar orden de equipos según tipo de sorteo ──
  let orden = [...t.equipos]
  if (sorteoTipo === 'aleatorio') {
    for (let i=orden.length-1; i>0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [orden[i],orden[j]] = [orden[j],orden[i]]
    }
  } else if (sorteoTipo === 'sembrado') {
    orden.sort((a,b) => a.seed - b.seed)
    // Distribuir sembrados: 1 vs último, 2 vs penúltimo, etc.
    const n = orden.length
    const reordenado = new Array(n)
    for (let i=0; i<Math.ceil(n/2); i++) {
      reordenado[i*2]   = orden[i]
      reordenado[i*2+1] = orden[n-1-i]
    }
    orden = reordenado.filter(Boolean)
  }
  // manual: orden as-is

  // ── Armar partidos con fechas y horarios ──
  t.partidos = []
  const totalSlots = durMin + pausaMin
  let partidoId   = 1

  const isEliminacion = ['eliminacion','liga_duplas','copa','grupos_elim'].includes(t.formato) ||
    t.formato === 'americano'

  if (isEliminacion) {
    // Bracket de eliminación simple
    const n = orden.length
    for (let i=0; i<Math.floor(n/2); i++) {
      const eq1 = orden[i*2]
      const eq2 = orden[i*2+1]
      if (!eq1 || !eq2) continue
      const {fecha, hora} = calcSlot(fechaIni, horaIni, i, canchas.length, totalSlots)
      t.partidos.push({
        id: partidoId++, ronda: 0,
        eq1: eq1.id, eq2: eq2.id,
        res1:null, res2:null, ganador:null, jugado:false,
        cancha: canchas[i % canchas.length],
        fecha, hora,
      })
    }
    // Si número impar → bye para el primero
    if (n % 2 !== 0) {
      const byeEq = orden[n-1]
      t.partidos.push({
        id: partidoId++, ronda:0,
        eq1: byeEq.id, eq2: null,
        res1:null, res2:null, ganador: byeEq.id, jugado:true,
        cancha:'—', fecha:'—', hora:'BYE',
        esBye:true,
      })
    }
  } else {
    // Round-robin / liga
    let slotIdx = 0
    for (let i=0; i<orden.length; i++) {
      for (let j=i+1; j<orden.length; j++) {
        const {fecha, hora} = calcSlot(fechaIni, horaIni, slotIdx, canchas.length, totalSlots)
        t.partidos.push({
          id: partidoId++, ronda:0,
          eq1: orden[i].id, eq2: orden[j].id,
          res1:null, res2:null, ganador:null, jugado:false,
          cancha: canchas[slotIdx % canchas.length],
          fecha, hora,
        })
        slotIdx++
      }
    }
  }

  t.estado = 'en_curso'
  closeModal()

  // ── Mostrar confirmación con vista previa de fixture y notificaciones ──
  const totalN = t.equipos.reduce((a,e)=>a+e.jugadores.length,0)
  renderMain()
  openConfirmacionSorteo(t, totalN)
}

function calcSlot(fechaBase, horaBase, slotIdx, numCanchas, totalMin) {
  const [hh,mm] = horaBase.split(':').map(Number)
  const baseMin = hh*60 + mm
  // Partidos en paralelo según número de canchas
  const rondaSlot = Math.floor(slotIdx / numCanchas)
  const totalMinOffset = rondaSlot * totalMin
  let minAbs = baseMin + totalMinOffset

  // Si supera las 23hs, pasar al día siguiente
  const diasExtra = Math.floor(minAbs / (24*60))
  minAbs = minAbs % (24*60)
  const hFin = String(Math.floor(minAbs/60)).padStart(2,'0')
  const mFin = String(minAbs%60).padStart(2,'0')

  // Calcular fecha
  const base = new Date(fechaBase + 'T00:00:00')
  base.setDate(base.getDate() + diasExtra)
  const diaNames = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb']
  const mesNames = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']
  const fechaStr = diaNames[base.getDay()] + ' ' + base.getDate() + ' ' + mesNames[base.getMonth()]

  return { fecha: fechaStr, hora: hFin+':'+mFin+'hs' }
}

function openConfirmacionSorteo(t, totalJugadores) {
  const primeros = t.partidos.filter(p=>!p.esBye).slice(0,4)

  let html = '<div class="modal-title">✅ Sorteo generado</div>'
  html += '<div class="modal-sub">' + t.partidos.length + ' partidos armados · ' + totalJugadores + ' jugadores a notificar</div>'

  // Preview de primeros cruces
  html += '<div style="font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Primeros cruces</div>'
  html += '<div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px">'
  primeros.forEach(p => {
    const eq1 = getTeam(t,p.eq1), eq2 = getTeam(t,p.eq2)
    html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--s2);border-radius:8px;font-size:12px">'
    html += '<span style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--tx3);flex-shrink:0">' + p.hora + '</span>'
    html += '<span style="font-weight:600;color:var(--tx)">' + (eq1?.nombre||'?') + '</span>'
    html += '<span style="color:var(--tx3)">vs</span>'
    html += '<span style="font-weight:600;color:var(--tx)">' + (eq2?.nombre||'?') + '</span>'
    html += '<span style="margin-left:auto;font-size:10px;color:var(--tx3)">' + p.cancha + ' · ' + p.fecha + '</span>'
    html += '</div>'
  })
  if (t.partidos.length > 4) html += '<div style="font-size:11px;color:var(--tx3);text-align:center">... y ' + (t.partidos.length-4) + ' partidos más</div>'
  html += '</div>'

  // Preview de la notificación
  html += '<div style="font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Notificación que recibirá cada jugador</div>'
  const p0 = primeros[0]
  const eq1 = p0 ? getTeam(t,p0.eq1) : null
  const rival = p0 ? (getTeam(t,p0.eq2)?.nombre||'rival') : 'rival'
  html += '<div style="background:#0d1117;border-radius:10px;padding:12px 14px;font-size:11px;font-family:\'DM Mono\',monospace;color:#8696a0;line-height:1.7;white-space:pre-wrap;margin-bottom:14px">'
  html += buildMsgNotificacion(t, eq1?.jugadores[0]||'Jugador', rival, p0?.fecha||'—', p0?.hora||'—', p0?.cancha||'—')
  html += '</div>'

  html += '<div class="modal-actions">'
  html += '<button class="btn btn-ghost" onclick="closeModal()">Ver fixture primero</button>'
  html += '<button class="btn btn-gold" onclick="closeModal();enviarNotificaciones(' + t.id + ')">📱 Enviar notificaciones a ' + totalJugadores + ' jugadores</button>'
  html += '</div>'

  showModal(html)
}

function enviarNotificaciones(torneoId) {
  const t = TORNEOS.find(x=>x.id===torneoId)
  if (!t) return
  const total = t.equipos.reduce((a,e)=>a+e.jugadores.length,0)
  // Simular envío
  let enviados = 0
  const interval = setInterval(() => {
    enviados++
    if (enviados >= total) {
      clearInterval(interval)
      toast('📱 ' + total + ' notificaciones enviadas — todos los jugadores fueron notificados')
      renderMain()
    }
  }, 80)
  toast('Enviando notificaciones...')
}

// ══════════════════════════════════════════════════════════
//  INVITACIONES DESDE RANKING
// ══════════════════════════════════════════════════════════
function openInvitarDesdeRanking(jugadores) {
  // Detectar categoría activa del torneo seleccionado
  const t = TORNEOS.find(x=>x.id===activeTorneoId)
  const cat = t?.categoria || ''

  showModal(`
    <div class="modal-title">📨 Invitar desde el ranking</div>
    <div class="modal-sub">Vas a crear un torneo nuevo y enviar invitaciones por WhatsApp a los jugadores rankeados.</div>

    <div style="background:var(--s2);border-radius:10px;padding:12px 14px;margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">Jugadores que recibirán la invitación</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${jugadores.map((j,i)=>`
          <div id="inv-jug-${i}" onclick="toggleInvJugador(${i})"
            style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:7px;border:1px solid var(--ok)33;background:var(--ok)10;cursor:pointer;transition:all .13s;font-size:11px;font-weight:500;color:var(--ok)">
            <span>✓</span><span>${j}</span>
          </div>`).join('')}
      </div>
      <div style="font-size:10px;color:var(--tx3);margin-top:8px">Tocá para deseleccionar jugadores que no querés invitar</div>
    </div>

    <label class="flbl">Mensaje de invitación (se envía por WhatsApp)</label>
    <textarea class="finp" id="inv-mensaje" rows="4" style="font-family:'DM Mono',monospace;font-size:12px">¡Hola {nombre}! 🎾

Te invitamos a participar del próximo torneo de pádel en Sport Hub Norte.

📅 Fecha: por confirmar
🏆 Categoría: ${cat}
💰 Inscripción: a confirmar

¿Participás? Respondé este mensaje para anotarte 🙌</textarea>

    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
      ${[
        {l:'Pádel formal',   msg:'¡Hola {nombre}! Te invitamos al torneo oficial de pádel categoría ${cat}. ¿Te sumás? 🎾'},
        {l:'Informal',       msg:'Ey {nombre}! Hay torneo el finde. ¿Vas? 🏓'},
        {l:'Con fecha',      msg:'¡Hola {nombre}! Torneo de pádel el sábado 28/6. Categoría ${cat}. ¿Anotamos?'},
      ].map(t=>`<button class="btn btn-ghost btn-sm" onclick="setInvMsg('${t.msg.replace(/'/g,"\'")}')">${t.l}</button>`).join('')}
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="closeModal();openNuevoTorneo('${cat}',${JSON.stringify(jugadores).replace(/"/g,"'")})">
        Continuar → Crear torneo
      </button>
    </div>
  `)

  // guardar lista para toggle
  window._invJugadores = [...jugadores]
}

function toggleInvJugador(i) {
  const el = document.getElementById('inv-jug-'+i)
  if (!el) return
  const activo = el.style.background.includes('ok')
  el.style.background = activo ? 'var(--s2)' : 'var(--ok)10'
  el.style.borderColor = activo ? 'var(--bd2)' : 'var(--ok)33'
  el.style.color = activo ? 'var(--tx3)' : 'var(--ok)'
  el.querySelector('span').textContent = activo ? '○' : '✓'
  if (window._invJugadores) {
    window._invJugadores[i] = activo ? null : window._invJugadores[i]
  }
}

function setInvMsg(msg) {
  const ta = document.getElementById('inv-mensaje')
  if (ta) ta.value = msg
}

// ══════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════
function showModal(html) {
  document.getElementById('modal-body').innerHTML = html
  document.getElementById('modal').style.display  = 'flex'
}
function closeModal() { document.getElementById('modal').style.display='none' }

function toast(msg,type='success') {
  const cols={success:'var(--ok)',warn:'var(--warn)',error:'var(--err)'}
  const t=document.createElement('div');t.className='toast'
  t.innerHTML='<span style="color:'+(cols[type]||cols.success)+'">●</span> '+msg
  document.body.appendChild(t);setTimeout(()=>t.remove(),2600)
}
function toggleTheme() {
  const h=document.documentElement
  h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark')
  localStorage.setItem('shos-theme',h.getAttribute('data-theme'))
}
const st=localStorage.getItem('shos-theme')
if(st) document.documentElement.setAttribute('data-theme',st)

renderMain()
</script>
</body>
</html>
