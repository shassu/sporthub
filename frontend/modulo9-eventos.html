<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root[data-theme="dark"]{
  --bg:#05060e;--s1:#090b16;--s2:#0d1020;--s3:#111525;
  --bd:#171e30;--bd2:#1e2840;--bd3:#283450;
  --tx:#dde3f5;--tx2:#7a8db2;--tx3:#5a739a;
  --ac:#5b7fff;--ok:#2ecc71;--warn:#f0a020;--err:#e05050;
  --gold:#f0c040;--purple:#8b5cf6;--teal:#06b6d4;--pink:#ec4899;
  --sh:0 8px 40px #00000099;--sh2:0 2px 12px #00000055
}
:root[data-theme="light"]{
  --bg:#eef1f9;--s1:#fff;--s2:#f5f7fd;--s3:#edf0f8;
  --bd:#dde3f0;--bd2:#c8d0e8;--bd3:#b0bed8;
  --tx:#0d1530;--tx2:#5a6a90;--tx3:#8a9ab8;
  --ac:#3d63f0;--ok:#16a34a;--warn:#d97706;--err:#dc2626;
  --gold:#ca8a04;--purple:#7c3aed;--teal:#0891b2;--pink:#db2777;
  --sh:0 4px 20px #0000001a;--sh2:0 2px 8px #00000012
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px}

.top{display:flex;align-items:center;gap:12px;padding:10px 24px;background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;box-shadow:var(--sh2)}
.lb{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--pink),var(--gold));display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
.ln{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.ttog{width:40px;height:22px;border-radius:11px;background:var(--bd2);cursor:pointer;position:relative;margin-left:auto;flex-shrink:0}
.ttog::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--pink);transition:transform .2s}
[data-theme="light"] .ttog::after{transform:translateX(18px)}

.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bd);padding:0 24px;overflow-x:auto}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--tx2);border-bottom:2px solid transparent;cursor:pointer;transition:all .14s;white-space:nowrap}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--tx);border-bottom-color:var(--pink)}

.main{padding:22px 26px;max-width:1400px;margin:0 auto}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kv{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1;margin-top:5px}
.kl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}

/* ESPACIOS GRID */
.espacios-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:20px}
.espacio-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s}
.espacio-card:hover{border-color:var(--bd2);transform:translateY(-2px)}
.ec-img{height:120px;display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
.ec-badge{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;border-radius:20px;padding:3px 10px}
.ec-body{padding:14px 16px}
.ec-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px}
.ec-meta{font-size:11px;color:var(--tx2);line-height:1.5}
.ec-stats{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--bd);text-align:center}
.ecs{padding:9px 8px}
.ecs-v{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.ecs-l{font-size:9px;color:var(--tx3);text-transform:uppercase;margin-top:2px}

/* CALENDARIO DE EVENTOS */
.cal-evento{border-radius:8px;padding:8px 12px;margin-bottom:6px;cursor:pointer;transition:all .13s;border:1px solid transparent}
.cal-evento:hover{border-color:var(--bd2)}

/* PAQUETES */
.paquetes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.pkg-card{background:var(--s1);border:2px solid var(--bd);border-radius:14px;padding:18px;cursor:pointer;transition:all .15s;position:relative}
.pkg-card:hover{border-color:var(--bd2);transform:translateY(-2px)}
.pkg-card.featured{border-color:var(--pink)}
.pkg-icon{font-size:32px;margin-bottom:10px}
.pkg-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:4px}
.pkg-desc{font-size:12px;color:var(--tx2);margin-bottom:12px;line-height:1.5}
.pkg-price{font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
.pkg-feature{display:flex;align-items:flex-start;gap:7px;font-size:11px;color:var(--tx2);padding:4px 0;border-bottom:1px solid var(--bd)44}
.pkg-feature:last-child{border-bottom:none}

/* CATERING */
.catering-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--bd)44;font-size:12px;transition:background .12s}
.catering-item:hover{background:var(--s2)}

/* CARD */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;margin-bottom:14px;overflow:hidden}
.card-head{padding:11px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;font-family:'Syne',sans-serif}
.card-body{padding:14px 16px}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:all .14s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{opacity:.85}
.btn-primary{background:var(--ac);color:#fff}
.btn-pink{background:var(--pink);color:#fff}
.btn-gold{background:var(--gold);color:#0d1020}
.btn-ghost{background:var(--s2);border:1px solid var(--bd2);color:var(--tx2)}
.btn-ghost:hover{color:var(--tx);border-color:var(--bd3)}
.btn-ok{background:var(--ok)18;color:var(--ok);border:1px solid var(--ok)44}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 12px;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap}
.tbl th.r{text-align:right}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--bd)55;vertical-align:middle}
.tbl tr:hover td{background:var(--s2)}
.tbl tr:last-child td{border-bottom:none}
.finp,.fsel,.ftextarea{width:100%;padding:9px 12px;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;margin-bottom:10px;transition:border-color .15s}
.finp:focus,.fsel:focus,.ftextarea:focus{border-color:var(--pink)}
.flbl{font-size:11px;color:var(--tx2);margin-bottom:4px;display:block;font-weight:500}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.overlay{position:fixed;inset:0;background:#00000099;display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:16px;padding:24px;width:100%;max-width:540px;box-shadow:var(--sh);max-height:92vh;overflow-y:auto;animation:su .18s}
@keyframes su{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--tx2);margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.tog{width:34px;height:19px;border-radius:10px;background:var(--bd2);cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.tog.on{background:var(--ok)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:transform .2s}
.tog.on::after{transform:translateX(15px)}
.toast{position:fixed;bottom:18px;right:18px;background:var(--s1);border:1px solid var(--bd2);border-radius:10px;padding:10px 16px;font-size:12px;color:var(--tx);z-index:300;box-shadow:var(--sh);display:flex;align-items:center;gap:8px;animation:ts .2s}
@keyframes ts{from{transform:translateX(110%)}to{transform:translateX(0)}}
</style>
</head>

function switchTab(t) {
  activeTab = t
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('on'))
  document.getElementById('tab-'+t)?.classList.add('on')
  renderMain()
}

function renderMain() {
  const totalIngresos = EVENTOS.filter(e=>e.estado==='confirmado').reduce((a,e)=>a+e.total,0)
  const totalSeñas    = EVENTOS.reduce((a,e)=>a+e.seña,0)
  const proximos      = EVENTOS.filter(e=>e.estado!=='cancelado').length
  const pendientes    = EVENTOS.filter(e=>e.estado==='pendiente'||e.estado==='cotizando').length
  const ocupacion     = Math.round(EVENTOS.filter(e=>e.estado==='confirmado').length / (ESPACIOS.length * 4) * 100)

  const kpiHtml = `<div class="kpis">
    <div class="kpi" style="border-top:3px solid var(--pink)">
      <div style="font-size:11px;color:var(--tx2)">Eventos este mes</div>
      <div class="kv" style="color:var(--pink)">${proximos}</div>
      <div class="kl">confirmados + pendientes</div>
    </div>
    <div class="kpi" style="border-top:3px solid var(--ok)">
      <div style="font-size:11px;color:var(--tx2)">Revenue confirmado</div>
      <div class="kv" style="color:var(--ok)">${fmt(totalIngresos)}</div>
      <div class="kl">eventos confirmados</div>
    </div>
    <div class="kpi" style="border-top:3px solid var(--gold)">
      <div style="font-size:11px;color:var(--tx2)">Señas cobradas</div>
      <div class="kv" style="color:var(--gold)">${fmt(totalSeñas)}</div>
      <div class="kl">50% del total</div>
    </div>
    <div class="kpi" style="border-top:3px solid var(--warn)">
      <div style="font-size:11px;color:var(--tx2)">Requieren atención</div>
      <div class="kv" style="color:var(--warn)">${pendientes}</div>
      <div class="kl">pendientes / cotizando</div>
    </div>
    <div class="kpi" style="border-top:3px solid var(--ac)">
      <div style="font-size:11px;color:var(--tx2)">Paquete + vendido</div>
      <div class="kv" style="color:var(--ac);font-size:14px;margin-top:3px">Cumple Básico</div>
      <div class="kl">28 eventos este año</div>
    </div>
  </div>`

  const content = document.getElementById('main')
  switch(activeTab) {
    case 'agenda':   content.innerHTML = kpiHtml + renderAgenda();   break
    case 'espacios': content.innerHTML = kpiHtml + renderEspacios(); break
    case 'paquetes': content.innerHTML = kpiHtml + renderPaquetes(); break
    case 'catering': content.innerHTML = kpiHtml + renderCatering(); break
    case 'cotizar':  content.innerHTML = kpiHtml + renderCotizar();  break
  }
}

// Carrito de catering
let cart = []
function addToCart(itemId) {
  const item = Object.values(CATERING_MENU).flat().find(x=>x.id===itemId)
  if (!item) return
  const existing = cart.find(x=>x.id===itemId)
  if (existing) existing.qty++
  else cart.push({...item, qty:1})
  renderCart()
  toast('✓ ' + item.nombre + ' agregado')
}
function removeFromCart(itemId) {
  cart = cart.filter(x=>x.id!==itemId)
  renderCart()
}
function clearCart() { cart=[]; renderCart() }
function renderCart() {
  const el = document.getElementById('cart-items')
  const tot = document.getElementById('cart-total')
  if (!el) return
  if (!cart.length) {
    el.innerHTML = '<div style="text-align:center;padding:16px;color:var(--tx3);font-size:12px">Agregá items del menú</div>'
    if (tot) tot.textContent = '$0'
    return
  }
  el.innerHTML = cart.map(item=>`
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd)44;font-size:11px">
      <div style="flex:1;min-width:0">
        <div style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.nombre}</div>
        <div style="color:var(--ok)">${fmt(item.precio * item.qty)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:5px">
        <button onclick="changeQty(${item.id},-1)" style="width:20px;height:20px;border-radius:4px;border:1px solid var(--bd2);background:none;color:var(--tx);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center">-</button>
        <span style="font-family:'DM Mono',monospace;font-weight:600;min-width:16px;text-align:center">${item.qty}</span>
        <button onclick="changeQty(${item.id},1)" style="width:20px;height:20px;border-radius:4px;border:1px solid var(--bd2);background:none;color:var(--tx);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center">+</button>
        <button onclick="removeFromCart(${item.id})" style="width:20px;height:20px;border-radius:4px;border:none;background:var(--err)15;color:var(--err);cursor:pointer;font-size:12px;margin-left:2px">✕</button>
      </div>
    </div>`).join('')
  const total = cart.reduce((a,x)=>a+x.precio*x.qty,0)
  if (tot) tot.textContent = fmt(total)
}
function changeQty(id, delta) {
  const item = cart.find(x=>x.id===id)
  if (!item) return
  item.qty += delta
  if (item.qty <= 0) cart = cart.filter(x=>x.id!==id)
  renderCart()
}

      <!-- Estimado en tiempo real -->
      <div id="cot-estimado" style="background:var(--ok)0a;border:1px solid var(--ok)22;border-radius:9px;padding:12px 14px;margin-bottom:10px;display:none">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:12px;font-weight:600;color:var(--ok)">Estimado del evento</span>
          <span id="cot-total" style="font-family:'DM Mono',monospace;font-size:18px;font-weight:800;color:var(--ok)">$0</span>
        </div>
        <div id="cot-desglose" style="font-size:11px;color:var(--tx2);margin-top:5px"></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="resetCotizacion()">Limpiar</button>
        <button class="btn btn-ghost" onclick="saveCotizacion('pendiente')">Guardar como pendiente</button>
        <button class="btn btn-pink" onclick="saveCotizacion('confirmado')">✓ Confirmar evento</button>
      </div>
    </div>
  </div>`

  const today = new Date().toISOString().slice(0,10)
  setTimeout(()=>{ const el = document.getElementById('cot-fecha'); if(el) el.value=today }, 0)

  return html
}

function updateCotEstimado() {
  const pkgId = parseInt(document.getElementById('cot-paquete')?.value)||0
  const personas = parseInt(document.getElementById('cot-personas')?.value)||0
  const pkg = PAQUETES.find(x=>x.id===pkgId)
  const cartTotal = cart.reduce((a,x)=>a+x.precio*x.qty, 0)
  const total = (pkg?.precio||0) + cartTotal
  const el = document.getElementById('cot-estimado')
  const telEl = document.getElementById('cot-total')
  const desEl = document.getElementById('cot-desglose')
  if (!el||!telEl) return
  if (total > 0) {
    el.style.display = ''
    telEl.textContent = fmt(total)
    const lines = []
    if (pkg) lines.push('Paquete '+pkg.nombre+': '+fmt(pkg.precio))
    if (cartTotal>0) lines.push('Catering adicional: '+fmt(cartTotal))
    if (desEl) desEl.textContent = lines.join(' · ')
  } else {
    el.style.display = 'none'
  }
}

function saveCotizacion(estado) {
  const nombre = document.getElementById('cot-nombre')?.value.trim()
  if (!nombre) { toast('Ingresá el nombre del evento','warn'); return }
  const pkgId  = parseInt(document.getElementById('cot-paquete')?.value)||0
  const pkg    = PAQUETES.find(x=>x.id===pkgId)
  const cartTotal = cart.reduce((a,x)=>a+x.precio*x.qty,0)
  const total  = (pkg?.precio||0) + cartTotal
  EVENTOS.push({
    id:       EVENTOS.length+1,
    tipo:     document.getElementById('cot-tipo')?.value||'social',
    nombre,
    espacio:  parseInt(document.getElementById('cot-espacio')?.value)||1,
    paquete:  pkgId||null,
    fecha:    document.getElementById('cot-fecha')?.value||'',
    hora:     document.getElementById('cot-hora')?.value||'',
    personas: parseInt(document.getElementById('cot-personas')?.value)||0,
    estado,
    total,
    seña:     estado==='confirmado' ? Math.round(total/2) : 0,
    contacto: 'Sin contacto',
  })
  cart = []
  switchTab('agenda')
  renderMain()
  toast('✓ Evento "'+nombre+'" '+(estado==='confirmado'?'confirmado':'guardado como pendiente'))
}

function resetCotizacion() { renderMain() }

function confirmarEvento(id) {
  const e = EVENTOS.find(x=>x.id===id)
  if (e) { e.estado='confirmado'; e.seña=Math.round(e.total/2) }
  renderMain()
  toast('✓ Evento confirmado')
}

function openCotizarConPaquete(pkgId) {
  switchTab('cotizar')
  setTimeout(()=>{
    const sel = document.getElementById('cot-paquete')
    if (sel) { sel.value=pkgId; updateCotEstimado() }
  }, 100)
}
function openCotizacionFinal() {
  if (!cart.length) { toast('Agregá items al carrito primero','warn'); return }
  switchTab('cotizar')
  setTimeout(()=>updateCotEstimado(), 100)
}

function saveNuevoEvento(estado) {
  const nombre = document.getElementById('ne-nombre')?.value.trim()
  if (!nombre) { toast('Ingresá el nombre','warn'); return }
  const pkgId  = parseInt(document.getElementById('ne-paquete')?.value)||0
  const pkg    = PAQUETES.find(x=>x.id===pkgId)
  EVENTOS.push({
    id:       EVENTOS.length+1,
    tipo:     document.getElementById('ne-tipo')?.value||'social',
    nombre,
    espacio:  parseInt(document.getElementById('ne-espacio')?.value)||1,
    paquete:  pkgId||null,
    fecha:    document.getElementById('ne-fecha')?.value||'',
    hora:     document.getElementById('ne-hora')?.value||'',
    personas: parseInt(document.getElementById('ne-personas')?.value)||0,
    estado,
    total:    pkg?.precio||0,
    seña:     estado==='confirmado'?Math.round((pkg?.precio||0)/2):0,
    contacto: document.getElementById('ne-contacto')?.value.trim()||'Sin contacto',
  })
  closeModal(); renderMain()
  toast('✓ Evento "'+nombre+'" '+(estado==='confirmado'?'confirmado':'guardado'))
}

//  HELPERS
// ══════════════════════════════════════════════════════════
function showModal(html) {
  document.getElementById('modal-body').innerHTML = html
  document.getElementById('modal').style.display  = 'flex'
}
function closeModal() { document.getElementById('modal').style.display='none' }

function toast(msg,type='success') {
  const cols={success:'var(--ok)',warn:'var(--warn)',error:'var(--err)'}
  const t=document.createElement('div');t.className='toast'
  t.innerHTML='<span style="color:'+(cols[type]||cols.success)+'">●</span> '+msg
  document.body.appendChild(t);setTimeout(()=>t.remove(),2600)
}
function toggleTheme() {
  const h=document.documentElement
  h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark')
  localStorage.setItem('shos-theme',h.getAttribute('data-theme'))
}
const st=localStorage.getItem('shos-theme')
if(st) document.documentElement.setAttribute('data-theme',st)

renderMain()
