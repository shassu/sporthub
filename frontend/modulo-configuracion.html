<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root[data-theme="dark"]{
  --bg:#06080f;--s1:#0c0f1a;--s2:#111520;--s3:#161b2a;
  --bd:#1c2235;--bd2:#252d45;--bd3:#303a58;
  --tx:#dde3f4;--tx2:#8494b8;--tx3:#4a5878;
  --ac:#5b7fff;--ok:#2ecc71;--warn:#f0a020;--err:#e05050;
  --sh:0 8px 40px #00000099;--sh2:0 2px 12px #00000066;
}
:root[data-theme="light"]{
  --bg:#f0f3fb;--s1:#fff;--s2:#f5f8ff;--s3:#edf0f9;
  --bd:#e0e5f0;--bd2:#c8d0e8;--bd3:#b0bcd8;
  --tx:#0d1530;--tx2:#5a6a90;--tx3:#9aaac8;
  --ac:#3d60f0;--ok:#16a34a;--warn:#d97706;--err:#dc2626;
  --sh:0 4px 20px #0000001a;--sh2:0 2px 8px #00000012;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px}

/* TOPBAR */
.top{display:flex;align-items:center;gap:12px;padding:11px 24px;background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;box-shadow:var(--sh2)}
.lb{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#5b7fff,#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;font-family:'Syne',sans-serif}
.ln{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.ls{font-size:10px;color:var(--tx3)}
.ttog{width:40px;height:22px;border-radius:11px;background:var(--bd2);cursor:pointer;position:relative;margin-left:auto}
.ttog::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--ac);transition:transform .2s}
[data-theme="light"] .ttog::after{transform:translateX(18px)}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 49px);overflow:hidden}

/* SIDEBAR NAV */
.snav{width:220px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--bd);overflow-y:auto;padding:12px 8px}
.snav-section{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;padding:8px 10px 4px;margin-top:8px}
.snav-section:first-child{margin-top:0}
.snav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--tx2);transition:all .13s}
.snav-item:hover{background:var(--s2);color:var(--tx)}
.snav-item.active{background:var(--ac)15;color:var(--ac);font-weight:500}
.snav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.snav-badge{margin-left:auto;font-size:10px;background:var(--ac)22;color:var(--ac);border-radius:10px;padding:1px 6px;font-weight:600}

/* CONTENIDO */
.content{flex:1;overflow-y:auto;padding:24px}
.section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px}
.section-sub{font-size:12px;color:var(--tx2);margin-bottom:20px}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;margin-bottom:14px;overflow:hidden}
.card-head{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;font-family:'Syne',sans-serif;display:flex;align-items:center;gap:7px}
.card-body{padding:16px}

/* GRID DE ITEMS CONFIGURABLES */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.cfg-item{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .13s;position:relative}
.cfg-item:hover{border-color:var(--bd2)}
.cfg-item-icon{font-size:22px;flex-shrink:0;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.cfg-item-info{flex:1;min-width:0}
.cfg-item-name{font-size:12px;font-weight:600;color:var(--tx)}
.cfg-item-sub{font-size:10px;color:var(--tx3);margin-top:2px}
.cfg-item-actions{display:flex;gap:4px;opacity:0;transition:opacity .13s}
.cfg-item:hover .cfg-item-actions{opacity:1}

/* ADD BUTTON */
.add-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:1px dashed var(--bd2);cursor:pointer;font-size:12px;color:var(--tx3);transition:all .13s;margin-top:6px}
.add-row:hover{border-color:var(--ac);color:var(--ac);background:var(--ac)08}

/* FORM INPUTS */
.flbl{font-size:11px;color:var(--tx2);margin-bottom:4px;display:block}
.finp,.fsel,.ftextarea{width:100%;padding:9px 12px;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.finp:focus,.fsel:focus,.ftextarea:focus{border-color:var(--ac)}
.ftextarea{resize:vertical;min-height:70px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* COLOR SWATCHES */
.swatches{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.swatch{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .13s}
.swatch:hover{transform:scale(1.1)}
.swatch.active{border-color:var(--tx)}

/* ICON PICKER */
.icon-grid{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.icon-opt{width:34px;height:34px;border-radius:7px;border:1px solid var(--bd2);background:var(--s2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .13s}
.icon-opt:hover{border-color:var(--ac)}
.icon-opt.active{border-color:var(--ac);background:var(--ac)15}

/* CHART TYPE PICKER */
.chart-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.chart-opt{padding:10px 8px;border-radius:9px;border:1px solid var(--bd2);background:var(--s2);cursor:pointer;text-align:center;transition:all .13s}
.chart-opt:hover{border-color:var(--ac)}
.chart-opt.active{border-color:var(--ac);background:var(--ac)12}
.chart-opt-icon{font-size:22px;margin-bottom:4px}
.chart-opt-name{font-size:10px;font-weight:500;color:var(--tx2)}
.chart-opt.active .chart-opt-name{color:var(--ac)}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd)55}
.toggle-row:last-child{border-bottom:none}
.toggle-info{flex:1}
.toggle-label{font-size:12px;font-weight:500;color:var(--tx)}
.toggle-desc{font-size:11px;color:var(--tx3);margin-top:1px}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--bd2);cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.toggle.on{background:var(--ac)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}

/* MODAL */
.overlay{position:fixed;inset:0;background:#00000088;display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:16px;padding:24px;width:100%;max-width:480px;box-shadow:var(--sh);max-height:92vh;overflow-y:auto;animation:su .18s}
@keyframes su{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--tx2);margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* BTNS */
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:opacity .14s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{opacity:.85}
.btn-primary{background:var(--ac);color:#fff}
.btn-ghost{background:var(--s2);border:1px solid var(--bd2);color:var(--tx2)}
.btn-err{background:#3d151522;color:var(--err);border:1px solid var(--err)44}
.btn-sm{padding:4px 9px;font-size:11px;border-radius:6px}
.btn-icon{width:26px;height:26px;padding:0;border-radius:6px;justify-content:center}

/* SUPPLIER TABLE */
.sup-table{width:100%;border-collapse:collapse;font-size:12px}
.sup-table th{padding:8px 12px;font-size:10px;color:var(--tx3);text-transform:uppercase;font-weight:600;letter-spacing:.05em;border-bottom:1px solid var(--bd);text-align:left}
.sup-table td{padding:9px 12px;border-bottom:1px solid var(--bd)55;vertical-align:middle}
.sup-table tr:hover td{background:var(--s2)}

/* PREVIEW AGENTE */
.agent-preview{background:#07130f;border-radius:12px;padding:14px;font-size:12px}
[data-theme="light"] .agent-preview{background:#edfaf2}
.agent-bubble{background:#0d2a1a;border-radius:4px 10px 10px 10px;padding:9px 13px;font-size:12px;color:#c8e6c9;line-height:1.55;margin-top:8px;display:inline-block;max-width:85%}
[data-theme="light"] .agent-bubble{background:#dcfce7;color:#15803d}

/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;background:var(--s1);border:1px solid var(--bd2);border-radius:10px;padding:10px 16px;font-size:12px;color:var(--tx);z-index:300;box-shadow:var(--sh);display:flex;align-items:center;gap:8px;animation:ts .2s}
@keyframes ts{from{transform:translateX(110%)}to{transform:translateX(0)}}

/* RANGE */
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--bd2);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--ac);cursor:pointer}
</style>
</head>

<header class="top">

      <span style="flex:1">${item.label}</span>
      ${badge!==null?`<span class="snav-badge">${badge}</span>`:''}

}

function goTo(id) {
  activeSection = id
  renderNav()
  renderContent()
}

function renderContent() {
  switch(activeSection) {
    case 'club':         renderClub();         break
    case 'visual':       renderVisual();       break
    case 'sports':       renderSports();       break
    case 'sectors':      renderSectors();      break
    case 'categories':   renderCategories();   break
    case 'payments':     renderPayments();     break
    case 'suppliers':    renderSuppliers();    break
    case 'hours':        renderHours();        break
    case 'charts':       renderCharts();       break
    case 'agent':        renderAgent();        break
    case 'notifications':renderNotifications();break
    case 'features':     renderFeatures();     break
    case 'users':        renderUsers();        break
    default:             renderClub()
  }
}

function uploadLogo(input) {
  const file = input.files?.[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = e => {
    CONFIG.club.logoImg = e.target.result
    CONFIG.club.logo    = null
    // Actualizar preview grande
    const box = document.getElementById('logo-preview-box')
    if (box) box.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover">`
    // Actualizar preview topbar
    const prevBox = document.getElementById('prev-logo-box')
    if (prevBox) prevBox.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover">`
    toast('✓ Logo cargado')
  }
  reader.readAsDataURL(file)
}

function applyPalette(primary, accent) {
  setPrimaryColor(primary)
  setAccentColor(accent)
  toast('✓ Paleta aplicada')
}

function setLogo(ic) {
  CONFIG.club.logo    = ic
  CONFIG.club.logoImg = null
  document.querySelectorAll('.icon-opt').forEach(el => el.classList.toggle('active', el.textContent === ic))
  // Actualizar preview grande
  const bigBox = document.getElementById('logo-preview-box')
  if (bigBox) bigBox.innerHTML = `<span id="logo-preview-icon">${ic}</span>`
  // Actualizar preview topbar
  const prevBox = document.getElementById('prev-logo-box')
  if (prevBox) prevBox.innerHTML = `<span id="prev-logo-icon">${ic}</span>`
}

function setPrimaryColor(col) {
  if (!col || col.length < 4) return
  CONFIG.club.primaryColor = col
  // Sync picker + hex input
  const picker = document.getElementById('color-primary-picker')
  const hex    = document.getElementById('color-primary-hex')
  if (picker) picker.value = col
  if (hex)    hex.value    = col
  // Actualizar preview
  const btn1   = document.getElementById('prev-btn-1')
  const logoB  = document.getElementById('prev-logo-box')
  const logoLg = document.getElementById('logo-preview-box')
  if (btn1)   btn1.style.background = col
  if (logoB)  logoB.style.background = col
  if (logoLg) logoLg.style.background = col
}

function setAccentColor(col) {
  if (!col || col.length < 4) return
  CONFIG.club.accentColor = col
  // Sync picker + hex input
  const picker = document.getElementById('color-accent-picker')
  const hex    = document.getElementById('color-accent-hex')
  if (picker) picker.value = col
  if (hex)    hex.value    = col
  // Actualizar preview
  const btn2 = document.getElementById('prev-btn-2')
  if (btn2) { btn2.style.borderColor = col; btn2.style.color = col }
}
function setTheme(t) {
  const theme = t === 'auto' ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : t
  document.documentElement.setAttribute('data-theme', theme)
  toast('Tema aplicado')
}

function toggleSport(id) {
  const s = CONFIG.sports.find(x=>x.id===id)
  if (s) { s.active = !s.active; renderSports(); renderNav() }
}

function openSportModal(id) {
  const s = id ? CONFIG.sports.find(x=>x.id===id) : null
  const icons = ['⚽','🎾','🏀','🏐','🏋','💪','🏊','🎯','🏑','🥊','🤸','🏇','🎱','🎿','🚴','🧘']
  showModal(`
    <div class="modal-title">${s?'Editar deporte':'Nuevo deporte'}</div>
    <div class="modal-sub">${s?s.name:'Configurá el deporte y sus categorías'}</div>
    <div class="frow" style="margin-bottom:10px">
      <div><label class="flbl">Nombre</label><input class="finp" id="sp-name" value="${s?.name||''}"></div>
      <div>
        <label class="flbl">Color</label>
        <div class="swatches">
          ${['#5b7fff','#22c55e','#f59e0b','#ef4444','#a855f7','#06b6d4','#f97316','#ec4899'].map(c=>`
            <div class="swatch ${s?.color===c?'active':''}" style="background:${c}" onclick="this.parentElement.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));this.classList.add('active')"></div>
          `).join('')}
        </div>
      </div>
    </div>
    <label class="flbl">Ícono</label>
    <div class="icon-grid">${icons.map(ic=>`<div class="icon-opt ${s?.icon===ic?'active':''}" onclick="this.parentElement.querySelectorAll('.icon-opt').forEach(x=>x.classList.remove('active'));this.classList.add('active')">${ic}</div>`).join('')}</div>
    <label class="flbl">Categorías (una por línea)</label>
    <textarea class="finp ftextarea" id="sp-cats" style="margin-bottom:0">${s?.categories?.join('\n')||''}</textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      ${s?`<button class="btn btn-err btn-sm" onclick="deleteSport('${s.id}')">Eliminar</button>`:''}
      <button class="btn btn-primary" onclick="saveSport('${s?.id||''}')">Guardar</button>
    </div>
  `)
}

function saveSport(id) {
  const name  = document.getElementById('sp-name')?.value.trim()
  if (!name) { toast('Ingresá un nombre','warn'); return }
  const icon  = document.querySelector('#modal-body .icon-opt.active')?.textContent || '⚽'
  const color = document.querySelector('#modal-body .swatch.active')?.style.background || '#5b7fff'
  const cats  = document.getElementById('sp-cats')?.value.split('\n').map(s=>s.trim()).filter(Boolean) || []
  if (id) {
    const s = CONFIG.sports.find(x=>x.id===id)
    if (s) Object.assign(s, {name, icon, color, categories:cats})
  } else {
    CONFIG.sports.push({id:'sp_'+Date.now(), name, icon, color, active:true, categories:cats})
  }
  closeModal(); renderSports(); renderNav(); toast('✓ Deporte guardado')
}

function deleteSport(id) {
  CONFIG.sports = CONFIG.sports.filter(s=>s.id!==id)
  closeModal(); renderSports(); renderNav(); toast('Deporte eliminado','warn')
}

function saveSector(id) {

// ── Modal de PRODUCTO dentro de categoría ──────────────
// Estado del modal de producto (evita pasar IDs por string en template)
let _prodModalCatId     = null
let _prodModalProductId = null

function openProductModal(catId, productId) {
  _prodModalCatId     = catId
  _prodModalProductId = productId || null

  const cat = CONFIG.productCategories.find(x=>x.id===catId)
  if (!cat) { toast('Categoría no encontrada','warn'); return }
  const p = productId ? cat.products?.find(x=>x.id===productId) : null

  const supplierOptions = CONFIG.suppliers.map(s=>
    `<option value="${s.id}" ${p?.supplierId==s.id?'selected':''}>${s.name}</option>`
  ).join('')

  // Selector de categoría (para cambiar de categoría al editar)
  const catOptions = CONFIG.productCategories.map(c=>
    `<option value="${c.id}" ${c.id===catId?'selected':''}>${c.icon} ${c.name}</option>`
  ).join('')

  showModal(`
    <div class="modal-title">${p?'Editar producto':'Nuevo producto'}</div>
    <div class="modal-sub" style="display:flex;align-items:center;gap:6px">
      <span style="font-size:16px">${cat.icon}</span>
      <span>Categoría:</span>
      <select id="prod-cat" style="background:var(--s2);border:1px solid var(--bd2);border-radius:6px;padding:3px 8px;color:var(--tx);font-size:12px;outline:none" onchange="_prodModalCatId=this.value">
        ${catOptions}
      </select>
    </div>

    <div style="height:1px;background:var(--bd);margin:12px 0"></div>

    <label class="flbl">Nombre del producto</label>
    <input class="finp" id="prod-name" value="${p?.name||''}" placeholder="Ej: Agua mineral 500ml"
      style="font-size:14px" autofocus>

    <div class="frow3" style="margin-bottom:0">
      <div>
        <label class="flbl">Precio de venta</label>
        <input type="number" class="finp" id="prod-price" value="${p?.price||''}"
          placeholder="$0" min="0" oninput="calcMarginPreview()">
      </div>
      <div>
        <label class="flbl">Costo unitario</label>
        <input type="number" class="finp" id="prod-cost" value="${p?.cost||''}"
          placeholder="$0" min="0" oninput="calcMarginPreview()">
      </div>
      <div>
        <label class="flbl">Stock actual</label>
        <input type="number" class="finp" id="prod-stock" value="${p?.stock!=null?p.stock:0}" min="0">
      </div>
    </div>

    <!-- Preview de margen en vivo -->
    <div id="margin-live" style="background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:9px 13px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;font-size:12px">
      <span style="color:var(--tx2)">💡 Margen bruto</span>
      <span id="margin-live-val" style="font-family:'DM Mono',monospace;font-weight:700;color:var(--tx3)">Ingresá precio y costo</span>
    </div>

    <div class="frow">
      <div>
        <label class="flbl">Stock mínimo (alerta)</label>
        <input type="number" class="finp" id="prod-minstock" value="${p?.minStock!=null?p.minStock:5}" min="0">
      </div>
      <div>
        <label class="flbl">SKU / Código</label>
        <input class="finp" id="prod-sku" value="${p?.sku||''}" placeholder="Opcional">
      </div>
    </div>

    <label class="flbl">Proveedor</label>
    <select class="fsel" id="prod-supplier">
      <option value="">Sin asignar</option>
      ${supplierOptions}
    </select>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      ${p?`<button class="btn btn-err btn-sm" onclick="deleteProductAndClose('${catId}','${p.id}')">Eliminar</button>`:''}
      <button class="btn btn-primary" id="prod-save-btn" onclick="saveProduct()">
        ${p ? 'Guardar cambios' : 'Agregar producto'}
      </button>
    </div>
  `)

  // Calcular margen si hay valores al abrir (modo edición)
  setTimeout(calcMarginPreview, 30)
}

function calcMarginPreview() {
  const price = parseFloat(document.getElementById('prod-price')?.value) || 0
  const cost  = parseFloat(document.getElementById('prod-cost')?.value)  || 0
  const el    = document.getElementById('margin-live-val')
  if (!el) return
  if (!price || !cost) {
    el.textContent = 'Ingresá precio y costo'
    el.style.color = 'var(--tx3)'
    return
  }
  const m      = Math.round((price - cost) / price * 100)
  const profit = price - cost
  el.textContent = `${m}% — ganás $${profit.toLocaleString()} por unidad`
  el.style.color = m >= 50 ? 'var(--ok)' : m >= 30 ? 'var(--warn)' : 'var(--err)'
}

function saveProduct() {
  const name = document.getElementById('prod-name')?.value?.trim()
  if (!name) { toast('Ingresá el nombre del producto', 'warn'); return }

  // Leer categoría destino desde el select (puede haber cambiado)
  const targetCatId = document.getElementById('prod-cat')?.value || _prodModalCatId
  const cat = CONFIG.productCategories.find(x=>x.id===targetCatId)
  if (!cat) { toast('Categoría no encontrada', 'warn'); return }
  if (!cat.products) cat.products = []

  const price = parseFloat(document.getElementById('prod-price')?.value) || 0
  const cost  = parseFloat(document.getElementById('prod-cost')?.value)  || 0
  if (!price) { toast('Ingresá el precio de venta', 'warn'); return }

  const data = {
    name,
    price,
    cost,
    stock:      parseInt(document.getElementById('prod-stock')?.value)    || 0,
    minStock:   parseInt(document.getElementById('prod-minstock')?.value) || 5,
    sku:        document.getElementById('prod-sku')?.value?.trim()        || '',
    supplierId: document.getElementById('prod-supplier')?.value           || '',
  }

  if (_prodModalProductId) {
    // Edición — puede cambiar de categoría
    if (targetCatId !== _prodModalCatId) {
      // Mover a otra categoría
      const oldCat = CONFIG.productCategories.find(x=>x.id===_prodModalCatId)
      if (oldCat) oldCat.products = oldCat.products.filter(p=>p.id!==_prodModalProductId)
      cat.products.push({ id: _prodModalProductId, ...data })
    } else {
      const idx = cat.products.findIndex(x=>x.id===_prodModalProductId)
      if (idx >= 0) cat.products[idx] = { ...cat.products[idx], ...data }
    }
    toast(`✓ ${name} actualizado`)
  } else {
    // Nuevo producto
    cat.products.push({ id: 'p_' + Date.now(), ...data })
    toast(`✓ ${name} agregado a ${cat.icon} ${cat.name}`)
  }

  closeModal()
  renderCategories()
}

function deleteProductAndClose(catId, productId) {
  const cat = CONFIG.productCategories.find(x=>x.id===catId)
  if (!cat) return
  cat.products = cat.products.filter(p=>p.id!==productId)
  closeModal()
  renderCategories()
  toast('Producto eliminado', 'warn')
}

function deleteProduct(catId, productId) {
  deleteProductAndClose(catId, productId)
}

function openSupplierModal(id) {
  const s = id ? CONFIG.suppliers.find(x=>x.id===id) : null
  const cats = ['bebidas','deportivo','comida','ropa','suplementos','limpieza','tecnología','servicios','otro']
  showModal(`
    <div class="modal-title">${s?'Editar proveedor':'Nuevo proveedor'}</div>
    <div class="modal-sub">${s?s.name:'Agregá los datos del proveedor'}</div>
    <div class="frow">
      <div><label class="flbl">Nombre</label><input class="finp" id="sup-name" value="${s?.name||''}"></div>
      <div><label class="flbl">Contacto</label><input class="finp" id="sup-contact" value="${s?.contact||''}"></div>
    </div>
    <div class="frow">
      <div><label class="flbl">Teléfono</label><input class="finp" id="sup-phone" value="${s?.phone||''}"></div>
      <div><label class="flbl">Email</label><input class="finp" id="sup-email" value="${s?.email||''}"></div>
    </div>
    <div class="frow">
      <div>
        <label class="flbl">Categoría</label>
        <select class="fsel" id="sup-cat">
          ${cats.map(c=>`<option value="${c}" ${s?.category===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div><label class="flbl">Plazo de pago (días)</label><input type="number" class="finp" id="sup-terms" value="${s?.paymentTerms||30}"></div>
    </div>
    <div class="frow">
      <div><label class="flbl">Deuda actual ($)</label><input type="number" class="finp" id="sup-debt" value="${s?.debt||0}"></div>
      <div></div>
    </div>
    <label class="flbl">Notas internas</label>
    <textarea class="finp ftextarea" id="sup-notes" style="min-height:50px">${s?.notes||''}</textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      ${s?`<button class="btn btn-err btn-sm" onclick="deleteSupplier(${s.id})">Eliminar</button>`:''}
      <button class="btn btn-primary" onclick="saveSupplier(${s?.id||0})">Guardar</button>
    </div>
  `)
}

function saveSupplier(id) {
  const name = document.getElementById('sup-name')?.value.trim()
  if (!name) { toast('Ingresá el nombre','warn'); return }
  const data = {
    name,
    contact:      document.getElementById('sup-contact')?.value || '',
    phone:        document.getElementById('sup-phone')?.value || '',
    email:        document.getElementById('sup-email')?.value || '',
    category:     document.getElementById('sup-cat')?.value || 'otro',
    paymentTerms: parseInt(document.getElementById('sup-terms')?.value)||30,
    debt:         parseFloat(document.getElementById('sup-debt')?.value)||0,
    notes:        document.getElementById('sup-notes')?.value || '',
  }
  if (id) {
    const s = CONFIG.suppliers.find(x=>x.id===id)
    if (s) Object.assign(s, data)
  } else {
    CONFIG.suppliers.push({id: Date.now(), ...data})
  }
  closeModal(); renderSuppliers(); renderNav(); toast('✓ Proveedor guardado')
}

function deleteSupplier(id) {
  CONFIG.suppliers = CONFIG.suppliers.filter(s=>s.id!==id)
  closeModal(); renderSuppliers(); renderNav(); toast('Proveedor eliminado','warn')
}

function registerPayment(id) {
  const s = CONFIG.suppliers.find(x=>x.id===id)
  if (!s) return
  const amount = prompt(`Registrar pago a ${s.name}\nDeuda actual: $${s.debt.toLocaleString()}\n\n¿Cuánto se pagó?`)
  if (!amount || isNaN(amount)) return
  s.debt = Math.max(0, s.debt - parseFloat(amount))
  renderSuppliers()
  toast(`✓ Pago de $${parseFloat(amount).toLocaleString()} registrado`)
}

              <td><span style="font-size:10px;border-radius:10px;padding:2px 8px;background:${u.active?'var(--ok-bg,#091a0f)':'var(--s3)'};color:${u.active?'var(--ok)':'var(--tx3)'}">${u.active?'Activo':'Inactivo'}</span></td>
              <td><button class="btn btn-ghost btn-sm" onclick="toast('Editar usuario — próximamente')">✏ Editar</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><span class="card-title">Permisos por rol</span></div>
      <div class="card-body" style="overflow-x:auto">
        <table class="sup-table">
          <thead><tr><th>Módulo</th><th style="text-align:center">Admin</th><th style="text-align:center">Recepción</th><th style="text-align:center">Cajero/a</th><th style="text-align:center">Profesor/a</th></tr></thead>
          <tbody>
            ${[
              ['Reservas',      true,  true,  true,  false],
              ['Caja',          true,  false, true,  false],
              ['Jugadores',     true,  true,  false, false],
              ['Tienda',        true,  true,  true,  false],
              ['Estadísticas',  true,  false, false, false],
              ['Configuración', true,  false, false, false],
              ['Clases',        true,  true,  false, true ],
            ].map(([mod,...perms])=>`<tr>
              <td>${mod}</td>
              ${perms.map(p=>`<td style="text-align:center">${p?'<span style="color:var(--ok)">✓</span>':'<span style="color:var(--tx3)">—</span>'}</td>`).join('')}
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `
}

// ══════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════
function showModal(html) {
  document.getElementById('modal-body').innerHTML = html
  document.getElementById('modal').style.display  = 'flex'
}
function closeModal() { document.getElementById('modal').style.display = 'none' }

function saveAll() {
  localStorage.setItem('sporthubos-config', JSON.stringify(CONFIG))
  toast('✓ Configuración guardada correctamente')
}

function toast(msg, type='success') {
  const colors = { success:'var(--ok)', warn:'var(--warn)', error:'var(--err)' }
  const t = document.createElement('div'); t.className = 'toast'
  t.innerHTML = `<span style="color:${colors[type]||colors.success}">●</span> ${msg}`
  document.body.appendChild(t); setTimeout(()=>t.remove(), 2600)
}

function toggleTheme() {
  const h = document.documentElement
  h.setAttribute('data-theme', h.getAttribute('data-theme')==='dark'?'light':'dark')
  localStorage.setItem('shos-theme', h.getAttribute('data-theme'))
}
const st = localStorage.getItem('shos-theme')
if (st) document.documentElement.setAttribute('data-theme', st)

// Cargar config guardada si existe
try {
  const saved = localStorage.getItem('sporthubos-config')
  if (saved) Object.assign(CONFIG, JSON.parse(saved))
} catch(e) {}

// INIT
renderNav()
renderContent()
</script>
</body>
</html>
