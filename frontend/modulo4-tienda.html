<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sport Hub OS — Tienda</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root[data-theme="dark"]{
  --bg:#06080f;--s1:#0c0f1a;--s2:#111520;--s3:#161b2a;
  --bd:#1c2235;--bd2:#252d45;--bd3:#303a58;
  --tx:#dde3f4;--tx2:#8494b8;--tx3:#4a5878;
  --ac:#5b7fff;--ok:#2ecc71;--warn:#f0a020;--err:#e05050;--info:#38bdf8;
  --sh:0 8px 40px #00000099;--sh2:0 2px 12px #00000066;
  --low-bg:#1a0d05;--low-bd:#4d2a0a;--low-col:#f0a020;
  --out-bg:#1a0505;--out-bd:#4d0a0a;--out-col:#e05050;
  --ok-bg:#091a0f;--ok-bd:#1a4d30;--ok-col:#2ecc71;
}
:root[data-theme="light"]{
  --bg:#f0f3fb;--s1:#fff;--s2:#f5f8ff;--s3:#edf0f9;
  --bd:#e0e5f0;--bd2:#c8d0e8;--bd3:#b0bcd8;
  --tx:#0d1530;--tx2:#5a6a90;--tx3:#9aaac8;
  --ac:#3d60f0;--ok:#16a34a;--warn:#d97706;--err:#dc2626;--info:#0284c7;
  --sh:0 4px 20px #0000001a;--sh2:0 2px 8px #00000012;
  --low-bg:#fef9e7;--low-bd:#fde047;--low-col:#ca8a04;
  --out-bg:#fef2f2;--out-bd:#fca5a5;--out-col:#dc2626;
  --ok-bg:#f0fdf4;--ok-bd:#86efac;--ok-col:#16a34a;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px;transition:background .25s,color .25s}

.top{display:flex;align-items:center;gap:12px;padding:11px 24px;background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;box-shadow:var(--sh2)}
.lb{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#5b7fff,#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;font-family:'Syne',sans-serif;flex-shrink:0}
.ln{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.ls{font-size:10px;color:var(--tx3)}
.ttog{width:40px;height:22px;border-radius:11px;background:var(--bd2);border:1px solid var(--bd2);cursor:pointer;position:relative;flex-shrink:0}
.ttog::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--ac);transition:transform .2s}
[data-theme="light"] .ttog::after{transform:translateX(18px)}
.top-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:all .14s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{opacity:.85}
.btn-primary{background:var(--ac);color:#fff}
.btn-ghost{background:var(--s2);border:1px solid var(--bd2);color:var(--tx2)}
.btn-ghost:hover{color:var(--tx);border-color:var(--bd3)}
.btn-warn{background:var(--low-bg);color:var(--low-col);border:1px solid var(--low-bd)}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}

/* TABS */
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bd);padding:0 24px}
.tab{padding:10px 18px;cursor:pointer;font-size:12px;font-weight:500;color:var(--tx2);border-bottom:2px solid transparent;transition:all .14s;white-space:nowrap}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--tx);border-bottom-color:var(--ac)}

/* LAYOUT */
.main{padding:20px 24px;max-width:1400px;margin:0 auto}

/* KPI STRIP */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kv{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;line-height:1;margin-top:6px}
.kl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}

/* GRID DE PRODUCTOS */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.prod-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;overflow:hidden;transition:border-color .14s,transform .14s;cursor:pointer}
.prod-card:hover{border-color:var(--bd2);transform:translateY(-2px)}
.prod-card.low-stock{border-color:var(--low-bd)}
.prod-card.out-stock{border-color:var(--out-bd)}
.prod-card-top{padding:14px 14px 10px;position:relative}
.prod-icon{font-size:28px;margin-bottom:8px;display:block}
.prod-name{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:2px;line-height:1.3}
.prod-cat{font-size:10px;color:var(--tx3)}
.prod-stock-badge{position:absolute;top:10px;right:10px;font-size:9px;font-weight:700;border-radius:6px;padding:2px 7px}
.badge-ok{background:var(--ok-bg);color:var(--ok-col)}
.badge-low{background:var(--low-bg);color:var(--low-col)}
.badge-out{background:var(--out-bg);color:var(--out-col)}
.prod-card-bottom{padding:10px 14px;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.prod-price{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:var(--tx)}
.prod-margin{font-size:10px;font-weight:600;border-radius:5px;padding:2px 7px}
.margin-high{background:#0d2a1a;color:#2ecc71}
.margin-mid{background:#1a1a05;color:#e0c040}
.margin-low{background:#1a0d05;color:#f0a020}
[data-theme="light"] .margin-high{background:#f0fdf4;color:#16a34a}
[data-theme="light"] .margin-mid{background:#fefce8;color:#ca8a04}
[data-theme="light"] .margin-low{background:#fff7ed;color:#d97706}
.prod-stock-bar{height:3px;background:var(--bd);position:relative}
.prod-stock-fill{height:100%;transition:width .3s}

/* LISTA DE PRODUCTOS (tabla) */
.prod-table{width:100%;border-collapse:collapse}
.prod-table th{padding:9px 12px;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap}
.prod-table th.r{text-align:right}
.prod-table td{padding:9px 12px;border-bottom:1px solid var(--bd)55;font-size:12px;vertical-align:middle}
.prod-table tr:hover td{background:var(--s2)}
.prod-table tr:last-child td{border-bottom:none}

/* MODAL */
.overlay{position:fixed;inset:0;background:#00000088;display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;animation:fi .15s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:16px;padding:24px;width:100%;max-width:460px;box-shadow:var(--sh);animation:su .18s;max-height:92vh;overflow-y:auto}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--tx2);margin-bottom:16px}
.flbl{font-size:11px;color:var(--tx2);margin-bottom:4px;display:block}
.finp,.fsel{width:100%;padding:9px 12px;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;margin-bottom:10px;transition:border-color .15s}
.finp:focus,.fsel:focus{border-color:var(--ac)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.margin-preview{background:var(--s2);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;display:flex;align-items:center;justify-content:space-between}

/* VENTA MODAL */
.sale-item-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd)}
.sale-item-row:last-child{border-bottom:none}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--bd2);background:var(--s2);color:var(--tx);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.qty-btn:hover{background:var(--bd2)}
.qty-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;min-width:20px;text-align:center}

/* ALERTAS STOCK */
.alert-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--bd)55}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* CHART BARRAS */
.bar-h-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-h-lbl{font-size:11px;color:var(--tx2);width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-h-track{flex:1;background:var(--bd);border-radius:4px;height:18px;overflow:hidden}
.bar-h-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:10px;font-weight:600;color:#fff;transition:width .4s}
.bar-h-val{font-size:11px;font-family:'DM Mono',monospace;color:var(--tx2);min-width:44px;text-align:right}

/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;background:var(--s1);border:1px solid var(--bd2);border-radius:10px;padding:10px 16px;font-size:12px;color:var(--tx);z-index:300;box-shadow:var(--sh);display:flex;align-items:center;gap:8px;animation:si .2s}
@keyframes si{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>

<header class="top">
  <div class="lb">S</div>
  <div><div class="ln">Sport Hub OS</div><div class="ls">Tienda & Productos — Sport Hub Norte</div></div>
  <div class="top-right">
    <button class="btn btn-ghost btn-sm" onclick="openSale()">🛒 Registrar venta</button>
    <button class="btn btn-warn btn-sm" onclick="switchTab('stock')" id="alert-btn"></button>
    <button class="btn btn-primary" onclick="openNewProduct()">+ Producto</button>
    <div class="ttog" onclick="toggleTheme()"></div>
  </div>
</header>

<div class="tabs">
  <div class="tab on" id="tab-catalogo"  onclick="switchTab('catalogo')">Catálogo</div>
  <div class="tab"    id="tab-ventas"    onclick="switchTab('ventas')">Ventas del día</div>
  <div class="tab"    id="tab-stock"     onclick="switchTab('stock')">Control de stock</div>
  <div class="tab"    id="tab-analisis"  onclick="switchTab('analisis')">Análisis</div>
</div>

<div class="main" id="main"></div>

<!-- MODAL NUEVO / EDITAR PRODUCTO -->
<div class="overlay" id="modal-prod" style="display:none" onclick="closeOv(event,'modal-prod')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="mprod-title">Nuevo producto</div>
    <div class="modal-sub">Completá los datos del producto</div>
    <div class="frow">
      <div>
        <label class="flbl">Nombre</label>
        <input type="text" class="finp" id="p-name" placeholder="Ej: Agua mineral 500ml">
      </div>
      <div>
        <label class="flbl">Categoría</label>
        <select class="fsel" id="p-cat">
          <option value="bebida">🧴 Bebida</option>
          <option value="comida">🍕 Comida</option>
          <option value="paleta">🎾 Paleta</option>
          <option value="pelota">🎾 Pelota</option>
          <option value="ropa">👕 Ropa</option>
          <option value="calzado">👟 Calzado</option>
          <option value="accesorio">🎽 Accesorio</option>
          <option value="alquiler">🔑 Alquiler</option>
          <option value="otro">📦 Otro</option>
        </select>
      </div>
    </div>
    <div class="frow3">
      <div>
        <label class="flbl">Precio de venta</label>
        <input type="number" class="finp" id="p-price" placeholder="$0" oninput="updateMarginPreview()">
      </div>
      <div>
        <label class="flbl">Costo unitario</label>
        <input type="number" class="finp" id="p-cost" placeholder="$0" oninput="updateMarginPreview()">
      </div>
      <div>
        <label class="flbl">Stock actual</label>
        <input type="number" class="finp" id="p-stock" placeholder="0" min="0">
      </div>
    </div>
    <div class="margin-preview" id="margin-preview">
      <span style="color:var(--tx2)">Margen bruto</span>
      <span id="margin-val" style="font-weight:700;font-family:'DM Mono',monospace">—</span>
    </div>
    <div class="frow">
      <div>
        <label class="flbl">Stock mínimo (alerta)</label>
        <input type="number" class="finp" id="p-minstock" placeholder="5" min="0">
      </div>
      <div>
        <label class="flbl">SKU / Código</label>
        <input type="text" class="finp" id="p-sku" placeholder="Opcional">
      </div>
    </div>
    <label class="flbl">Proveedor</label>
    <input type="text" class="finp" id="p-supplier" placeholder="Nombre del proveedor">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('modal-prod').style.display='none'">Cancelar</button>
      <button class="btn btn-ghost btn-sm" id="p-delete-btn" style="color:var(--err);border-color:var(--err);display:none" onclick="deleteProduct()">Eliminar</button>
      <button class="btn btn-primary" onclick="saveProduct()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL VENTA -->
<div class="overlay" id="modal-sale" style="display:none" onclick="closeOv(event,'modal-sale')">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:500px">
    <div class="modal-title">🛒 Registrar venta</div>
    <div class="modal-sub">Agregá los productos vendidos</div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" class="finp" id="sale-search" placeholder="Buscar producto..." oninput="renderSaleSearch()" style="margin:0;flex:1">
    </div>
    <div id="sale-search-results" style="margin-bottom:12px"></div>
    <div id="sale-cart" style="margin-bottom:12px"></div>
    <div style="background:var(--s2);border-radius:8px;padding:10px 12px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700">
        <span>Total</span>
        <span id="sale-total" style="font-family:'DM Mono',monospace;color:var(--ac)">$0</span>
      </div>
    </div>
    <div class="frow">
      <div>
        <label class="flbl">Forma de pago</label>
        <select class="fsel" id="sale-pay" style="margin:0">
          <option value="efectivo">Efectivo</option>
          <option value="transferencia">Transferencia</option>
          <option value="mercadopago">Mercado Pago</option>
          <option value="tarjeta">Tarjeta</option>
        </select>
      </div>
      <div>
        <label class="flbl">Cliente (opcional)</label>
        <input type="text" class="finp" id="sale-player" placeholder="Nombre" style="margin:0">
      </div>
    </div>
    <div class="modal-actions" style="margin-top:12px">
      <button class="btn btn-ghost" onclick="document.getElementById('modal-sale').style.display='none'">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmSale()">Confirmar venta</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  DATOS
// ══════════════════════════════════════════════════════════
const CAT_ICONS = {

const fmt = n => {
  if (n >= 1000000) return '$'+(n/1000000).toFixed(1)+'M'
  if (n >= 1000)    return '$'+(n/1000).toFixed(1)+'k'
  return '$'+n.toLocaleString()
}

function margin(p) {
  if (!p.price || !p.cost) return 0
  return Math.round((p.price - p.cost) / p.price * 100)
}

function stockStatus(p) {
  if (p.stock <= 0)           return 'out'
  if (p.stock <= p.minStock)  return 'low'
  return 'ok'
}

function stockBadge(p) {
  const s = stockStatus(p)
  if (s === 'out') return { cls:'badge-out', label:'Sin stock' }
  if (s === 'low') return { cls:'badge-low', label:`Stock bajo (${p.stock})` }
  return { cls:'badge-ok', label:`Stock: ${p.stock}` }
}

function marginClass(m) {
  if (m >= 50) return 'margin-high'
  if (m >= 30) return 'margin-mid'
  return 'margin-low'
}

// ══════════════════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════════════════
function switchTab(t) {
  activeTab = t
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('on'))
  document.getElementById('tab-'+t)?.classList.add('on')
  renderMain()
}

function renderMain() {
  updateAlertBtn()
  switch(activeTab) {
    case 'catalogo':  renderCatalogo();  break
    case 'ventas':    renderVentas();    break
    case 'stock':     renderStock();     break
    case 'analisis':  renderAnalisis();  break
  }
}

function updateAlertBtn() {
  const alerts = products.filter(p => stockStatus(p) !== 'ok')
  const btn = document.getElementById('alert-btn')
  if (!btn) return
  if (alerts.length) {
    btn.textContent = `⚠ ${alerts.length} alerta${alerts.length>1?'s':''} de stock`
    btn.style.display = 'flex'
  } else {
    btn.style.display = 'none'
  }
}

              <span class="bar-h-lbl">${CAT_ICONS[p.cat]} ${p.name}</span>
              <div class="bar-h-track">
                <div class="bar-h-fill" style="width:${m}%;background:${m>=50?'var(--ac)':m>=30?'var(--warn)':'var(--err)'}">${m}%</div>
              </div>
              <span class="bar-h-val">${m}%</span>
            </div>`
          }).join('')}
        </div>
      </div>

      <!-- Revenue por categoría -->
      <div style="background:var(--s1);border:1px solid var(--bd);border-radius:12px;overflow:hidden">
        <div style="padding:10px 16px;border-bottom:1px solid var(--bd);font-family:'Syne',sans-serif;font-size:13px;font-weight:600">
          Revenue por categoría
        </div>
        <div style="padding:12px 16px">
          ${sortedCats.map(([cat,val])=>`<div class="bar-h-row">
            <span class="bar-h-lbl">${CAT_ICONS[cat]} ${CAT_LABELS[cat]}</span>
            <div class="bar-h-track">
              <div class="bar-h-fill" style="width:${Math.round(val/maxCatRev*100)}%;background:var(--info)">${fmt(val)}</div>
            </div>
            <span class="bar-h-val">${fmt(val)}</span>
          </div>`).join('')}
        </div>
      </div>

      <!-- Más vendidos + rotación -->
      <div style="background:var(--s1);border:1px solid var(--bd);border-radius:12px;overflow:hidden">
        <div style="padding:10px 16px;border-bottom:1px solid var(--bd);font-family:'Syne',sans-serif;font-size:13px;font-weight:600">
          Más vendidos (unidades) — mes
        </div>
        <table class="prod-table">
          <thead><tr>
            <th>#</th><th>Producto</th>
            <th class="r">Unidades</th><th class="r">Revenue</th><th class="r">Margen</th>
          </tr></thead>
          <tbody>
            ${rotation.map((p,i)=>`<tr>
              <td style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--tx3)">${['🥇','🥈','🥉','4°','5°'][i]}</td>
              <td>${CAT_ICONS[p.cat]} <strong>${p.name}</strong></td>
              <td class="r" style="font-weight:600">${p.sold}</td>
              <td class="r" style="font-family:'DM Mono',monospace;color:var(--ok);font-weight:600">${fmt(p.revenue)}</td>
              <td class="r"><span class="prod-margin ${marginClass(margin(p))}">${margin(p)}%</span></td>
            </tr>`).join('')}
          </tbody>
        </table>

        <!-- Insight -->
        <div style="padding:12px 14px;background:var(--ac)0a;border-top:1px solid var(--ac)22">
          <div style="font-size:11px;font-weight:600;color:var(--ac);margin-bottom:4px">💡 Insights del mes</div>
          <div style="font-size:11px;color:var(--tx2);line-height:1.6">
            El <strong style="color:var(--tx)">alquiler de paleta</strong> tiene el mayor margen (${margin(products.find(p=>p.id===13))}%) con alta rotación.<br>
            Las <strong style="color:var(--tx)">paletas</strong> generan más revenue pero rotan poco — revisá el precio.<br>
            La <strong style="color:var(--tx)">cerveza lata</strong> está por debajo del stock mínimo — pedido urgente.
          </div>
        </div>
      </div>
    </div>
  `
}

// ══════════════════════════════════════════════════════════
//  MODAL PRODUCTO
// ══════════════════════════════════════════════════════════
function openNewProduct() {
  editingProductId = null
  document.getElementById('mprod-title').textContent = 'Nuevo producto'
  document.getElementById('p-delete-btn').style.display = 'none'
  ;['p-name','p-sku','p-supplier'].forEach(id=>document.getElementById(id).value='')
  ;['p-price','p-cost','p-stock','p-minstock'].forEach(id=>document.getElementById(id).value='')
  document.getElementById('p-cat').value = 'bebida'
  document.getElementById('margin-preview').querySelector('#margin-val').textContent='—'
  document.getElementById('modal-prod').style.display = 'flex'
  setTimeout(()=>document.getElementById('p-name').focus(), 60)
}

function openEditProduct(id) {
  const p = products.find(x=>x.id===id)
  if (!p) return
  editingProductId = id
  document.getElementById('mprod-title').textContent = 'Editar producto'
  document.getElementById('p-delete-btn').style.display = 'inline-flex'
  document.getElementById('p-name').value     = p.name
  document.getElementById('p-cat').value      = p.cat
  document.getElementById('p-price').value    = p.price
  document.getElementById('p-cost').value     = p.cost
  document.getElementById('p-stock').value    = p.stock
  document.getElementById('p-minstock').value = p.minStock
  document.getElementById('p-sku').value      = p.sku || ''
  document.getElementById('p-supplier').value = p.supplier || ''
  updateMarginPreview()
  document.getElementById('modal-prod').style.display = 'flex'
}

function updateMarginPreview() {
  const price = parseFloat(document.getElementById('p-price').value)||0
  const cost  = parseFloat(document.getElementById('p-cost').value)||0
  const el    = document.getElementById('margin-val')
  if (!el) return
  if (!price || !cost) { el.textContent='—'; return }
  const m   = Math.round((price-cost)/price*100)
  const profit = price - cost
  el.textContent   = `${m}% — ganás $${profit.toLocaleString()} por unidad`
  el.style.color   = m>=50?'var(--ok)':m>=30?'var(--warn)':'var(--err)'
}

function saveProduct() {
  const name  = document.getElementById('p-name').value.trim()
  const price = parseInt(document.getElementById('p-price').value)||0
  const cost  = parseInt(document.getElementById('p-cost').value)||0
  if (!name)  { toast('⚠ Ingresá un nombre','warn'); return }
  if (!price) { toast('⚠ Ingresá el precio de venta','warn'); return }

  const data = {
    name, price, cost,
    cat:       document.getElementById('p-cat').value,
    stock:     parseInt(document.getElementById('p-stock').value)||0,
    minStock:  parseInt(document.getElementById('p-minstock').value)||5,
    sku:       document.getElementById('p-sku').value.trim(),
    supplier:  document.getElementById('p-supplier').value.trim(),
    sold: 0, revenue: 0,
  }

  if (editingProductId) {
    const idx = products.findIndex(p=>p.id===editingProductId)
    if (idx>=0) { data.sold=products[idx].sold; data.revenue=products[idx].revenue; products[idx]={...products[idx],...data} }
    toast('✓ Producto actualizado')
  } else {
    products.push({ id: nextId++, ...data })
    toast('✓ Producto creado')
  }
  document.getElementById('modal-prod').style.display = 'none'
  renderMain()
}

function deleteProduct() {
  if (!editingProductId) return
  if (!confirm('¿Eliminar este producto?')) return
  products = products.filter(p=>p.id!==editingProductId)
  document.getElementById('modal-prod').style.display = 'none'
  toast('Producto eliminado','warn')
  renderMain()
}

// ══════════════════════════════════════════════════════════
//  MODAL VENTA
// ══════════════════════════════════════════════════════════
function openSale() {
  cart = {}
  document.getElementById('sale-search').value = ''
  renderSaleSearch()
  renderCart()
  document.getElementById('modal-sale').style.display = 'flex'
  setTimeout(()=>document.getElementById('sale-search').focus(), 60)
}

function quickSell(id) {
  cart = {}
  cart[id] = 1
  renderCart()
  document.getElementById('sale-search').value = ''
  renderSaleSearch()
  document.getElementById('modal-sale').style.display = 'flex'
}

function renderSaleSearch() {
  const q   = document.getElementById('sale-search')?.value?.toLowerCase() || ''
  const res = document.getElementById('sale-search-results')
  if (!res) return
  if (!q) { res.innerHTML=''; return }
  const found = products.filter(p=>p.name.toLowerCase().includes(q)||p.sku?.toLowerCase().includes(q)).slice(0,6)
  res.innerHTML = found.map(p=>`
    <div onclick="addToCart(${p.id})" style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:7px;cursor:pointer;transition:background .12s;border:1px solid var(--bd);margin-bottom:4px"
      onmouseover="this.style.background='var(--s2)'" onmouseout="this.style.background=''">
      <div>
        <span style="font-size:12px;font-weight:500">${CAT_ICONS[p.cat]} ${p.name}</span>
        ${p.stock<=p.minStock?`<span style="font-size:10px;color:var(--warn);margin-left:5px">stock: ${p.stock}</span>`:''}
      </div>
      <span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:var(--ac)">${fmt(p.price)}</span>
    </div>`).join('')
}

function addToCart(id) {
  cart[id] = (cart[id]||0) + 1
  document.getElementById('sale-search').value = ''
  document.getElementById('sale-search-results').innerHTML = ''
  renderCart()
}

function updateQty(id, delta) {
  cart[id] = (cart[id]||0) + delta
  if (cart[id] <= 0) delete cart[id]
  renderCart()
}

function renderCart() {
  const el    = document.getElementById('sale-cart')
  const total = document.getElementById('sale-total')
  if (!el) return
  const items = Object.entries(cart)
  if (!items.length) {
    el.innerHTML = '<div style="text-align:center;color:var(--tx3);font-size:12px;padding:12px">Buscá un producto para agregar</div>'
    if (total) total.textContent = '$0'
    return
  }
  let sum = 0
  el.innerHTML = `<div style="background:var(--s2);border-radius:8px;overflow:hidden">` +
    items.map(([id, qty]) => {
      const p = products.find(x=>x.id===parseInt(id))
      if (!p) return ''
      const sub = p.price * qty; sum += sub
      return `<div class="sale-item-row">
        <span style="font-size:14px">${CAT_ICONS[p.cat]}</span>
        <span style="flex:1;font-size:12px;font-weight:500">${p.name}</span>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="updateQty(${p.id},-1)">−</button>
          <span class="qty-val">${qty}</span>
          <button class="qty-btn" onclick="updateQty(${p.id},1)">+</button>
        </div>
        <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:600;min-width:50px;text-align:right">${fmt(sub)}</span>
      </div>`
    }).join('') + '</div>'
  if (total) total.textContent = fmt(sum)
}

function confirmSale() {
  const items = Object.entries(cart)
  if (!items.length) { toast('⚠ Agregá al menos un producto','warn'); return }
  let total = 0
  const saleItems = items.map(([id,qty])=>{
    const p = products.find(x=>x.id===parseInt(id))
    if (!p) return null
    total += p.price * qty
    // Descontar stock
    p.stock = Math.max(0, p.stock - qty)
    p.sold  += qty
    p.revenue += p.price * qty
    return { name:p.name, qty, price:p.price }
  }).filter(Boolean)
  const now = new Date()
  sales.push({
    id: nextId++,
    time: `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
    items: saleItems, total,
    pay: document.getElementById('sale-pay').value,
    player: document.getElementById('sale-player').value,
  })
  document.getElementById('modal-sale').style.display = 'none'
  toast(`✓ Venta registrada — ${fmt(total)}`)
  cart = {}
  renderMain()
}

// ══════════════════════════════════════════════════════════
//  REPOSICIÓN
// ══════════════════════════════════════════════════════════
function openReplenish(id) {
  const p = products.find(x=>x.id===id)
  if (!p) return
  const qty = prompt(`Reponer "${p.name}"\nStock actual: ${p.stock}\nIngresá la cantidad a agregar:`)
  if (!qty || isNaN(qty) || parseInt(qty)<=0) return
  p.stock += parseInt(qty)
  toast(`✓ Stock actualizado: ${p.name} — ${p.stock} unidades`)
  renderMain()
}

// ══════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════
function closeOv(e,id){ if(e.target.id===id) document.getElementById(id).style.display='none' }

function toast(msg,type='success'){
  const colors={success:'var(--ok)',warn:'var(--warn)',error:'var(--err)'}
  const t=document.createElement('div');t.className='toast'
  t.innerHTML=`<span style="color:${colors[type]||colors.success}">●</span> ${msg}`
  document.body.appendChild(t);setTimeout(()=>t.remove(),2600)
}

function toggleTheme(){
  const h=document.documentElement
  h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark')
  localStorage.setItem('shos-theme',h.getAttribute('data-theme'))
}
const st=localStorage.getItem('shos-theme')
if(st) document.documentElement.setAttribute('data-theme',st)

renderMain()
</script>
